name: Generate ZZX-Labs Staff Directory

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-staff-directory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate staff directory files
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          from pathlib import Path

          STAFF_ROOT = Path("staff")
          DATA_ROOT = STAFF_ROOT / "data"

          STAFF_ROOT.mkdir(parents=True, exist_ok=True)
          DATA_ROOT.mkdir(parents=True, exist_ok=True)

          departments = [
              ("executive", "Executive Command", "#e6a42b", "Executive leadership, ownership, governance, command, strategy, operations, and company direction."),
              ("technology", "Technology", "#c0d674", "Technology strategy, systems architecture, tooling, platforms, standards, and technical direction."),
              ("design", "Design", "#c79c6e", "Visual systems, product design, brand design, interfaces, diagrams, mockups, layouts, and creative direction."),
              ("research", "Research", "#5aa9e6", "Papers, reports, datasets, technical reviews, dossiers, documentation, and publication workflows."),
              ("web", "Web", "#8cc8ff", "Frontend, backend, APIs, static pages, dashboards, widgets, web apps, and site architecture."),
              ("software", "Software", "#9fd38b", "Applications, CLIs, GUIs, daemons, libraries, automation, utilities, and software products."),
              ("firmware", "Firmware", "#d7b37a", "Embedded code, microcontrollers, board support, flashing systems, device logic, and hardware integration."),
              ("hardware", "Hardware", "#b88f5a", "Electronics, devices, boards, sensors, displays, switches, enclosures, and physical computing."),
              ("engineering", "Engineering", "#d2a05f", "Systems engineering, infrastructure, robotics, networks, prototypes, mechanical systems, and integration."),
              ("applications", "Applications", "#b07cff", "Desktop, mobile, web, Android, iOS, GUI, CLI, daemon, and user-facing application systems."),
              ("adult", "Adult Technology", "#d66090", "Adult technology, compliant content systems, privacy-preserving platforms, datasets, devices, and software."),
              ("bitcoin", "Bitcoin", "#f7931a", "Bitcoin infrastructure, full nodes, Lightning, mining, payments, market data, wallets, and analytics."),
              ("ai", "Artificial Intelligence", "#b07cff", "AI systems, agents, assistants, local inference, automation, prompt systems, and applied intelligence."),
              ("ml", "Machine Learning", "#8f7cff", "Datasets, training, evaluation, classification, embeddings, computer vision, NLP, and model workflows."),
              ("osint", "OSINT", "#d66060", "Open-source intelligence, public records, source validation, entity mapping, timelines, and investigations."),
              ("cyber-investigation", "Cyber Investigation", "#b85050", "Digital investigations, evidence handling, attribution discipline, forensic review, and case support."),
              ("cyber-security", "Cyber Security", "#c0d674", "Defensive security, hardening, threat intelligence, vulnerability coordination, and secure architecture."),
              ("cyber-warfare", "Cyber Warfare", "#a84a4a", "Defensive cyber warfare research, resilience, deterrence, doctrine, threat modeling, and lawful security strategy."),
              ("drones", "Drones", "#d1d1d1", "Drone systems, telemetry, autonomy, detection, control systems, simulation, and lawful engineering research."),
              ("uavs", "UAVs", "#d1d1d1", "Unmanned aerial systems, airframes, sensors, telemetry, autopilot integrations, and aerial robotics."),
              ("umvs", "UMVs", "#7ac7c4", "Unmanned maritime vehicles, surface systems, navigation, telemetry, sensors, and aquatic robotics."),
              ("rovs", "ROVs", "#5aa9e6", "Remotely operated vehicles, underwater robotics, tethered systems, cameras, controls, and telemetry."),
              ("usmrovs", "USMROVs", "#4f9fb8", "Unmanned surface, maritime, and remotely operated vehicle systems and mixed-domain robotics."),
              ("ugvs", "UGVs", "#b88f5a", "Unmanned ground vehicles, mobility systems, robotics, navigation, sensors, and control panels."),
              ("robotics", "Robotics", "#d2a05f", "Robotics, autonomous systems, swarm simulation, movement models, sensors, actuators, and control loops."),
              ("droids", "DROIDS", "#d1d1d1", "DROID systems, robotic platforms, autonomous helpers, physical agents, and custom machine assistants."),
              ("droeds", "DROEDS", "#d1d1d1", "DROED systems, experimental robotic entities, engineered device organisms, and advanced automation concepts."),
              ("defense", "Defense", "#e6a42b", "Defense research, security engineering, resilience, risk analysis, infrastructure, and allied technical support."),
              ("biological-sciences", "Biological Sciences", "#8fcf7a", "Biology, lab research, ecology, life sciences, organism systems, datasets, and applied scientific review."),
              ("mycological-sciences", "Mycological Sciences", "#c79c6e", "Mycology, fungi research, cultivation systems, datasets, lab methods, and biological documentation."),
              ("botanical-sciences", "Botanical Sciences", "#7fbf5f", "Botany, plant science, cultivation systems, genetics, datasets, morphology, and controlled research."),
              ("chemical-sciences", "Chemical Sciences", "#9fc9d8", "Chemistry, extraction science, materials, lab methods, analytical notes, and controlled technical research."),
              ("admin", "Administration", "#d1d1d1", "Administrative operations, scheduling, records, coordination, documentation, internal support, and office systems."),
              ("hr", "Human Resources", "#d1d1d1", "Hiring, onboarding, personnel records, contributor care, staff policy, internal coordination, and recruiting."),
              ("accounting", "Accounting", "#d1d1d1", "Bookkeeping, accounts, invoices, receipts, ledgers, vendor records, payment records, and audit support."),
              ("payroll", "Payroll", "#d1d1d1", "Payroll, contractor payments, compensation records, tax coordination, timesheets, and payment scheduling."),
              ("finance", "Finance", "#d1d1d1", "Financial planning, budgets, treasury, pricing, reporting, forecasting, and financial controls."),
              ("investments", "Investments", "#f7931a", "Investment research, treasury strategy, Bitcoin accumulation, portfolio tracking, and strategic capital planning."),
              ("legal", "Legal", "#d1d1d1", "Legal coordination, contracts, compliance, policies, notices, disclaimers, licensing, and risk review."),
              ("management", "Management", "#d1d1d1", "Department management, project coordination, delivery tracking, internal process, and staff operations."),
              ("security", "Physical / Operational Security", "#c0d674", "Physical security, operational security, access control, facility protection, and safety procedures."),
              ("consulting", "Consulting", "#e6a42b", "Client services, technical consulting, retainers, advisory work, reports, engagements, and delivery management."),
              ("lab-staff", "Lab Staff", "#8fcf7a", "Laboratory staff, sample handling, documentation, experiments, instruments, procedures, and lab support."),
              ("technicians", "Technicians", "#c79c6e", "Technical staff, builds, repairs, assembly, testing, maintenance, calibration, and field support.")
          ]

          executive_staff = [
              {
                  "id": "executive-001",
                  "slug": "founder-ceo",
                  "display_name": "0xdeadbeef",
                  "public_title": "Founder / Creator / Owner / CEO",
                  "rank": "Founder",
                  "status": "Active",
                  "visibility": "Public Pseudonym",
                  "avatar": "../static/images/staff/executive/executive-001.webp",
                  "division": "Executive Command",
                  "department": "Executive Command",
                  "specialties": ["Bitcoin", "Cybersecurity", "AI/ML", "Software", "Infrastructure", "Research", "Design Systems"],
                  "bio": "Founder, creator, owner, CEO, architect, principal researcher, and operational lead behind ZZX-Labs R&D.",
                  "links": {"profile": "./founder-ceo/", "contact": "../contact/"},
                  "stats": {"projects": 0, "papers": 0, "reports": 0, "datasets": 0}
              },
              {
                  "id": "executive-002",
                  "slug": "cofounder-president",
                  "display_name": "CoFounder / President",
                  "public_title": "CoFounder / CoCreator / CoOwner / President",
                  "rank": "CoFounder",
                  "status": "Reserved",
                  "visibility": "Private / Pseudonymous",
                  "avatar": "../static/images/staff/executive/executive-002.webp",
                  "division": "Executive Command",
                  "department": "Executive Command",
                  "specialties": ["Company Governance", "Operations", "Strategy", "Partnerships", "Executive Direction"],
                  "bio": "Reserved executive profile for the ZZX-Labs cofounder, cocreator, coowner, and president of the company.",
                  "links": {"profile": "./cofounder-president/", "contact": "../contact/"},
                  "stats": {"projects": 0, "papers": 0, "reports": 0, "datasets": 0}
              }
          ]

          executive_titles = [
              ("chief-operations-officer", "Chief Operations Officer"),
              ("chief-technology-officer", "Chief Technology Officer"),
              ("chief-research-officer", "Chief Research Officer"),
              ("chief-security-officer", "Chief Security Officer"),
              ("chief-design-officer", "Chief Design Officer"),
              ("chief-financial-officer", "Chief Financial Officer"),
              ("chief-legal-officer", "Chief Legal Officer"),
              ("chief-strategy-officer", "Chief Strategy Officer"),
              ("program-director", "Program Director"),
              ("technical-director", "Technical Director"),
              ("research-director", "Research Director"),
              ("security-director", "Security Director"),
              ("operations-director", "Operations Director"),
              ("partnerships-director", "Partnerships Director")
          ]

          for i, (slug, title) in enumerate(executive_titles, start=3):
              executive_staff.append({
                  "id": f"executive-{i:03d}",
                  "slug": slug,
                  "display_name": title,
                  "public_title": title,
                  "rank": "Executive / Director",
                  "status": "Placeholder",
                  "visibility": "Pseudonymous",
                  "avatar": f"../static/images/staff/executive/executive-{i:03d}.webp",
                  "division": "Executive Command",
                  "department": "Executive Command",
                  "specialties": ["Leadership", "Management", "Strategy", "Operations"],
                  "bio": f"Reserved public profile for the {title} role within ZZX-Labs R&D executive and director staff.",
                  "links": {"profile": f"./{slug}/", "contact": "../contact/"},
                  "stats": {"projects": 0, "papers": 0, "reports": 0, "datasets": 0}
              })

          def title_case_from_slug(slug):
              return " ".join(part.upper() if part in {"ai", "ml", "osint", "uavs", "umvs", "rovs", "ugvs"} else part.capitalize() for part in slug.split("-"))

          def make_staff(dept_slug, dept_name, accent, description):
              if dept_slug == "executive":
                  return executive_staff

              staff = []

              head = {
                  "id": f"{dept_slug}-001",
                  "slug": f"head-of-{dept_slug}",
                  "display_name": f"Head of {dept_name}",
                  "public_title": f"Head of {dept_name}",
                  "rank": "Department Head",
                  "status": "Placeholder",
                  "visibility": "Pseudonymous",
                  "avatar": f"../static/images/staff/{dept_slug}/{dept_slug}-001.webp",
                  "division": dept_name,
                  "department": dept_name,
                  "specialties": [dept_name, "Leadership", "Planning", "Operations", "Technical Direction"],
                  "bio": f"Department head profile for {dept_name}. {description}",
                  "links": {"profile": f"./head-of-{dept_slug}/", "contact": "../contact/"},
                  "stats": {"projects": 0, "papers": 0, "reports": 0, "datasets": 0}
              }

              staff.append(head)

              roles = [
                  "Senior Specialist",
                  "Staff Specialist",
                  "Operations Lead",
                  "Technical Lead",
                  "Research Lead",
                  "Systems Operator",
                  "Data Operator",
                  "Documentation Operator",
                  "Analyst",
                  "Engineer",
                  "Technician",
                  "Coordinator",
                  "Reviewer",
                  "Auditor",
                  "Publisher",
                  "Maintainer",
                  "Developer",
                  "Designer",
                  "Tester",
                  "Security Liaison",
                  "Project Manager",
                  "Program Manager",
                  "Lab Operator",
                  "Field Operator",
                  "Support Specialist",
                  "Intake Specialist",
                  "Archive Specialist",
                  "QA Specialist",
                  "Infrastructure Operator",
                  "Automation Operator",
                  "Reports Operator"
              ]

              for idx, role in enumerate(roles, start=2):
                  slug = f"{dept_slug}-{idx:03d}"
                  staff.append({
                      "id": slug,
                      "slug": slug,
                      "display_name": f"{dept_name} {role}",
                      "public_title": role,
                      "rank": "Core Staff",
                      "status": "Placeholder",
                      "visibility": "Pseudonymous",
                      "avatar": f"../static/images/staff/{dept_slug}/{slug}.webp",
                      "division": dept_name,
                      "department": dept_name,
                      "specialties": [dept_name, role, "Operations", "Documentation"],
                      "bio": f"Reserved public profile for a {role} in the {dept_name} department.",
                      "links": {"profile": f"./{slug}/", "contact": "../contact/"},
                      "stats": {"projects": 0, "papers": 0, "reports": 0, "datasets": 0}
                  })

              return staff

          index_records = []

          for dept_slug, dept_name, accent, description in departments:
              staff = make_staff(dept_slug, dept_name, accent, description)

              record = {
                  "department": {
                      "slug": dept_slug,
                      "name": dept_name,
                      "description": description,
                      "accent": accent,
                      "headcount_target": 32 if dept_slug != "executive" else len(staff),
                      "data_file": f"./data/{dept_slug}.json"
                  },
                  "staff": staff
              }

              with (DATA_ROOT / f"{dept_slug}.json").open("w", encoding="utf-8") as f:
                  json.dump(record, f, indent=2, ensure_ascii=False)

              index_records.append(record["department"])

          master = {
              "schema_version": "0.1.0",
              "updated_at": "2026-06-01",
              "directory": "ZZX-Labs R&D Staff Directory",
              "departments": index_records
          }

          with (DATA_ROOT / "index.json").open("w", encoding="utf-8") as f:
              json.dump(master, f, indent=2, ensure_ascii=False)

          index_html = """<!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <meta name="robots" content="noindex, nofollow">
              <meta name="description" content="ZZX-Labs R&D staff directory powered by JSON department records for executives, department heads, core staff, researchers, engineers, analysts, operators, technicians, consultants, administrators, and strategic personnel.">
              <title>Staff | ZZX-Labs R&D</title>

              <link rel="icon" href="../static/icons/favicon.ico" type="image/x-icon">
              <link rel="icon" href="../static/icons/favicon-32.png" sizes="32x32" type="image/png">
              <link rel="icon" href="../static/icons/favicon-16.png" sizes="16x16" type="image/png">
              <link rel="apple-touch-icon" href="../static/icons/apple-touch-icon.png">

              <link rel="stylesheet" href="../static/styles.css">
              <link rel="stylesheet" href="./staff.css">
              <script src="../static/script.js" defer></script>
              <script src="./staff.js" defer></script>
          </head>

          <body class="zzx-site-page zzx-page-staff">
          <header>
              <div id="zzx-header"></div>
              <br>
              <div id="ticker-container"></div>
              <br>
          </header>

          <main class="zzx-page-shell">
              <section class="zzx-page-hero container">
                  <p class="zzx-kicker">ZZX-Labs / Staff</p>
                  <h1>Staff Directory</h1>
                  <p>
                      ZZX-Labs R&D uses a JSON-driven staff directory for public profiles, pseudonymous operators,
                      executive leadership, department heads, core staff, researchers, engineers, analysts, technicians,
                      administrators, consultants, and future personnel across all company departments.
                  </p>
                  <p>
                      Public staff records may use handles, codenames, role profiles, placeholder identities, or avatar
                      shields. Sensitive work may remain pseudonymous, private, restricted, or redacted.
                  </p>
                  <div class="zzx-action-row">
                      <a href="../contact" class="btn">Contact</a>
                      <a href="../partners" class="btn btn-outline">Partners</a>
                      <a href="../consultants" class="btn btn-outline">Consultants</a>
                      <a href="../research" class="btn btn-outline">Research</a>
                  </div>
              </section>

              <section class="container zzx-panel">
                  <p class="zzx-kicker">Directory Controls</p>
                  <h2>Departments</h2>
                  <p>
                      Select a department to view its public staff records. Each department is stored in a separate JSON
                      file under <code>staff/data/</code>.
                  </p>
                  <div id="staff-department-nav" class="staff-department-nav"></div>
              </section>

              <section class="container zzx-panel">
                  <p class="zzx-kicker">Public Profiles</p>
                  <h2 id="staff-active-heading">Loading Staff Directory</h2>
                  <p id="staff-active-description" class="staff-active-description"></p>
                  <div id="staff-grid" class="zzx-card-grid staff-grid"></div>
              </section>

              <section class="container zzx-panel">
                  <p class="zzx-kicker">Data Model</p>
                  <h2>JSON Staff System</h2>
                  <pre class="zzx-code-block">staff/
          ├── index.html
          ├── staff.css
          ├── staff.js
          └── data/
              ├── index.json
              ├── executive.json
              ├── technology.json
              ├── bitcoin.json
              ├── cyber-security.json
              └── ...</pre>
              </section>
          </main>

          <footer>
              <div id="zzx-footer"></div>
          </footer>
          </body>
          </html>
          """

          STAFF_ROOT.joinpath("index.html").write_text(index_html, encoding="utf-8")

          staff_css = """
          .staff-department-nav {
              display: flex;
              flex-wrap: wrap;
              gap: 0.5rem;
              margin-top: 1rem;
          }

          .staff-department-button {
              border: 1px solid rgba(209, 209, 209, 0.18);
              background: rgba(0, 0, 0, 0.28);
              color: inherit;
              padding: 0.65rem 0.85rem;
              border-radius: 999px;
              cursor: pointer;
              font: inherit;
          }

          .staff-department-button:hover,
          .staff-department-button.is-active {
              border-color: var(--staff-accent, #c0d674);
              box-shadow: 0 0 18px rgba(192, 214, 116, 0.18);
          }

          .staff-profile-card {
              position: relative;
          }

          .staff-card-avatar {
              width: 100%;
              max-width: 184px;
              height: 184px;
              margin: 0 auto 1rem;
              border: 1px solid rgba(209, 209, 209, 0.16);
              border-radius: 16px;
              background:
                  radial-gradient(circle at 50% 35%, rgba(192, 214, 116, 0.14), transparent 36%),
                  radial-gradient(circle at 50% 100%, rgba(0, 0, 0, 0.78), transparent 62%),
                  linear-gradient(180deg, #151515, #050505);
              overflow: hidden;
              object-fit: cover;
          }

          .staff-avatar-fallback {
              display: grid;
              place-items: center;
              color: var(--staff-accent, #c0d674);
              font-size: 3rem;
              letter-spacing: -0.25rem;
          }

          .staff-meta {
              margin-top: 0.9rem;
              font-size: 0.78rem;
              opacity: 0.72;
          }

          .staff-specialties {
              display: flex;
              flex-wrap: wrap;
              gap: 0.35rem;
              margin-top: 0.8rem;
          }

          .staff-chip {
              border: 1px solid rgba(209, 209, 209, 0.14);
              border-radius: 999px;
              padding: 0.25rem 0.55rem;
              font-size: 0.72rem;
              opacity: 0.84;
          }

          .staff-active-description {
              opacity: 0.82;
          }
          """

          STAFF_ROOT.joinpath("staff.css").write_text(staff_css, encoding="utf-8")

          staff_js = """
          (() => {
              "use strict";

              const state = {
                  index: null,
                  activeSlug: null
              };

              const $ = (id) => document.getElementById(id);

              async function readJson(url) {
                  const res = await fetch(url, { cache: "no-store" });

                  if (!res.ok) {
                      throw new Error(`Failed to load ${url}: ${res.status}`);
                  }

                  return res.json();
              }

              function escapeHtml(value) {
                  return String(value ?? "")
                      .replaceAll("&", "&amp;")
                      .replaceAll("<", "&lt;")
                      .replaceAll(">", "&gt;")
                      .replaceAll('"', "&quot;")
                      .replaceAll("'", "&#039;");
              }

              function renderDepartmentNav() {
                  const nav = $("staff-department-nav");

                  if (!nav || !state.index) {
                      return;
                  }

                  nav.innerHTML = "";

                  for (const dept of state.index.departments) {
                      const btn = document.createElement("button");
                      btn.type = "button";
                      btn.className = "staff-department-button";
                      btn.textContent = dept.name;
                      btn.style.setProperty("--staff-accent", dept.accent || "#c0d674");

                      if (dept.slug === state.activeSlug) {
                          btn.classList.add("is-active");
                      }

                      btn.addEventListener("click", () => {
                          loadDepartment(dept.slug);
                      });

                      nav.appendChild(btn);
                  }
              }

              function avatarHtml(member, accent) {
                  const avatar = escapeHtml(member.avatar);
                  const initials = escapeHtml((member.display_name || "ZZX").slice(0, 3).toUpperCase());

                  return `
                      <img class="staff-card-avatar"
                           src="${avatar}"
                           alt="${escapeHtml(member.display_name)} avatar"
                           loading="lazy"
                           style="--staff-accent:${escapeHtml(accent)}"
                           onerror="this.outerHTML='<div class=&quot;staff-card-avatar staff-avatar-fallback&quot; style=&quot;--staff-accent:${escapeHtml(accent)}&quot;>${initials}</div>'">
                  `;
              }

              function staffCard(member, accent) {
                  const specialties = Array.isArray(member.specialties)
                      ? member.specialties.slice(0, 6)
                      : [];

                  return `
                      <a class="zzx-card link-card staff-profile-card" href="${escapeHtml(member.links?.profile || "#")}" style="--staff-accent:${escapeHtml(accent)}">
                          ${avatarHtml(member, accent)}
                          <p class="zzx-kicker">${escapeHtml(member.rank || member.department || "Staff")}</p>
                          <h3>${escapeHtml(member.display_name)}</h3>
                          <p><strong>${escapeHtml(member.public_title || "")}</strong></p>
                          <p>${escapeHtml(member.bio || "")}</p>
                          <div class="staff-specialties">
                              ${specialties.map((item) => `<span class="staff-chip">${escapeHtml(item)}</span>`).join("")}
                          </div>
                          <p class="staff-meta">
                              Status: ${escapeHtml(member.status)} · Visibility: ${escapeHtml(member.visibility)} · ID: ${escapeHtml(member.id)}
                          </p>
                      </a>
                  `;
              }

              async function loadDepartment(slug) {
                  state.activeSlug = slug;
                  renderDepartmentNav();

                  const deptMeta = state.index.departments.find((item) => item.slug === slug);

                  if (!deptMeta) {
                      return;
                  }

                  const data = await readJson(`./data/${slug}.json`);

                  const heading = $("staff-active-heading");
                  const description = $("staff-active-description");
                  const grid = $("staff-grid");

                  if (heading) {
                      heading.textContent = data.department.name;
                  }

                  if (description) {
                      description.textContent = `${data.department.description} Target headcount: ${data.department.headcount_target}.`;
                  }

                  if (grid) {
                      grid.innerHTML = data.staff.map((member) => staffCard(member, data.department.accent)).join("");
                  }
              }

              async function init() {
                  state.index = await readJson("./data/index.json");
                  state.activeSlug = state.index.departments[0]?.slug || "executive";
                  renderDepartmentNav();
                  await loadDepartment(state.activeSlug);
              }

              if (document.readyState === "loading") {
                  document.addEventListener("DOMContentLoaded", init);
              } else {
                  init();
              }
          })();
          """

          STAFF_ROOT.joinpath("staff.js").write_text(staff_js, encoding="utf-8")

          print("Generated staff directory.")
          PY

      - name: Commit generated staff directory
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "zzx-labs-staff-generator"
          git config user.email "actions@github.com"

          git add staff/index.html staff/staff.css staff/staff.js staff/data

          if git diff --cached --quiet; then
            printf '%s\n' "No staff directory changes to commit."
            exit 0
          fi

          git commit -m "Generate JSON-driven staff directory"

          git pull --rebase origin main
          git push origin HEAD:main
