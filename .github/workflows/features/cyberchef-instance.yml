name: Build ZZX CyberChef Instance

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cyberchef:
    name: Build CyberChef v11.0.0
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CyberChef directory
        run: |
          mkdir -p cyberchef

      - name: Download CyberChef v11.0.0
        run: |
          curl -L \
            -o CyberChef_v11.0.0.zip \
            https://github.com/gchq/CyberChef/releases/download/v11.0.0/CyberChef_v11.0.0.zip

      - name: Extract release
        run: |
          unzip -o CyberChef_v11.0.0.zip

      - name: Install CyberChef page
        run: |
          mv CyberChef_v11.0.0.html cyberchef/index.html

      - name: Create attribution file
        run: |
          cat > cyberchef/ATTRIBUTION.md << 'EOF'
          # CyberChef Attribution

          CyberChef is developed and maintained by GCHQ.

          Repository:
          https://github.com/gchq/CyberChef

          Official Site:
          https://gchq.github.io/CyberChef/

          Version:
          v11.0.0

          Licensed under Apache License 2.0.
          EOF

      - name: Create license notice
        run: |
          cat > cyberchef/LICENSE-NOTICE.md << 'EOF'
          Apache License 2.0

          https://www.apache.org/licenses/LICENSE-2.0

          CyberChef:
          https://github.com/gchq/CyberChef

          Crown Copyright:
          https://www.nationalarchives.gov.uk/information-management/re-using-public-sector-information/uk-government-licensing-framework/crown-copyright/
          EOF

      - name: Create README
        run: |
          cat > cyberchef/README.md << 'EOF'
          # ZZX CyberChef Instance

          Public URL:

          https://zzx-labs.io/cyberchef/

          Upstream:

          https://github.com/gchq/CyberChef

          Version:

          v11.0.0
          EOF

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add cyberchef/

          if git diff --cached --quiet; then
            printf '%s\n' 'No changes detected.'
          else
            git commit -m "Update CyberChef v11.0.0"
            git push
          fi
