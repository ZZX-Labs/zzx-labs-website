name: Bitnodes Map Host

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"
  workflow_run:
    workflows:
      - ZZX-Labs Bitnodes Global Node Crawler
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: zzx-bitnodes-maphost
  cancel-in-progress: false

env:
  BITNODES_ROOT: bitcoin/bitnodes
  BITNODES_API: bitcoin/bitnodes/api
  BITNODES_DATA: bitcoin/bitnodes/data
  BITNODES_GEO: bitcoin/bitnodes/data/geo
  BITNODES_MAPS: bitcoin/bitnodes/maps
  BITNODES_LIVE_MAP: bitcoin/bitnodes/live-map
  MAX_PUBLIC_JSON_BYTES: "24000000"
  PYTHONUNBUFFERED: "1"

jobs:
  maps:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Sync repo before map build
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git rebase --autostash origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/bitnodes/requirements.txt

      - name: Install requirements
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r tools/bitnodes/requirements.txt

      - name: Verify map tools
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/map/map.py --help
          python tools/bitnodes/map/maps.py --help
          python tools/bitnodes/map/live-map.py --help
          python tools/bitnodes/map/mapvectors.py --help
          python tools/bitnodes/map/mapnodes.py --help

      - name: Prepare map directories
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p \
            "${BITNODES_MAPS}/zzxbitnodes/data" \
            "${BITNODES_MAPS}/originalbitnodes/data" \
            "${BITNODES_MAPS}/global/data" \
            "${BITNODES_MAPS}/data" \
            "${BITNODES_LIVE_MAP}/zzxbitnodes/data" \
            "${BITNODES_LIVE_MAP}/originalbitnodes/data" \
            "${BITNODES_LIVE_MAP}/global/data" \
            "${BITNODES_LIVE_MAP}/data" \
            "${BITNODES_GEO}"

      - name: Select map source files
        id: sources
        shell: bash
        run: |
          set -euo pipefail

          ZZX_INPUT=""
          ORIGINAL_INPUT=""

          for FILE in \
            "${BITNODES_API}/aggregate/zzxbitnodes/latest.json" \
            "${BITNODES_API}/enriched/zzxbitnodes/latest.json" \
            "${BITNODES_API}/zzxbitnodes/latest.json"
          do
            if [ -f "${FILE}" ]; then
              ZZX_INPUT="${FILE}"
              break
            fi
          done

          for FILE in \
            "${BITNODES_API}/aggregate/originalbitnodes/latest.json" \
            "${BITNODES_API}/enriched/originalbitnodes/latest.json" \
            "${BITNODES_API}/originalbitnodes/latest.json"
          do
            if [ -f "${FILE}" ]; then
              ORIGINAL_INPUT="${FILE}"
              break
            fi
          done

          if [ -z "${ZZX_INPUT}" ]; then
            printf '%s\n' "Missing ZZX Bitnodes input."
            exit 1
          fi

          if [ -z "${ORIGINAL_INPUT}" ]; then
            printf '%s\n' "Missing Original Bitnodes input."
            exit 1
          fi

          printf '%s\n' "zzx_input=${ZZX_INPUT}" >> "${GITHUB_OUTPUT}"
          printf '%s\n' "original_input=${ORIGINAL_INPUT}" >> "${GITHUB_OUTPUT}"

          printf '%s\n' "ZZX input: ${ZZX_INPUT}"
          printf '%s\n' "Original input: ${ORIGINAL_INPUT}"

      - name: Build ZZX Bitnodes maps
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/map/map.py maps \
            --input "${{ steps.sources.outputs.zzx_input }}" \
            --api-dir "${BITNODES_API}" \
            --state-dir "${BITNODES_DATA}/state/zzxbitnodes" \
            --map-dir "${BITNODES_MAPS}/zzxbitnodes" \
            --live-map-dir "${BITNODES_LIVE_MAP}/zzxbitnodes" \
            --source zzxbitnodes \
            --theme zzx_dark_olive \
            --settings default \
            --tile-provider cartodb_dark \
            --compact

      - name: Build Original Bitnodes maps
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/map/map.py maps \
            --input "${{ steps.sources.outputs.original_input }}" \
            --api-dir "${BITNODES_API}" \
            --state-dir "${BITNODES_DATA}/state/originalbitnodes" \
            --map-dir "${BITNODES_MAPS}/originalbitnodes" \
            --live-map-dir "${BITNODES_LIVE_MAP}/originalbitnodes" \
            --source originalbitnodes \
            --theme zzx_dark_olive \
            --settings default \
            --tile-provider cartodb_dark \
            --compact

      - name: Build canonical global and live-map data
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/map/map.py both \
            --input "${{ steps.sources.outputs.zzx_input }}" \
            --api-dir "${BITNODES_API}" \
            --state-dir "${BITNODES_DATA}/state/zzxbitnodes" \
            --map-dir "${BITNODES_MAPS}" \
            --live-map-dir "${BITNODES_LIVE_MAP}" \
            --source zzxbitnodes \
            --theme zzx_dark_olive \
            --settings live \
            --tile-provider cartodb_dark \
            --compact

          VECTORS="${BITNODES_LIVE_MAP}/data/map-vectors.json"

          for TOOL in \
            mapregions.py \
            mapcontinents.py \
            mapcountries.py \
            mapterritories.py \
            mapcounties.py \
            mapcities.py \
            mapparcels.py \
            mapbuildings.py \
            maptimezones.py \
            mapw3waddresses.py \
            mapzzxgcsaddresses.py \
            mapgeohashids.py \
            mapnodes.py
          do
            if [ -f "tools/bitnodes/map/${TOOL}" ]; then
              python "tools/bitnodes/map/${TOOL}" \
                --vectors "${VECTORS}" \
                --map-dir "${BITNODES_MAPS}" \
                --live-map-dir "${BITNODES_LIVE_MAP}" \
                --compact
            fi
          done

      - name: Mirror canonical live-map files from ZZX source if needed
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "${BITNODES_LIVE_MAP}/data/map-points.geojson" ] && [ -f "${BITNODES_LIVE_MAP}/zzxbitnodes/data/map-points.geojson" ]; then
            cp "${BITNODES_LIVE_MAP}/zzxbitnodes/data/map-points.geojson" "${BITNODES_LIVE_MAP}/data/map-points.geojson"
          fi

          for FILE in \
            map-settings.json \
            map-settings-profiles.json \
            map-theme.json \
            map-themes.json \
            map-tile-providers.json \
            map-fonts.json \
            vector-types.json \
            map-layers.json \
            map-overlays.json \
            map-vectors.json \
            map-polygons.geojson \
            map-regions.json \
            map-region-layers.json \
            map-continents.json \
            map-continent-layers.json \
            map-countries.json \
            map-country-layers.json \
            map-territories.json \
            map-territory-layers.json \
            map-counties.json \
            map-county-layers.json \
            map-cities.json \
            map-city-layers.json \
            map-parcels.json \
            map-parcel-layers.json \
            map-buildings.geojson \
            map-building-layers.json \
            map-timezones.json \
            map-timezone-layers.json \
            map-w3w-addresses.json \
            map-w3w-address-layers.json \
            map-zzxgcs-addresses.json \
            map-zzxgcs-address-layers.json \
            map-geohashids.json \
            map-geohashid-layers.json \
            map-nodes.json \
            map-node-layers.json \
            map-build-report.json
          do
            if [ ! -f "${BITNODES_LIVE_MAP}/data/${FILE}" ] && [ -f "${BITNODES_LIVE_MAP}/zzxbitnodes/data/${FILE}" ]; then
              cp "${BITNODES_LIVE_MAP}/zzxbitnodes/data/${FILE}" "${BITNODES_LIVE_MAP}/data/${FILE}"
            fi
          done

      - name: Validate canonical live-map output
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              Path("bitcoin/bitnodes/live-map/data/map-points.geojson"),
              Path("bitcoin/bitnodes/live-map/data/map-vectors.json"),
              Path("bitcoin/bitnodes/live-map/data/map-settings.json"),
              Path("bitcoin/bitnodes/live-map/data/map-theme.json"),
              Path("bitcoin/bitnodes/live-map/data/vector-types.json"),
          ]

          for path in required:
              if not path.exists():
                  raise SystemExit(f"missing {path}")

          geojson = json.loads(required[0].read_text(encoding="utf-8"))

          if geojson.get("type") != "FeatureCollection":
              raise SystemExit("map-points.geojson is not a GeoJSON FeatureCollection")

          features = geojson.get("features")

          if not isinstance(features, list):
              raise SystemExit("map-points.geojson features is not a list")

          if len(features) < 1:
              raise SystemExit("map-points.geojson has zero plotted features")

          vectors = json.loads(required[1].read_text(encoding="utf-8"))
          points = vectors.get("points", [])

          if not isinstance(points, list) or len(points) < 1:
              raise SystemExit("map-vectors.json has zero points")

          print(f"live-map canonical feature count: {len(features)}")
          print(f"live-map canonical vector point count: {len(points)}")
          PY

      - name: Enforce public map file-size policy
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          import time
          from pathlib import Path

          max_bytes = int(os.environ["MAX_PUBLIC_JSON_BYTES"])
          roots = [
              Path(os.environ["BITNODES_MAPS"]),
              Path(os.environ["BITNODES_LIVE_MAP"]),
          ]

          shard_target = 18000000

          def read_json(path):
              return json.loads(path.read_text(encoding="utf-8"))

          def write_json(path, payload):
              path.parent.mkdir(parents=True, exist_ok=True)
              tmp = path.with_suffix(path.suffix + ".tmp")
              tmp.write_text(
                  json.dumps(payload, ensure_ascii=False, separators=(",", ":"), sort_keys=False) + "\n",
                  encoding="utf-8",
              )
              tmp.replace(path)

          def encoded_size(payload):
              return len(json.dumps(payload, ensure_ascii=False, separators=(",", ":")).encode("utf-8"))

          def find_big_key(payload):
              if not isinstance(payload, dict):
                  return None

              for key in ("features", "points", "nodes", "addresses", "layers"):
                  value = payload.get(key)

                  if isinstance(value, (list, dict)) and len(value) > 0:
                      return key

              return None

          sharded = []

          for root in roots:
              for path in sorted(root.rglob("*.json")) + sorted(root.rglob("*.geojson")):
                  if not path.is_file() or path.stat().st_size <= max_bytes:
                      continue

                  payload = read_json(path)
                  key = find_big_key(payload)

                  if not key:
                      continue

                  value = payload.get(key)
                  shard_dir = path.parent / f"{key}-shards"
                  shard_dir.mkdir(parents=True, exist_ok=True)

                  for old in shard_dir.glob("*.json"):
                      old.unlink()

                  index = {
                      "schema_version": "0.2.0",
                      "generated_at": int(time.time()),
                      "source_file": path.name,
                      "key": key,
                      "container": "dict" if isinstance(value, dict) else "list",
                      "count": len(value),
                      "shards": [],
                  }

                  current = {} if isinstance(value, dict) else []
                  iterator = value.items() if isinstance(value, dict) else enumerate(value)
                  shard_no = 0

                  for item_key, item_value in iterator:
                      if isinstance(value, dict):
                          current[item_key] = item_value
                      else:
                          current.append(item_value)

                      if encoded_size({key: current}) >= shard_target:
                          shard_path = shard_dir / f"{key}-{shard_no:04d}.json"
                          write_json(shard_path, {
                              "schema_version": "0.2.0",
                              key: current,
                          })
                          index["shards"].append({
                              "path": f"{key}-shards/{shard_path.name}",
                              "count": len(current),
                              "size_bytes": shard_path.stat().st_size,
                          })
                          current = {} if isinstance(value, dict) else []
                          shard_no += 1

                  if current:
                      shard_path = shard_dir / f"{key}-{shard_no:04d}.json"
                      write_json(shard_path, {
                          "schema_version": "0.2.0",
                          key: current,
                      })
                      index["shards"].append({
                          "path": f"{key}-shards/{shard_path.name}",
                          "count": len(current),
                          "size_bytes": shard_path.stat().st_size,
                      })

                  write_json(shard_dir / "index.json", index)

                  lite = dict(payload)
                  lite[key] = {
                      "sharded": True,
                      "key": key,
                      "count": len(value),
                      "index": f"{key}-shards/index.json",
                      "shards": index["shards"],
                  }
                  lite.setdefault("zzx_static_api", {})
                  lite["zzx_static_api"].update({
                      "sharded": True,
                      "max_public_json_bytes": max_bytes,
                      "original_size_bytes": path.stat().st_size,
                      "shard_index": f"{key}-shards/index.json",
                  })

                  write_json(path, lite)

                  sharded.append({
                      "path": str(path),
                      "key": key,
                      "count": len(value),
                      "shards": len(index["shards"]),
                  })

          manifest = {
              "schema_version": "0.2.0",
              "generated_at": int(time.time()),
              "max_public_json_bytes": max_bytes,
              "sharded_files": sharded,
          }

          write_json(Path(os.environ["BITNODES_LIVE_MAP"]) / "data" / "map-size-manifest.json", manifest)

          bad = []

          for root in roots:
              for path in root.rglob("*"):
                  if path.is_file() and path.stat().st_size > max_bytes:
                      if "-shards" in str(path):
                          continue
                      bad.append((path.stat().st_size, path))

          if bad:
              print("Oversized map files remain:")
              for size, path in bad:
                  print(f"{size} {path}")
              raise SystemExit(1)

          print("Map file-size policy passed.")
          PY

      - name: Prune generated cache files
        shell: bash
        run: |
          set -euo pipefail

          find tools/bitnodes -type d -name '__pycache__' -prune -exec rm -rf {} + || true
          find bitcoin/bitnodes -type d -name '__pycache__' -prune -exec rm -rf {} + || true
          find . -type f -name '*.pyc' -delete || true

      - name: Commit and push map outputs
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "zzx-labs-maphost-bot"
          git config user.email "actions@github.com"

          git add -A \
            "${BITNODES_MAPS}" \
            "${BITNODES_LIVE_MAP}"

          if git diff --cached --quiet; then
            printf '%s\n' "No map changes."
            exit 0
          fi

          git commit -m "Update Bitnodes map host outputs"

          for attempt in 1 2 3 4 5; do
            git fetch origin main

            if git rebase --autostash origin/main && git push origin HEAD:main; then
              printf '%s\n' "Map outputs pushed."
              exit 0
            fi

            git rebase --abort || true
            printf '%s\n' "Map push attempt ${attempt} failed; retrying."
            sleep 10
          done

          printf '%s\n' "Failed to push map outputs."
          exit 1
