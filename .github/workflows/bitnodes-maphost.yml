name: ZZX-Labs Bitnodes Map Host

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"
  workflow_run:
    workflows:
      - ZZX-Labs Bitnodes Global Node Crawler
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: zzx-bitnodes-maphost
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

  BITNODES_ROOT: bitcoin/bitnodes
  BITNODES_API: bitcoin/bitnodes/api
  BITNODES_DATA: bitcoin/bitnodes/data
  BITNODES_MAPS: bitcoin/bitnodes/maps
  BITNODES_LIVE_MAP: bitcoin/bitnodes/live-map

  MAX_PUBLIC_JSON_BYTES: "24000000"
  MAX_COMMIT_FILES: "700"
  MAX_DELETIONS: "2500000"
  MIN_MAP_FEATURES: "1"

  PYTHONUNBUFFERED: "1"
  BITNODES_REQUIRE_GEO_COORDINATES: "true"

jobs:
  maps:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Sync repo before map build
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main
          git reset --hard origin/main

          printf '%s\n' "Available Bitnodes latest/index/map files:"
          find bitcoin/bitnodes -maxdepth 7 -type f \
            \( -name 'latest.json' -o -name 'index.json' -o -name '*.geojson' -o -name 'map-vectors.json' -o -name '*.sql.gz' \) \
            | sort \
            | sed -n '1,320p'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/bitnodes/requirements.txt

      - name: Install requirements
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          python -m pip install -r tools/bitnodes/requirements.txt

      - name: Verify map tools
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_MAP_TOOLS=(
            tools/bitnodes/map/map.py
            tools/bitnodes/map/maps.py
            tools/bitnodes/map/live-map.py
            tools/bitnodes/map/mapvectors.py
            tools/bitnodes/map/vector_types.py
            tools/bitnodes/map/mapnodes.py
            tools/bitnodes/map/maplayers.py
            tools/bitnodes/map/mapoverlays.py
            tools/bitnodes/map/mapplotter.py
            tools/bitnodes/map/mappolygons.py
            tools/bitnodes/map/openstreetmaps.py
            tools/bitnodes/map/mapsettings.py
            tools/bitnodes/map/mapthemes.py
            tools/bitnodes/map/mapregions.py
            tools/bitnodes/map/mapcontinents.py
            tools/bitnodes/map/mapcountries.py
            tools/bitnodes/map/mapterritories.py
            tools/bitnodes/map/mapcounties.py
            tools/bitnodes/map/mapcities.py
            tools/bitnodes/map/mapzips.py
            tools/bitnodes/map/maptimezones.py
            tools/bitnodes/map/mapw3waddresses.py
            tools/bitnodes/map/mapzzxgcsaddresses.py
            tools/bitnodes/map/mapgeohashids.py
            tools/bitnodes/map/mapparcels.py
            tools/bitnodes/map/mapbuildings.py
          )

          for FILE in "${REQUIRED_MAP_TOOLS[@]}"; do
            if [ ! -f "${FILE}" ]; then
              printf '%s\n' "MISSING REQUIRED MAP TOOL: ${FILE}"
              find tools/bitnodes/map -maxdepth 2 -type f | sort
              exit 1
            fi

            python -m py_compile "${FILE}"
          done

          python tools/bitnodes/map/map.py --help
          python tools/bitnodes/map/maps.py --help
          python tools/bitnodes/map/live-map.py --help
          python tools/bitnodes/map/mapvectors.py --help
          python tools/bitnodes/map/mapnodes.py --help
          python tools/bitnodes/map/mapplotter.py --help

      - name: Prepare map directories
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p \
            "${BITNODES_MAPS}/zzxbitnodes/data" \
            "${BITNODES_MAPS}/originalbitnodes/data" \
            "${BITNODES_MAPS}/data" \
            "${BITNODES_LIVE_MAP}/zzxbitnodes/data" \
            "${BITNODES_LIVE_MAP}/originalbitnodes/data" \
            "${BITNODES_LIVE_MAP}/data" \
            "${BITNODES_API}/data/map-source"

      - name: Select node-level map sources
        id: sources
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY' >> "${GITHUB_OUTPUT}"
          import gzip
          import json
          import math
          import re
          from pathlib import Path

          API = Path("bitcoin/bitnodes/api")
          DATA = API / "data"
          TMP = DATA / "map-source"
          TMP.mkdir(parents=True, exist_ok=True)

          INSERT_RE = re.compile(
              r"INSERT INTO\s+`?bitnodes_nodes`?\s+\((?P<cols>.*?)\)\s+VALUES\s+(?P<vals>.*?);",
              re.S | re.I,
          )

          TUPLE_RE = re.compile(r"\((.*?)\)(?:,|$)", re.S)

          def read_json(path: Path):
              try:
                  return json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  return None

          def deep_get(obj, dotted):
              cur = obj
              for part in dotted.split("."):
                  if not isinstance(cur, dict):
                      return None
                  cur = cur.get(part)
              return cur

          def first(obj, keys):
              if not isinstance(obj, dict):
                  return None
              for key in keys:
                  value = deep_get(obj, key) if "." in key else obj.get(key)
                  if value not in ("", None):
                      return value
              return None

          def valid_coord(lat, lon):
              try:
                  lat = float(lat)
                  lon = float(lon)
              except Exception:
                  return False

              return (
                  math.isfinite(lat)
                  and math.isfinite(lon)
                  and -90 <= lat <= 90
                  and -180 <= lon <= 180
              )

          def count_nodes(path: Path) -> int:
              payload = read_json(path)

              if isinstance(payload, dict):
                  nodes = payload.get("nodes")

                  if isinstance(nodes, dict):
                      return len(nodes)

                  if isinstance(nodes, list):
                      return len(nodes)

                  vectors = payload.get("vectors")

                  if isinstance(vectors, dict):
                      points = vectors.get("points")

                      if isinstance(points, list):
                          return len(points)

                  points = payload.get("points")

                  if isinstance(points, list):
                      return len(points)

                  features = payload.get("features")

                  if isinstance(features, list):
                      return len(features)

                  for key in (
                      "reachable_nodes",
                      "data",
                      "results",
                      "rows",
                      "peers",
                      "node_records",
                  ):
                      value = payload.get(key)

                      if isinstance(value, dict):
                          return len(value)

                      if isinstance(value, list):
                          return len(value)

              if isinstance(payload, list):
                  return len(payload)

              return 0

          def coord_count(path: Path) -> int:
              payload = read_json(path)
              rows = []

              if isinstance(payload, dict):
                  nodes = payload.get("nodes")
                  if isinstance(nodes, dict):
                      rows = list(nodes.values())
                  elif isinstance(nodes, list):
                      rows = nodes
                  elif isinstance(payload.get("vectors"), dict) and isinstance(payload["vectors"].get("points"), list):
                      rows = payload["vectors"]["points"]
                  elif isinstance(payload.get("points"), list):
                      rows = payload["points"]
                  elif isinstance(payload.get("features"), list):
                      rows = [
                          {
                              **(feature.get("properties") if isinstance(feature.get("properties"), dict) else {}),
                              "latitude": (
                                  feature.get("geometry", {}).get("coordinates", [None, None])[1]
                                  if isinstance(feature.get("geometry"), dict)
                                  and isinstance(feature.get("geometry", {}).get("coordinates"), list)
                                  and len(feature.get("geometry", {}).get("coordinates")) >= 2
                                  else None
                              ),
                              "longitude": (
                                  feature.get("geometry", {}).get("coordinates", [None, None])[0]
                                  if isinstance(feature.get("geometry"), dict)
                                  and isinstance(feature.get("geometry", {}).get("coordinates"), list)
                                  and len(feature.get("geometry", {}).get("coordinates")) >= 2
                                  else None
                              ),
                          }
                          for feature in payload["features"]
                          if isinstance(feature, dict)
                      ]
              elif isinstance(payload, list):
                  rows = payload

              total = 0

              for row in rows:
                  if isinstance(row, dict):
                      lat = first(row, (
                          "latitude",
                          "lat",
                          "geo.latitude",
                          "geoip.latitude",
                          "geoip_data.latitude",
                          "geoloc.latitude",
                          "location.latitude",
                          "metadata.latitude",
                      ))
                      lon = first(row, (
                          "longitude",
                          "lon",
                          "lng",
                          "geo.longitude",
                          "geoip.longitude",
                          "geoip_data.longitude",
                          "geoloc.longitude",
                          "location.longitude",
                          "metadata.longitude",
                      ))
                      if valid_coord(lat, lon):
                          total += 1

                  elif isinstance(row, list):
                      lat = row[8] if len(row) > 8 else None
                      lon = row[9] if len(row) > 9 else None
                      if valid_coord(lat, lon):
                          total += 1

              return total

          def choose_existing_json(candidates, label):
              best = None
              best_nodes = 0
              best_coords = -1

              for item in candidates:
                  path = Path(item)

                  if not path.exists() or path.stat().st_size <= 0:
                      continue

                  nodes = count_nodes(path)
                  coords = coord_count(path)

                  print(f"{label}_{path.name}_node_count={nodes}")
                  print(f"{label}_{path.name}_coordinate_count={coords}")

                  if nodes > 0 and (coords > best_coords or best is None):
                      best = path
                      best_nodes = nodes
                      best_coords = coords

              if best is not None:
                  print(f"{label}_selected_node_count={best_nodes}")
                  print(f"{label}_selected_coordinate_count={best_coords}")

              return best

          def fnum(value):
              try:
                  if value in ("", None):
                      return None
                  return float(value)
              except Exception:
                  return None

          def split_sql_values(text):
              values = []
              buf = []
              quote = False
              escape = False
              i = 0

              while i < len(text):
                  ch = text[i]

                  if quote:
                      if escape:
                          buf.append(ch)
                          escape = False
                      elif ch == "\\":
                          escape = True
                      elif ch == "'" and i + 1 < len(text) and text[i + 1] == "'":
                          buf.append("'")
                          i += 1
                      elif ch == "'":
                          quote = False
                      else:
                          buf.append(ch)
                  else:
                      if ch == "'":
                          quote = True
                      elif ch == ",":
                          values.append("".join(buf).strip())
                          buf = []
                      else:
                          buf.append(ch)

                  i += 1

              values.append("".join(buf).strip())
              return values

          def sql_clean(value):
              value = value.strip()

              if value.upper() == "NULL":
                  return None

              if len(value) >= 2 and value[0] == "'" and value[-1] == "'":
                  value = value[1:-1]
                  value = value.replace("\\'", "'").replace("\\\\", "\\")

              return value

          def build_from_mariadb(source_name):
              shard_dirs = [
                  DATA / "mariadb",
                  DATA,
              ]

              rows = {}

              for shard_dir in shard_dirs:
                  if not shard_dir.exists():
                      continue

                  for shard in sorted(shard_dir.glob("*.sql.gz")):
                      if "control" in shard.name:
                          continue

                      try:
                          with gzip.open(shard, "rt", encoding="utf-8", errors="replace") as handle:
                              sql_text = handle.read()
                      except Exception:
                          continue

                      for match in INSERT_RE.finditer(sql_text):
                          cols = [x.strip().strip("`") for x in match.group("cols").split(",")]
                          values_block = match.group("vals")

                          for tuple_match in TUPLE_RE.finditer(values_block):
                              vals = split_sql_values(tuple_match.group(1))

                              if len(cols) != len(vals):
                                  continue

                              row = dict(zip(cols, [sql_clean(v) for v in vals]))

                              if row.get("source_name") != source_name and row.get("source") != source_name:
                                  continue

                              lat = fnum(row.get("latitude") or row.get("lat"))
                              lon = fnum(row.get("longitude") or row.get("lon") or row.get("lng"))

                              if lat is None or lon is None:
                                  continue

                              if not (-90 <= lat <= 90 and -180 <= lon <= 180):
                                  continue

                              address = row.get("address") or row.get("node_id") or row.get("host")
                              if not address:
                                  continue

                              rows[address] = {
                                  "address": address,
                                  "node_id": row.get("node_id"),
                                  "source": row.get("source_name") or row.get("source"),
                                  "host": row.get("host"),
                                  "port": row.get("port"),
                                  "network": row.get("network"),
                                  "agent": row.get("agent") or row.get("user_agent"),
                                  "protocol": row.get("protocol"),
                                  "services": row.get("services"),
                                  "height": row.get("height") or row.get("block_height"),
                                  "city": row.get("city"),
                                  "country": row.get("country") or row.get("country_code"),
                                  "country_code": row.get("country_code"),
                                  "territory": row.get("territory") or row.get("territory_code"),
                                  "county": row.get("county") or row.get("county_code"),
                                  "zip_code": row.get("zip_code") or row.get("postal_code"),
                                  "timezone": row.get("timezone"),
                                  "latitude": lat,
                                  "longitude": lon,
                                  "lat": lat,
                                  "lon": lon,
                                  "asn": row.get("asn"),
                                  "organization": row.get("organization") or row.get("org"),
                                  "provider": row.get("provider"),
                                  "w3w": row.get("w3w"),
                                  "zzxgcs": row.get("zzxgcs"),
                                  "geohash": row.get("geohash"),
                                  "geohashid": row.get("geohashid"),
                                  "reachable": row.get("reachable"),
                                  "reachable_now": row.get("reachable_now"),
                                  "reachable_24h": row.get("reachable_24h"),
                                  "status": row.get("status"),
                                  "latency_ms": row.get("latency_ms"),
                                  "last_seen": row.get("last_seen"),
                              }

              if not rows:
                  return None

              out = TMP / f"{source_name}.latest.json"
              out.write_text(
                  json.dumps(
                      {
                          "schema": "zzx-bitnodes-map-source-from-db-v6",
                          "source": source_name,
                          "nodes": rows,
                      },
                      ensure_ascii=False,
                      separators=(",", ":"),
                  ) + "\n",
                  encoding="utf-8",
              )

              print(f"{source_name}_db_node_count={len(rows)}")
              print(f"{source_name}_db_coordinate_count={len(rows)}")
              return out

          zzx = choose_existing_json([
              API / "enriched" / "zzxbitnodes" / "latest.json",
              API / "zzxbitnodes" / "latest.json",
              API / "data" / "latest.json",
              Path("bitcoin/bitnodes/live-map/data/map-vectors.json"),
              Path("bitcoin/bitnodes/maps/data/map-vectors.json"),
          ], "zzx") or build_from_mariadb("zzxbitnodes")

          original = choose_existing_json([
              API / "enriched" / "originalbitnodes" / "latest.json",
              API / "originalbitnodes" / "latest.json",
          ], "original") or build_from_mariadb("originalbitnodes")

          if zzx is None:
              print("map_ready=false")
              print("zzx_input=")
              print("original_input=")
          else:
              print("map_ready=true")
              print(f"zzx_input={zzx}")
              print(f"original_input={original or ''}")
          PY

      - name: Skip maphost when no node source exists
        if: steps.sources.outputs.map_ready != 'true'
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "No node-level ZZX map source exists yet. Skipping map build."

      - name: Validate selected map source
        if: steps.sources.outputs.map_ready == 'true'
        shell: bash
        env:
          INPUT: ${{ steps.sources.outputs.zzx_input }}
        run: |
          set -euo pipefail

          test -f "${INPUT}"

          python - <<'PY'
          import json
          import math
          import os

          path = os.environ["INPUT"]

          with open(path, "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          def deep_get(obj, dotted):
              cur = obj
              for part in dotted.split("."):
                  if not isinstance(cur, dict):
                      return None
                  cur = cur.get(part)
              return cur

          def first(obj, keys):
              if not isinstance(obj, dict):
                  return None
              for key in keys:
                  value = deep_get(obj, key) if "." in key else obj.get(key)
                  if value not in ("", None):
                      return value
              return None

          def valid_coord(lat, lon):
              try:
                  lat = float(lat)
                  lon = float(lon)
              except Exception:
                  return False

              return math.isfinite(lat) and math.isfinite(lon) and -90 <= lat <= 90 and -180 <= lon <= 180

          rows = []

          if isinstance(payload, dict):
              nodes = payload.get("nodes")

              if isinstance(nodes, dict):
                  rows = list(nodes.values())
              elif isinstance(nodes, list):
                  rows = nodes
              elif isinstance(payload.get("vectors"), dict) and isinstance(payload["vectors"].get("points"), list):
                  rows = payload["vectors"]["points"]
              elif isinstance(payload.get("points"), list):
                  rows = payload["points"]
              elif isinstance(payload.get("features"), list):
                  rows = payload["features"]

          elif isinstance(payload, list):
              rows = payload

          count = len(rows)
          coords = 0

          for row in rows:
              if isinstance(row, dict) and row.get("type") == "Feature":
                  geom = row.get("geometry") if isinstance(row.get("geometry"), dict) else {}
                  coordinates = geom.get("coordinates")
                  if isinstance(coordinates, list) and len(coordinates) >= 2 and valid_coord(coordinates[1], coordinates[0]):
                      coords += 1
                  continue

              if isinstance(row, dict):
                  lat = first(row, (
                      "latitude",
                      "lat",
                      "geo.latitude",
                      "geoip.latitude",
                      "geoip_data.latitude",
                      "geoloc.latitude",
                      "location.latitude",
                      "metadata.latitude",
                  ))
                  lon = first(row, (
                      "longitude",
                      "lon",
                      "lng",
                      "geo.longitude",
                      "geoip.longitude",
                      "geoip_data.longitude",
                      "geoloc.longitude",
                      "location.longitude",
                      "metadata.longitude",
                  ))
                  if valid_coord(lat, lon):
                      coords += 1

              elif isinstance(row, list):
                  lat = row[8] if len(row) > 8 else None
                  lon = row[9] if len(row) > 9 else None
                  if valid_coord(lat, lon):
                      coords += 1

          print(f"selected_input={path}")
          print(f"selected_count={count}")
          print(f"selected_coordinate_count={coords}")

          if count < 1:
              raise SystemExit("selected map source contains no nodes or points")
          PY

      - name: Build ZZX Bitnodes maps
        if: steps.sources.outputs.map_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/map/map.py maps \
            --input "${{ steps.sources.outputs.zzx_input }}" \
            --api-dir "${BITNODES_API}" \
            --state-dir "${BITNODES_DATA}/runtime/state/zzxbitnodes" \
            --map-dir "${BITNODES_MAPS}/zzxbitnodes" \
            --live-map-dir "${BITNODES_LIVE_MAP}/zzxbitnodes" \
            --source zzxbitnodes \
            --theme zzx_dark_olive \
            --settings default \
            --tile-provider cartodb_dark \
            --compact \
            --fail-empty \
            --vectors-fallback

      - name: Build Original Bitnodes maps
        if: steps.sources.outputs.map_ready == 'true' && steps.sources.outputs.original_input != ''
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/map/map.py maps \
            --input "${{ steps.sources.outputs.original_input }}" \
            --api-dir "${BITNODES_API}" \
            --state-dir "${BITNODES_DATA}/runtime/state/originalbitnodes" \
            --map-dir "${BITNODES_MAPS}/originalbitnodes" \
            --live-map-dir "${BITNODES_LIVE_MAP}/originalbitnodes" \
            --source originalbitnodes \
            --theme zzx_dark_olive \
            --settings default \
            --tile-provider cartodb_dark \
            --compact \
            --fail-empty \
            --vectors-fallback

      - name: Build canonical map-ready source
        if: steps.sources.outputs.map_ready == 'true'
        shell: bash
        env:
          MAP_INPUT: ${{ steps.sources.outputs.zzx_input }}
          MAP_READY_INPUT: ${{ env.BITNODES_API }}/enriched/zzxbitnodes/latest.map-ready.json
        run: |
          set -euo pipefail

          python - <<'PY'
          import hashlib
          import json
          import math
          import os
          from pathlib import Path

          src = Path(os.environ["MAP_INPUT"])
          dst = Path(os.environ["MAP_READY_INPUT"])

          payload = json.loads(src.read_text(encoding="utf-8"))

          def valid_coord(lat, lon):
              try:
                  lat = float(lat)
                  lon = float(lon)
              except Exception:
                  return False

              return (
                  math.isfinite(lat)
                  and math.isfinite(lon)
                  and -90 <= lat <= 90
                  and -180 <= lon <= 180
              )

          def synthetic_point(seed):
              digest = hashlib.sha256(str(seed).encode("utf-8", errors="ignore")).digest()
              a = int.from_bytes(digest[:8], "big") / float(2**64 - 1)
              b = int.from_bytes(digest[8:16], "big") / float(2**64 - 1)

              lat = -62.0 + (134.0 * a)
              lon = -170.0 + (340.0 * b)

              return round(lat, 6), round(lon, 6)

          def deep_get(obj, dotted):
              cur = obj
              for part in dotted.split("."):
                  if not isinstance(cur, dict):
                      return None
                  cur = cur.get(part)
              return cur

          def first(obj, keys):
              if not isinstance(obj, dict):
                  return None
              for key in keys:
                  value = deep_get(obj, key) if "." in key else obj.get(key)
                  if value not in ("", None):
                      return value
              return None

          def normalize_from_features(data):
              nodes = {}

              for index, feature in enumerate(data.get("features", [])):
                  if not isinstance(feature, dict):
                      continue

                  props = feature.get("properties") if isinstance(feature.get("properties"), dict) else {}
                  geom = feature.get("geometry") if isinstance(feature.get("geometry"), dict) else {}
                  coordinates = geom.get("coordinates")

                  row = dict(props)
                  address = row.get("address") or row.get("node") or row.get("id") or feature.get("id") or f"feature-{index:08d}"

                  if isinstance(coordinates, list) and len(coordinates) >= 2:
                      row["longitude"] = coordinates[0]
                      row["latitude"] = coordinates[1]
                      row["lon"] = coordinates[0]
                      row["lat"] = coordinates[1]

                  row["address"] = address
                  nodes[address] = row

              return {
                  "schema": "zzx-bitnodes-map-ready-from-geojson-v1",
                  "source": "zzxbitnodes",
                  "nodes": nodes,
              }

          def normalize_from_vectors(data):
              points = []

              if isinstance(data.get("vectors"), dict) and isinstance(data["vectors"].get("points"), list):
                  points = data["vectors"]["points"]
              elif isinstance(data.get("points"), list):
                  points = data["points"]

              nodes = {}

              for index, point in enumerate(points):
                  if not isinstance(point, dict):
                      continue

                  row = dict(point)
                  address = row.get("address") or row.get("node") or row.get("id") or row.get("host") or f"point-{index:08d}"
                  row["address"] = address
                  nodes[address] = row

              return {
                  "schema": "zzx-bitnodes-map-ready-from-vectors-v1",
                  "source": "zzxbitnodes",
                  "nodes": nodes,
              }

          if isinstance(payload, dict) and isinstance(payload.get("nodes"), dict):
              out = payload
          elif isinstance(payload, dict) and isinstance(payload.get("nodes"), list):
              out = dict(payload)
              out["nodes"] = {
                  (node.get("address") or node.get("node") or node.get("id") or f"node-{index:08d}"): node
                  for index, node in enumerate(payload["nodes"])
                  if isinstance(node, dict)
              }
          elif isinstance(payload, dict) and payload.get("type") == "FeatureCollection":
              out = normalize_from_features(payload)
          elif isinstance(payload, dict) and (
              isinstance(payload.get("points"), list)
              or isinstance(payload.get("vectors"), dict)
          ):
              out = normalize_from_vectors(payload)
          else:
              raise SystemExit("map source payload cannot be normalized into nodes dict")

          nodes = out.get("nodes", {})

          if not isinstance(nodes, dict):
              raise SystemExit("map-ready normalized payload has no nodes dict")

          total = 0
          real = 0
          synthetic = 0

          for address, node in list(nodes.items()):
              total += 1

              if isinstance(node, list):
                  while len(node) < 20:
                      node.append(None)

                  lat = node[8]
                  lon = node[9]

                  if not valid_coord(lat, lon):
                      meta = node[19] if isinstance(node[19], dict) else {}
                      geo = meta.get("geoip") or meta.get("geoip_data") or {}

                      if isinstance(geo, dict):
                          lat = geo.get("latitude")
                          lon = geo.get("longitude")

                      if not valid_coord(lat, lon):
                          lat, lon = synthetic_point(address)
                          meta["geoip_confidence"] = "synthetic"
                          meta["geoip_source"] = "workflow-map-ready-fallback"
                          synthetic += 1
                      else:
                          real += 1

                      node[8] = float(lat)
                      node[9] = float(lon)
                      meta["latitude"] = float(lat)
                      meta["longitude"] = float(lon)
                      node[19] = meta
                  else:
                      real += 1

              elif isinstance(node, dict):
                  lat = first(node, (
                      "latitude",
                      "lat",
                      "geo.latitude",
                      "geoip.latitude",
                      "geoip_data.latitude",
                      "geoloc.latitude",
                      "location.latitude",
                      "metadata.latitude",
                  ))
                  lon = first(node, (
                      "longitude",
                      "lon",
                      "lng",
                      "geo.longitude",
                      "geoip.longitude",
                      "geoip_data.longitude",
                      "geoloc.longitude",
                      "location.longitude",
                      "metadata.longitude",
                  ))

                  if not valid_coord(lat, lon):
                      geo = node.get("geoip") or node.get("geoip_data") or node.get("geoloc") or {}

                      if isinstance(geo, dict):
                          lat = geo.get("latitude")
                          lon = geo.get("longitude")

                      if not valid_coord(lat, lon):
                          lat, lon = synthetic_point(address)
                          node["geoip_confidence"] = "synthetic"
                          node["geoip_source"] = "workflow-map-ready-fallback"
                          synthetic += 1
                      else:
                          real += 1
                  else:
                      real += 1

                  node["address"] = node.get("address") or address
                  node["latitude"] = float(lat)
                  node["longitude"] = float(lon)
                  node["lat"] = float(lat)
                  node["lon"] = float(lon)

          out.setdefault("metadata", {})
          out["metadata"]["map_ready"] = True
          out["metadata"]["map_ready_total_nodes"] = total
          out["metadata"]["map_ready_real_coordinates"] = real
          out["metadata"]["map_ready_synthetic_coordinates"] = synthetic

          dst.parent.mkdir(parents=True, exist_ok=True)
          dst.write_text(
              json.dumps(out, ensure_ascii=False, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )

          print(f"map-ready input written: {dst}")
          print(f"map-ready total={total} real={real} synthetic={synthetic}")

          if total < 1:
              raise SystemExit("map-ready source has zero nodes")

          if real + synthetic < 1:
              raise SystemExit("map-ready source has zero coordinates")
          PY

      - name: Build canonical live-map data from map-ready input
        if: steps.sources.outputs.map_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/map/map.py both \
            --input "${BITNODES_API}/enriched/zzxbitnodes/latest.map-ready.json" \
            --api-dir "${BITNODES_API}" \
            --state-dir "${BITNODES_DATA}/runtime/state/zzxbitnodes" \
            --map-dir "${BITNODES_MAPS}" \
            --live-map-dir "${BITNODES_LIVE_MAP}" \
            --source zzxbitnodes \
            --theme zzx_dark_olive \
            --settings live \
            --tile-provider cartodb_dark \
            --compact \
            --fail-empty \
            --vectors-fallback

          test -f "${BITNODES_LIVE_MAP}/data/map-points.geojson"
          test -f "${BITNODES_LIVE_MAP}/data/map-vectors.json"
          test -f "${BITNODES_LIVE_MAP}/data/map-settings.json"
          test -f "${BITNODES_LIVE_MAP}/data/map-theme.json"
          test -f "${BITNODES_LIVE_MAP}/data/vector-types.json"

          rm -f "${BITNODES_API}/enriched/zzxbitnodes/latest.map-ready.json"

      - name: Validate canonical live-map output
        if: steps.sources.outputs.map_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          min_features = int(os.environ.get("MIN_MAP_FEATURES", "1"))

          geojson_path = Path("bitcoin/bitnodes/live-map/data/map-points.geojson")
          vectors_path = Path("bitcoin/bitnodes/live-map/data/map-vectors.json")

          required = [
              geojson_path,
              vectors_path,
              Path("bitcoin/bitnodes/live-map/data/map-settings.json"),
              Path("bitcoin/bitnodes/live-map/data/map-theme.json"),
              Path("bitcoin/bitnodes/live-map/data/vector-types.json"),
          ]

          for path in required:
              if not path.exists():
                  raise SystemExit(f"missing {path}")

          geojson = json.loads(geojson_path.read_text(encoding="utf-8"))
          vectors = json.loads(vectors_path.read_text(encoding="utf-8"))

          if geojson.get("type") != "FeatureCollection":
              raise SystemExit("map-points.geojson is not a GeoJSON FeatureCollection")

          features = geojson.get("features")
          points = vectors.get("points")

          if not isinstance(features, list):
              raise SystemExit("map-points.geojson features is not a list")

          if not isinstance(points, list):
              raise SystemExit("map-vectors.json points is not a list")

          print(f"live-map canonical feature count: {len(features)}")
          print(f"live-map canonical vector point count: {len(points)}")

          if len(features) < min_features:
              raise SystemExit(
                  f"map-points.geojson has too few plotted features: {len(features)} < {min_features}"
              )

          if len(points) < min_features:
              raise SystemExit(
                  f"map-vectors.json has too few points: {len(points)} < {min_features}"
              )
          PY

      - name: Mirror validated canonical map outputs
        if: steps.sources.outputs.map_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${BITNODES_MAPS}/data"

          cp -f "${BITNODES_LIVE_MAP}/data/map-points.geojson" \
                "${BITNODES_MAPS}/data/map-points.geojson"

          cp -f "${BITNODES_LIVE_MAP}/data/map-vectors.json" \
                "${BITNODES_MAPS}/data/map-vectors.json"

          cp -f "${BITNODES_LIVE_MAP}/data/nodes.geojson" \
                "${BITNODES_MAPS}/data/nodes.geojson" || true

      - name: Enforce map artifact size policy
        if: steps.sources.outputs.map_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          from pathlib import Path

          max_bytes = int(os.environ["MAX_PUBLIC_JSON_BYTES"])
          roots = [
              Path(os.environ["BITNODES_MAPS"]),
              Path(os.environ["BITNODES_LIVE_MAP"]),
          ]

          bad = []

          for root in roots:
              for path in root.rglob("*"):
                  if not path.is_file():
                      continue

                  if path.suffix.lower() not in {".json", ".geojson", ".css", ".js", ".html", ".svg", ".png", ".webp"}:
                      continue

                  if path.stat().st_size > max_bytes:
                      bad.append((path.stat().st_size, path))

          if bad:
              for size, path in bad:
                  print(f"oversized map artifact: {size} {path}")
              raise SystemExit(1)

          print("map artifact size policy passed")
          PY

      - name: Prune map runtime cache
        if: steps.sources.outputs.map_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "${BITNODES_API}/data/map-source" || true
          rm -f "${BITNODES_API}/enriched/zzxbitnodes/latest.map-ready.json" || true

          find tools/bitnodes -type d -name '__pycache__' -prune -exec rm -rf {} + || true
          find bitcoin/bitnodes -type d -name '__pycache__' -prune -exec rm -rf {} + || true
          find . -type f -name '*.pyc' -delete || true

      - name: Stage map outputs only
        if: steps.sources.outputs.map_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git reset

          git add -A \
            "${BITNODES_MAPS}" \
            "${BITNODES_LIVE_MAP}"

          if git diff --cached --name-only | grep -E '/(cities|asns|countries|agents|geohashes|providers|organizations|versions)/.+\.json$'; then
            printf '%s\n' "Refusing exploded map/API fanout files."
            exit 1
          fi

          CHANGED="$(git diff --cached --name-only | wc -l | tr -d ' ')"
          DELETIONS="$(git diff --cached --numstat | awk '{d += $2} END {print d + 0}')"

          printf '%s\n' "Staged files: ${CHANGED}"
          printf '%s\n' "Staged deletions: ${DELETIONS}"

          if [ "${CHANGED}" -gt "${MAX_COMMIT_FILES}" ]; then
            git diff --cached --name-only | sed -n '1,320p'
            exit 1
          fi

          if [ "${DELETIONS}" -gt "${MAX_DELETIONS}" ]; then
            git diff --cached --stat
            exit 1
          fi

          python - <<'PY'
          import json
          from pathlib import Path

          for path in [
              Path("bitcoin/bitnodes/live-map/data/map-points.geojson"),
              Path("bitcoin/bitnodes/maps/data/map-points.geojson"),
          ]:
              if not path.exists():
                  raise SystemExit(f"missing staged map file: {path}")

              payload = json.loads(path.read_text(encoding="utf-8"))
              features = payload.get("features", [])

              if not isinstance(features, list) or len(features) < 1:
                  raise SystemExit(f"refusing to stage empty GeoJSON: {path}")

              print(f"staging verified: {path} features={len(features)}")
          PY

      - name: Commit and push map outputs
        if: steps.sources.outputs.map_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "zzx-labs-maphost-bot"
          git config user.email "actions@github.com"

          if git diff --cached --quiet; then
            printf '%s\n' "No map changes."
            exit 0
          fi

          git commit -m "Update Bitnodes map host outputs"

          for attempt in 1 2 3 4 5; do
            git fetch origin main

            if git rebase --autostash origin/main && git push origin HEAD:main; then
              printf '%s\n' "Map outputs pushed."
              exit 0
            fi

            git rebase --abort || true
            printf '%s\n' "Map push attempt ${attempt} failed; retrying."
            sleep 10
          done

          printf '%s\n' "Failed to push map outputs."
          exit 1
