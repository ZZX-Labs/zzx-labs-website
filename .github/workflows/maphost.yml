name: Bitnodes Map Host

on:
  workflow_dispatch:

  schedule:
    - cron: "15 * * * *"

  workflow_run:
    workflows:
      - ZZX-Labs Bitnodes Global Node Crawler
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: zzx-bitnodes-maphost
  cancel-in-progress: false

jobs:
  maps:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/bitnodes/requirements.txt

      - name: Verify map tools
        run: |
          python tools/bitnodes/maps.py --help

      - name: Build ZZX Bitnodes maps
        run: |
          python tools/bitnodes/maps.py \
            --input bitcoin/bitnodes/api/enriched/zzxbitnodes/latest.json \
            --aggregate bitcoin/bitnodes/api/aggregate/zzxbitnodes/latest.json \
            --api-dir bitcoin/bitnodes/api \
            --state-dir bitcoin/bitnodes/data/state \
            --map-dir bitcoin/bitnodes/maps/zzxbitnodes \
            --live-map-dir bitcoin/bitnodes/live-map/zzxbitnodes \
            --source zzxbitnodes \
            --theme zzx_dark_olive \
            --settings default \
            --tile-provider cartodb_dark

      - name: Build Original Bitnodes maps
        run: |
          python tools/bitnodes/maps.py \
            --input bitcoin/bitnodes/api/enriched/originalbitnodes/latest.json \
            --aggregate bitcoin/bitnodes/api/aggregate/originalbitnodes/latest.json \
            --api-dir bitcoin/bitnodes/api \
            --state-dir bitcoin/bitnodes/data/state \
            --map-dir bitcoin/bitnodes/maps/originalbitnodes \
            --live-map-dir bitcoin/bitnodes/live-map/originalbitnodes \
            --source originalbitnodes \
            --theme zzx_dark_olive \
            --settings default \
            --tile-provider cartodb_dark

      - name: Build merged global maps
        run: |
          python tools/bitnodes/maps.py \
            --merge-sources \
            --input bitcoin/bitnodes/api/enriched \
            --aggregate-dir bitcoin/bitnodes/api/aggregate \
            --api-dir bitcoin/bitnodes/api \
            --state-dir bitcoin/bitnodes/data/state \
            --map-dir bitcoin/bitnodes/maps/global \
            --live-map-dir bitcoin/bitnodes/live-map/global \
            --source global \
            --theme zzx_dark_olive \
            --settings default \
            --tile-provider cartodb_dark

      - name: Build map indexes
        run: |
          python tools/bitnodes/maps.py \
            --build-indexes \
            --api-dir bitcoin/bitnodes/api \
            --map-dir bitcoin/bitnodes/maps \
            --live-map-dir bitcoin/bitnodes/live-map

      - name: Commit map outputs
        run: |
          git config user.name "zzx-labs-maphost-bot"
          git config user.email "actions@github.com"

          git add \
            bitcoin/bitnodes/maps \
            bitcoin/bitnodes/live-map

          if git diff --cached --quiet; then
            printf '%s\n' "No map changes."
            exit 0
          fi

          git commit -m "Update Bitnodes map host outputs"

      - name: Push map outputs
        run: |
          for attempt in 1 2 3 4 5; do

            git fetch origin main

            if git rebase origin/main; then
              if git push origin HEAD:main; then
                printf '%s\n' "Map outputs pushed."
                exit 0
              fi
            fi

            git rebase --abort || true

            printf '%s\n' "Push attempt ${attempt} failed."

            sleep 10

          done

          exit 1
