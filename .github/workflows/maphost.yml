name: Bitnodes Map Host

on:
  workflow_dispatch:

  schedule:
    - cron: "15 * * * *"

  workflow_run:
    workflows:
      - ZZX-Labs Bitnodes Global Node Crawler
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: zzx-bitnodes-maphost
  cancel-in-progress: false

jobs:
  maps:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/bitnodes/requirements.txt

      - name: Verify map tools
        run: |
          python tools/bitnodes/maps.py --help
          python tools/bitnodes/mapplotter.py --help

      - name: Build ZZX Bitnodes base maps
        run: |
          python tools/bitnodes/maps.py \
            --input bitcoin/bitnodes/api/enriched/zzxbitnodes/latest.json \
            --api-dir bitcoin/bitnodes/api \
            --state-dir bitcoin/bitnodes/data/state \
            --map-dir bitcoin/bitnodes/maps/zzxbitnodes \
            --live-map-dir bitcoin/bitnodes/live-map/zzxbitnodes \
            --source zzxbitnodes \
            --theme zzx_dark_olive \
            --settings default \
            --tile-provider cartodb_dark

      - name: Plot ZZX Bitnodes map points
        run: |
          python tools/bitnodes/mapplotter.py \
            --input bitcoin/bitnodes/api/enriched/zzxbitnodes/latest.json \
            --aggregate bitcoin/bitnodes/api/aggregate/zzxbitnodes/latest.json \
            --output-dir bitcoin/bitnodes/maps/zzxbitnodes \
            --live-output-dir bitcoin/bitnodes/live-map/zzxbitnodes \
            --source zzxbitnodes

      - name: Build Original Bitnodes base maps
        run: |
          python tools/bitnodes/maps.py \
            --input bitcoin/bitnodes/api/enriched/originalbitnodes/latest.json \
            --api-dir bitcoin/bitnodes/api \
            --state-dir bitcoin/bitnodes/data/state \
            --map-dir bitcoin/bitnodes/maps/originalbitnodes \
            --live-map-dir bitcoin/bitnodes/live-map/originalbitnodes \
            --source originalbitnodes \
            --theme zzx_dark_olive \
            --settings default \
            --tile-provider cartodb_dark

      - name: Plot Original Bitnodes map points
        run: |
          python tools/bitnodes/mapplotter.py \
            --input bitcoin/bitnodes/api/enriched/originalbitnodes/latest.json \
            --aggregate bitcoin/bitnodes/api/aggregate/originalbitnodes/latest.json \
            --output-dir bitcoin/bitnodes/maps/originalbitnodes \
            --live-output-dir bitcoin/bitnodes/live-map/originalbitnodes \
            --source originalbitnodes

      - name: Build global map points
        run: |
          mkdir -p bitcoin/bitnodes/maps/global bitcoin/bitnodes/live-map/global

          python tools/bitnodes/mapplotter.py \
            --input bitcoin/bitnodes/api/enriched/zzxbitnodes/latest.json \
            --aggregate bitcoin/bitnodes/api/aggregate/zzxbitnodes/latest.json \
            --output-dir bitcoin/bitnodes/maps/global \
            --live-output-dir bitcoin/bitnodes/live-map/global \
            --source global

      - name: Commit and push map outputs
        run: |
          set -euo pipefail

          git config user.name "zzx-labs-maphost-bot"
          git config user.email "actions@github.com"

          git add -A \
            bitcoin/bitnodes/maps \
            bitcoin/bitnodes/live-map

          if git diff --cached --quiet; then
            printf '%s\n' "No map changes."
            exit 0
          fi

          git stash push --include-untracked --message "bitnodes-maphost-before-rebase"

          git fetch origin main
          git rebase --autostash origin/main

          if git stash list | grep -q "bitnodes-maphost-before-rebase"; then
            git stash pop || true
          fi

          git add -A \
            bitcoin/bitnodes/maps \
            bitcoin/bitnodes/live-map

          if git diff --cached --quiet; then
            printf '%s\n' "No map changes after rebase."
            exit 0
          fi

          git commit -m "Update Bitnodes map host outputs"

          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              printf '%s\n' "Map outputs pushed."
              exit 0
            fi

            printf '%s\n' "Map push attempt ${attempt} failed; rebasing..."

            git fetch origin main

            if git rebase --autostash origin/main; then
              sleep 10
              continue
            fi

            git rebase --abort || true
            sleep 10
          done

          printf '%s\n' "Failed to push map outputs."
          exit 1
