name: ZZX-Labs Bitnodes Global Node Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: bitnodes-static-api-crawler
  cancel-in-progress: false

jobs:
  crawl-bitnodes:
    runs-on: ubuntu-latest
    timeout-minutes: 58

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install crawler dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/bitnodes/requirements.txt

      - name: Download DB-IP GeoIP databases
        run: |
          mkdir -p bitcoin/bitnodes/data/geoip

          curl -L \
            -o bitcoin/bitnodes/data/geoip/dbip-city-lite.mmdb.gz \
            https://download.db-ip.com/free/dbip-city-lite-2026-05.mmdb.gz

          curl -L \
            -o bitcoin/bitnodes/data/geoip/dbip-asn-lite.mmdb.gz \
            https://download.db-ip.com/free/dbip-asn-lite-2026-05.mmdb.gz

          curl -L \
            -o bitcoin/bitnodes/data/geoip/dbip-country-lite.mmdb.gz \
            https://download.db-ip.com/free/dbip-country-lite-2026-05.mmdb.gz

          gunzip -f bitcoin/bitnodes/data/geoip/*.gz

      - name: Sync with remote before crawling
        run: |
          git fetch origin main
          git rebase origin/main

      - name: Run stable Bitnodes crawler daemon window
        run: |
          python tools/bitnodes/crawl.py \
            --daemon \
            --run-seconds 3000 \
            --interval 15 \
            --output bitcoin/bitnodes/api \
            --archive-dir bitcoin/bitnodes/archive \
            --state-dir bitcoin/bitnodes/data/state \
            --snapshot-24h-dir bitcoin/bitnodes/data/snapshots/24h \
            --seeder-dir bitcoin/bitnodes/data/seeders \
            --geoip-dir bitcoin/bitnodes/data/geoip \
            --timeout 5 \
            --limit 5000000 \
            --batch-size 4096 \
            --workers 256 \
            --getaddr-rounds 32 \
            --dns-seed-limit 4096 \
            --archive-replay-files 1000 \
            --export-mode reachable_24h

      - name: Backup master node registry to private repo
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          REGISTRY_PAT: ${{ secrets.BITNODES_REGISTRY_PAT }}
        run: |
          set -euo pipefail

          if [ -z "${REGISTRY_PAT}" ]; then
            printf '%s\n' "BITNODES_REGISTRY_PAT is not set."
            exit 1
          fi

          TODAY="$(date -u +%Y-%m-%d)"
          BACKUP_ROOT="/tmp/zzxbitnodesglobalregistry"

          rm -rf "${BACKUP_ROOT}"

          git clone \
            "https://x-access-token:${REGISTRY_PAT}@github.com/ZZX-Labs/zzxbitnodesglobalregistry.git" \
            "${BACKUP_ROOT}"

          mkdir -p "${BACKUP_ROOT}/registry/${TODAY}"
          mkdir -p "${BACKUP_ROOT}/latest"
          mkdir -p "${BACKUP_ROOT}/manifests"

          python tools/bitnodes/chunk_registry_backup.py \
            --input bitcoin/bitnodes/data/state \
            --api bitcoin/bitnodes/api \
            --output "${BACKUP_ROOT}/registry/${TODAY}" \
            --latest-output "${BACKUP_ROOT}/latest" \
            --max-mb 24

          python tools/bitnodes/update_daily_index.py \
            --repo-root "${BACKUP_ROOT}"

          cd "${BACKUP_ROOT}"

          git config user.name "zzx-labs-bitnodes-bot"
          git config user.email "actions@github.com"

          git add registry latest manifests README.md

          if git diff --cached --quiet; then
            printf '%s\n' "No private registry backup changes to commit."
            exit 0
          fi

          git commit -m "Backup global Bitnodes registry ${TODAY}"
          git push origin HEAD:main

      - name: Remove local GeoIP databases before commit
        run: |
          rm -f bitcoin/bitnodes/data/geoip/*.mmdb
          rm -f bitcoin/bitnodes/data/geoip/*.mmdb.gz

      - name: Commit Bitnodes snapshots
        run: |
          git config user.name "zzx-labs-bitnodes-bot"
          git config user.email "actions@github.com"

          git add bitcoin/bitnodes/api bitcoin/bitnodes/archive bitcoin/bitnodes/data

          if git diff --cached --quiet; then
            printf '%s\n' "No Bitnodes JSON changes to commit."
            exit 0
          fi

          git commit -m "Update Bitnodes static API snapshots"

      - name: Push Bitnodes snapshots
        run: |
          for attempt in 1 2 3 4 5; do
            git fetch origin main

            if git rebase origin/main; then
              if git push origin HEAD:main; then
                printf '%s\n' "Bitnodes snapshots pushed."
                exit 0
              fi
            fi

            git rebase --abort || true
            printf '%s\n' "Push attempt ${attempt} failed; retrying..."
            sleep 10
          done

          printf '%s\n' "Failed to push Bitnodes snapshots."
          exit 1
