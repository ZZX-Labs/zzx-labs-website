name: ZZX-Labs Bitnodes Global Node Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: zzx-bitnodes-global-crawler
  cancel-in-progress: false

jobs:
  crawl-bitnodes:
    runs-on: ubuntu-latest
    timeout-minutes: 58

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install crawler dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/bitnodes/requirements.txt

      - name: Validate Bitnodes tools
        run: |
          python tools/bitnodes/crawl.py --list-crawlers
          python tools/bitnodes/enrich.py --help
          python tools/bitnodes/aggregate.py --help

      - name: Download DB-IP GeoIP databases
        run: |
          set -euo pipefail
          mkdir -p bitcoin/bitnodes/data/geoip
          DBIP_MONTH="$(date -u +%Y-%m)"

          curl -fL -o bitcoin/bitnodes/data/geoip/dbip-city-lite.mmdb.gz "https://download.db-ip.com/free/dbip-city-lite-${DBIP_MONTH}.mmdb.gz"
          curl -fL -o bitcoin/bitnodes/data/geoip/dbip-asn-lite.mmdb.gz "https://download.db-ip.com/free/dbip-asn-lite-${DBIP_MONTH}.mmdb.gz"
          curl -fL -o bitcoin/bitnodes/data/geoip/dbip-country-lite.mmdb.gz "https://download.db-ip.com/free/dbip-country-lite-${DBIP_MONTH}.mmdb.gz"

          gunzip -f bitcoin/bitnodes/data/geoip/*.gz

      - name: Sync website repo before crawling
        run: |
          git fetch origin main
          git rebase origin/main

      - name: Run ZZX Bitnodes crawler window
        run: |
          python tools/bitnodes/crawl.py \
            --crawler zzxbitnodes \
            --daemon \
            --run-seconds 2400 \
            --interval 15 \
            --output bitcoin/bitnodes/api/zzxbitnodes \
            --archive-dir bitcoin/bitnodes/archive/zzxbitnodes \
            --state-dir bitcoin/bitnodes/data/state/zzxbitnodes \
            --snapshot-24h-dir bitcoin/bitnodes/data/snapshots/24h/zzxbitnodes \
            --seeder-dir bitcoin/bitnodes/data/seeders/zzxbitnodes \
            --geoip-dir bitcoin/bitnodes/data/geoip \
            --timeout 5 \
            --limit 5000000 \
            --batch-size 20000 \
            --workers 2048 \
            --getaddr-rounds 128 \
            --dns-seed-limit 10000 \
            --archive-replay-files 5000 \
            --export-mode reachable_24h \
            --mirror-legacy-api \
            --compact

      - name: Run Original Bitnodes-compatible crawler
        run: |
          python tools/bitnodes/crawl.py \
            --crawler originalbitnodes \
            --original-mode hybrid \
            --run-seconds 0 \
            --timeout 5 \
            --limit 500000 \
            --batch-size 4096 \
            --workers 256 \
            --getaddr-rounds 16 \
            --dns-seed-limit 4096 \
            --archive-replay-files 0 \
            --disable-archive-replay \
            --export-mode reachable \
            --compact

      - name: Enrich ZZX Bitnodes dataset
        run: |
          python tools/bitnodes/enrich.py \
            --input bitcoin/bitnodes/api/zzxbitnodes/latest.json \
            --output bitcoin/bitnodes/api/enriched/zzxbitnodes/latest.json \
            --report bitcoin/bitnodes/api/enriched/zzxbitnodes/enrichment-report.json \
            --source zzxbitnodes \
            --api-dir bitcoin/bitnodes/api \
            --state-dir bitcoin/bitnodes/data/state/zzxbitnodes \
            --geoip-dir bitcoin/bitnodes/data/geoip

      - name: Enrich Original Bitnodes dataset
        run: |
          python tools/bitnodes/enrich.py \
            --input bitcoin/bitnodes/api/originalbitnodes/latest.json \
            --output bitcoin/bitnodes/api/enriched/originalbitnodes/latest.json \
            --report bitcoin/bitnodes/api/enriched/originalbitnodes/enrichment-report.json \
            --source originalbitnodes \
            --api-dir bitcoin/bitnodes/api \
            --state-dir bitcoin/bitnodes/data/state/originalbitnodes \
            --geoip-dir bitcoin/bitnodes/data/geoip

      - name: Aggregate ZZX Bitnodes dataset
        run: |
          python tools/bitnodes/aggregate.py \
            --input bitcoin/bitnodes/api/enriched/zzxbitnodes/latest.json \
            --output bitcoin/bitnodes/api/aggregate/zzxbitnodes/latest.json \
            --api-dir bitcoin/bitnodes/api \
            --state-dir bitcoin/bitnodes/data/state/zzxbitnodes \
            --source zzxbitnodes

      - name: Aggregate Original Bitnodes dataset
        run: |
          python tools/bitnodes/aggregate.py \
            --input bitcoin/bitnodes/api/enriched/originalbitnodes/latest.json \
            --output bitcoin/bitnodes/api/aggregate/originalbitnodes/latest.json \
            --api-dir bitcoin/bitnodes/api \
            --state-dir bitcoin/bitnodes/data/state/originalbitnodes \
            --source originalbitnodes

      - name: Remove local GeoIP databases before public commit
        run: |
          rm -f bitcoin/bitnodes/data/geoip/*.mmdb
          rm -f bitcoin/bitnodes/data/geoip/*.mmdb.gz

      - name: Commit Bitnodes public snapshots
        run: |
          git config user.name "zzx-labs-bitnodes-bot"
          git config user.email "actions@github.com"

          git add bitcoin/bitnodes/api bitcoin/bitnodes/archive bitcoin/bitnodes/data

          if git diff --cached --quiet; then
            printf '%s\n' "No Bitnodes JSON changes to commit."
            exit 0
          fi

          git commit -m "Update Bitnodes static API snapshots"

      - name: Push Bitnodes public snapshots
        run: |
          for attempt in 1 2 3 4 5; do
            git fetch origin main

            if git rebase origin/main; then
              if git push origin HEAD:main; then
                printf '%s\n' "Bitnodes snapshots pushed."
                exit 0
              fi
            fi

            git rebase --abort || true
            printf '%s\n' "Push attempt ${attempt} failed; retrying..."
            sleep 10
          done

          printf '%s\n' "Failed to push Bitnodes snapshots."
          exit 1
