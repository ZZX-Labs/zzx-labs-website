name: Bitnodes Static API Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: bitnodes-static-api-crawler
  cancel-in-progress: false

jobs:
  crawl-bitnodes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/bitnodes/requirements.txt

      - name: Run Bitnodes crawler export
        run: |
          python tools/bitnodes/crawl.py \
            --output bitcoin/bitnodes/api \
            --archive-dir bitcoin/bitnodes/archive \
            --history-dir data/bitnodes/history \
            --timeout 3 \
            --limit 500 \
            --workers 128

      - name: Commit JSON snapshots
        run: |
          git config user.name "zzx-labs-bitnodes-bot"
          git config user.email "actions@github.com"

          git add bitcoin/bitnodes/api bitcoin/bitnodes/archive data/bitnodes/history

          if git diff --cached --quiet; then
            printf '%s\n' "No Bitnodes JSON changes to commit."
            exit 0
          fi

          git commit -m "Update Bitnodes static API snapshots"

          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            printf '%s\n' "Push attempt ${attempt} failed; retrying..."
            sleep 5
          done

          printf '%s\n' "Failed to push after retries."
          exit 1