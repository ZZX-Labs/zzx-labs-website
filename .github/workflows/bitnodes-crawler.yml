name: ZZX-Labs Bitnodes Global Node Crawler

on:
  workflow_dispatch:
    inputs:
      crawl_profile:
        description: "Crawl profile"
        required: false
        default: "hourly"
        type: choice
        options:
          - hourly
          - deep
  schedule:
    - cron: "7 * * * *"
    - cron: "23 3 * * *"

permissions:
  contents: write

concurrency:
  group: zzx-bitnodes-global-crawler
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_STEP_DEBUG: "false"
  BITNODES_ROOT: bitcoin/bitnodes
  BITNODES_API: bitcoin/bitnodes/api
  BITNODES_DATA: bitcoin/bitnodes/data
  BITNODES_ARCHIVE: bitcoin/bitnodes/archive
  BITNODES_GEO: bitcoin/bitnodes/data/geo
  BITNODES_GEOIP: bitcoin/bitnodes/data/geoip
  BITNODES_MAPS: bitcoin/bitnodes/maps
  BITNODES_LIVE_MAP: bitcoin/bitnodes/live-map
  MAX_PUBLIC_JSON_BYTES: "24000000"
  MAX_COMMIT_FILES: "600"
  MAX_DELETIONS: "2500000"
  PYTHONUNBUFFERED: "1"

jobs:
  crawl-bitnodes:
    runs-on: ubuntu-24.04
    timeout-minutes: 58

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set crawl profile
        id: profile
        shell: bash
        run: |
          set -euo pipefail

          PROFILE="${{ inputs.crawl_profile || '' }}"

          if [ -z "${PROFILE}" ]; then
            HOUR="$(date -u +%H)"
            if [ "${HOUR}" = "03" ]; then
              PROFILE="deep"
            else
              PROFILE="hourly"
            fi
          fi

          if [ "${PROFILE}" = "deep" ]; then
            printf '%s\n' "run_seconds=3000" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "workers=768" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "batch_size=8192" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "getaddr_rounds=64" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "dns_seed_limit=12000" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "archive_replay_files=1500" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "original_workers=192" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "original_batch_size=4096" >> "${GITHUB_OUTPUT}"
          else
            printf '%s\n' "run_seconds=1500" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "workers=384" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "batch_size=4096" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "getaddr_rounds=24" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "dns_seed_limit=8192" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "archive_replay_files=500" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "original_workers=96" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "original_batch_size=2048" >> "${GITHUB_OUTPUT}"
          fi

          printf '%s\n' "Using crawl profile: ${PROFILE}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/bitnodes/requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r tools/bitnodes/requirements.txt

      - name: Validate Bitnodes tools
        shell: bash
        run: |
          set -euo pipefail

          python -m py_compile tools/bitnodes/crawl.py
          python -m py_compile tools/bitnodes/enrich.py
          python -m py_compile tools/bitnodes/aggregate.py
          python -m py_compile tools/bitnodes/ip_db.py
          python -m py_compile tools/bitnodes/push_ipdb.py
          python -m py_compile tools/bitnodes/export_db.py
          python -m py_compile tools/bitnodes/map/map.py
          python -m py_compile tools/bitnodes/map/maps.py
          python -m py_compile tools/bitnodes/map/live-map.py
          python -m py_compile tools/bitnodes/map/mapvectors.py
          python -m py_compile tools/bitnodes/map/mapnodes.py
          python -m py_compile tools/bitnodes/build_geo_indexes.py

          python tools/bitnodes/crawl.py --help
          python tools/bitnodes/enrich.py --help
          python tools/bitnodes/aggregate.py --help
          python tools/bitnodes/ip_db.py --help
          python tools/bitnodes/push_ipdb.py --help
          python tools/bitnodes/export_db.py --help
          python tools/bitnodes/map/map.py --help
          python tools/bitnodes/build_geo_indexes.py --help

      - name: Sync repo before crawl
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git rebase --autostash origin/main

      - name: Prepare Bitnodes directories
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p \
            "${BITNODES_API}/zzxbitnodes" \
            "${BITNODES_API}/originalbitnodes" \
            "${BITNODES_API}/enriched/zzxbitnodes" \
            "${BITNODES_API}/enriched/originalbitnodes" \
            "${BITNODES_API}/aggregate/zzxbitnodes" \
            "${BITNODES_API}/aggregate/originalbitnodes" \
            "${BITNODES_API}/data" \
            "${BITNODES_DATA}/runtime/state/zzxbitnodes" \
            "${BITNODES_DATA}/runtime/state/originalbitnodes" \
            "${BITNODES_DATA}/runtime/seeders/zzxbitnodes" \
            "${BITNODES_DATA}/runtime/snapshots/24h/zzxbitnodes" \
            "${BITNODES_DATA}/geo/manifests" \
            "${BITNODES_GEOIP}/current" \
            "${BITNODES_GEOIP}/archive" \
            "${BITNODES_GEOIP}/published" \
            "${BITNODES_ARCHIVE}/runtime/zzxbitnodes" \
            "${BITNODES_ARCHIVE}/runtime/originalbitnodes" \
            "${BITNODES_MAPS}/data" \
            "${BITNODES_LIVE_MAP}/data"

      - name: Download DB-IP GeoIP databases
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${BITNODES_GEOIP}"

          MONTHS="$(
            python - <<'PY'
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc)
          year = now.year
          month = now.month

          for _ in range(6):
              print(f"{year:04d}-{month:02d}")
              month -= 1
              if month == 0:
                  month = 12
                  year -= 1
          PY
          )"

          for DB in city asn country; do
            OK="0"

            for DBIP_MONTH in ${MONTHS}; do
              URL="https://download.db-ip.com/free/dbip-${DB}-lite-${DBIP_MONTH}.mmdb.gz"
              OUT="${BITNODES_GEOIP}/dbip-${DB}-lite.mmdb.gz"

              if curl -fL --retry 3 --retry-delay 5 -o "${OUT}" "${URL}"; then
                OK="1"
                break
              fi

              rm -f "${OUT}"
            done

            if [ "${OK}" != "1" ]; then
              printf '%s\n' "Failed to download DB-IP ${DB} Lite database."
              exit 1
            fi
          done

          gunzip -f "${BITNODES_GEOIP}"/*.gz

      - name: Build local GeoNames indexes
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/build_geo_indexes.py \
            --geo-root "${BITNODES_GEO}" \
            --download \
            --compact \
            --report "${BITNODES_GEO}/manifests/geo-index-build-report.json"

      - name: Run ZZX Bitnodes crawler window
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/crawl.py \
            --crawler zzxbitnodes \
            --daemon \
            --run-seconds "${{ steps.profile.outputs.run_seconds }}" \
            --interval 20 \
            --output "${BITNODES_API}/zzxbitnodes" \
            --archive-dir "${BITNODES_ARCHIVE}/runtime/zzxbitnodes" \
            --state-dir "${BITNODES_DATA}/runtime/state/zzxbitnodes" \
            --snapshot-24h-dir "${BITNODES_DATA}/runtime/snapshots/24h/zzxbitnodes" \
            --seeder-dir "${BITNODES_DATA}/runtime/seeders/zzxbitnodes" \
            --geoip-dir "${BITNODES_GEOIP}" \
            --geo-root "${BITNODES_GEO}" \
            --timeout 5 \
            --limit 750000 \
            --batch-size "${{ steps.profile.outputs.batch_size }}" \
            --workers "${{ steps.profile.outputs.workers }}" \
            --getaddr-rounds "${{ steps.profile.outputs.getaddr_rounds }}" \
            --dns-seed-limit "${{ steps.profile.outputs.dns_seed_limit }}" \
            --archive-replay-files "${{ steps.profile.outputs.archive_replay_files }}" \
            --export-mode reachable_24h \
            --mirror-legacy-api \
            --no-enrich-after \
            --no-aggregate-after \
            --no-export-all-after \
            --compact

      - name: Validate ZZX crawler output
        shell: bash
        run: |
          set -euo pipefail

          test -f "${BITNODES_API}/zzxbitnodes/latest.json"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["BITNODES_API"]) / "zzxbitnodes" / "latest.json"
          payload = json.loads(path.read_text(encoding="utf-8"))

          nodes = payload.get("nodes") if isinstance(payload, dict) else None
          count = len(nodes) if isinstance(nodes, (dict, list)) else 0

          print(f"ZZX latest node count: {count}")

          if count <= 0:
              raise SystemExit("ZZX crawler produced zero nodes")
          PY

      - name: Run Original Bitnodes-compatible crawler
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/crawl.py \
            --crawler originalbitnodes \
            --original-mode hybrid \
            --run-seconds 0 \
            --output "${BITNODES_API}/originalbitnodes" \
            --state-dir "${BITNODES_DATA}/runtime/state/originalbitnodes" \
            --geoip-dir "${BITNODES_GEOIP}" \
            --timeout 5 \
            --limit 250000 \
            --batch-size "${{ steps.profile.outputs.original_batch_size }}" \
            --workers "${{ steps.profile.outputs.original_workers }}" \
            --getaddr-rounds 16 \
            --dns-seed-limit 4096 \
            --archive-replay-files 0 \
            --disable-archive-replay \
            --export-mode reachable \
            --no-export-all-after \
            --compact

      - name: Validate Original crawler output
        shell: bash
        run: |
          set -euo pipefail

          test -f "${BITNODES_API}/originalbitnodes/latest.json"

      - name: Enrich node datasets
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/enrich.py \
            --input "${BITNODES_API}/zzxbitnodes/latest.json" \
            --output "${BITNODES_API}/enriched/zzxbitnodes/latest.json" \
            --report "${BITNODES_API}/enriched/zzxbitnodes/enrichment-report.json" \
            --source zzxbitnodes \
            --api-dir "${BITNODES_API}" \
            --state-dir "${BITNODES_DATA}/runtime/state/zzxbitnodes" \
            --geoip-dir "${BITNODES_GEOIP}" \
            --geo-root "${BITNODES_GEO}" \
            --compact

          python tools/bitnodes/enrich.py \
            --input "${BITNODES_API}/originalbitnodes/latest.json" \
            --output "${BITNODES_API}/enriched/originalbitnodes/latest.json" \
            --report "${BITNODES_API}/enriched/originalbitnodes/enrichment-report.json" \
            --source originalbitnodes \
            --api-dir "${BITNODES_API}" \
            --state-dir "${BITNODES_DATA}/runtime/state/originalbitnodes" \
            --geoip-dir "${BITNODES_GEOIP}" \
            --geo-root "${BITNODES_GEO}" \
            --compact

      - name: Validate enriched datasets
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def node_items(payload):
              nodes = payload.get("nodes")
              if isinstance(nodes, dict):
                  return nodes.values()
              if isinstance(nodes, list):
                  return nodes
              return []

          coordinate_count = 0

          for rel in (
              "enriched/zzxbitnodes/latest.json",
              "enriched/originalbitnodes/latest.json",
          ):
              path = Path(os.environ["BITNODES_API"]) / rel
              payload = json.loads(path.read_text(encoding="utf-8"))
              nodes = list(node_items(payload))

              print(f"{rel}: nodes={len(nodes)}")

              if not nodes:
                  raise SystemExit(f"{rel} contains zero nodes")

              coords = 0

              for item in nodes:
                  if not isinstance(item, dict):
                      continue

                  lat = item.get("latitude") or item.get("lat")
                  lon = item.get("longitude") or item.get("lon") or item.get("lng")

                  try:
                      lat = float(lat)
                      lon = float(lon)
                  except Exception:
                      continue

                  if -90 <= lat <= 90 and -180 <= lon <= 180:
                      coords += 1

              print(f"{rel}: coordinates={coords}")

              if coords == 0:
                  raise SystemExit(f"{rel} contains zero geocoded nodes")

              coordinate_count += coords

          print(f"total geocoded nodes={coordinate_count}")
          PY

      - name: Aggregate public summaries
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/aggregate.py \
            --input "${BITNODES_API}/enriched/zzxbitnodes/latest.json" \
            --output "${BITNODES_API}/aggregate/zzxbitnodes/latest.json" \
            --api-dir "${BITNODES_API}" \
            --state-dir "${BITNODES_DATA}/runtime/state/zzxbitnodes" \
            --source zzxbitnodes

          python tools/bitnodes/aggregate.py \
            --input "${BITNODES_API}/enriched/originalbitnodes/latest.json" \
            --output "${BITNODES_API}/aggregate/originalbitnodes/latest.json" \
            --api-dir "${BITNODES_API}" \
            --state-dir "${BITNODES_DATA}/runtime/state/originalbitnodes" \
            --source originalbitnodes

      - name: Update IPDB artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${BITNODES_GEOIP}/current" "${BITNODES_GEOIP}/archive" "${BITNODES_GEOIP}/published"

          python tools/bitnodes/ip_db.py \
            --input "${BITNODES_API}/enriched/zzxbitnodes/latest.json" \
            --output "${BITNODES_API}/enriched/zzxbitnodes/latest.ipdb-enriched.json" \
            --ipdb-dir "${BITNODES_GEOIP}" \
            --latest "${BITNODES_GEOIP}/current/ip_db.latest.json" \
            --index "${BITNODES_GEOIP}/current/ip_db.index.json" \
            --stats "${BITNODES_GEOIP}/current/ip_db.stats.json" \
            --archive-dir "${BITNODES_GEOIP}/archive" \
            --max-segment-bytes "${MAX_PUBLIC_JSON_BYTES}" \
            --source zzxbitnodes \
            --update-db \
            --compact \
            --report "${BITNODES_GEOIP}/ip_db.run-report.json"

          printf '%s\n' "==== IPDB current ===="
          ls -lah "${BITNODES_GEOIP}/current"

          printf '%s\n' "==== IPDB archive ===="
          ls -lah "${BITNODES_GEOIP}/archive" | sed -n '1,80p'

          test -f "${BITNODES_GEOIP}/current/ip_db.latest.json"
          test -f "${BITNODES_GEOIP}/current/ip_db.index.json"
          test -f "${BITNODES_GEOIP}/current/ip_db.stats.json"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["BITNODES_GEOIP"])
          index = json.loads((root / "current" / "ip_db.index.json").read_text(encoding="utf-8"))
          latest = json.loads((root / "current" / "ip_db.latest.json").read_text(encoding="utf-8"))
          stats = json.loads((root / "current" / "ip_db.stats.json").read_text(encoding="utf-8"))

          segment_count = int(index.get("segment_count") or 0)
          host_count = int(index.get("total_unique_hosts") or 0)
          latest_count = int(latest.get("record_count") or 0)
          stats_count = int(stats.get("total_unique_hosts") or 0)

          print(f"IPDB segment_count={segment_count}")
          print(f"IPDB index hosts={host_count}")
          print(f"IPDB latest records={latest_count}")
          print(f"IPDB stats hosts={stats_count}")

          if segment_count <= 0:
              raise SystemExit("IPDB index has zero segments")

          if host_count <= 0 or latest_count <= 0 or stats_count <= 0:
              raise SystemExit("IPDB generated zero hosts")

          for item in index.get("segments", []):
              filename = item.get("filename")
              if not filename:
                  raise SystemExit("IPDB segment missing filename")
              path = root / "archive" / filename
              if not path.exists():
                  raise SystemExit(f"IPDB segment missing from archive: {path}")
          PY

          python tools/bitnodes/push_ipdb.py \
            --ipdb-dir "${BITNODES_GEOIP}" \
            --latest "${BITNODES_GEOIP}/current/ip_db.latest.json" \
            --index "${BITNODES_GEOIP}/current/ip_db.index.json" \
            --stats "${BITNODES_GEOIP}/current/ip_db.stats.json" \
            --archive-dir "${BITNODES_GEOIP}/archive" \
            --output-dir "${BITNODES_GEOIP}/published" \
            --report "${BITNODES_GEOIP}/ip_db.push-report.json" \
            --include-latest \
            --copy-only \
            --compact

          test -f "${BITNODES_GEOIP}/ip_db.push-report.json"

      - name: Export MariaDB gzip shards
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/export_db.py \
            --input "${BITNODES_API}/enriched/zzxbitnodes/latest.json" \
            --input "${BITNODES_API}/enriched/originalbitnodes/latest.json" \
            --output-dir "${BITNODES_API}/data" \
            --database zzx_bitnodes \
            --max-bytes "${MAX_PUBLIC_JSON_BYTES}" \
            --compact \
            --strict

      - name: Build maps from enriched node data
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/map/map.py both \
            --input "${BITNODES_API}/enriched/zzxbitnodes/latest.json" \
            --api-dir "${BITNODES_API}" \
            --state-dir "${BITNODES_DATA}/runtime/state/zzxbitnodes" \
            --map-dir "${BITNODES_MAPS}" \
            --live-map-dir "${BITNODES_LIVE_MAP}" \
            --source zzxbitnodes \
            --theme zzx_dark_olive \
            --settings live \
            --tile-provider cartodb_dark \
            --compact \
            --fail-empty

      - name: Validate generated maps
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              Path("bitcoin/bitnodes/live-map/data/map-points.geojson"),
              Path("bitcoin/bitnodes/live-map/data/map-vectors.json"),
              Path("bitcoin/bitnodes/live-map/data/map-settings.json"),
              Path("bitcoin/bitnodes/live-map/data/map-theme.json"),
              Path("bitcoin/bitnodes/live-map/data/vector-types.json"),
              Path("bitcoin/bitnodes/maps/data/map-points.geojson"),
              Path("bitcoin/bitnodes/maps/data/map-vectors.json"),
          ]

          for path in required:
              if not path.exists():
                  raise SystemExit(f"missing generated map artifact: {path}")

          geojson = json.loads(required[0].read_text(encoding="utf-8"))
          vectors = json.loads(required[1].read_text(encoding="utf-8"))

          features = geojson.get("features", [])
          points = vectors.get("points", [])

          print(f"live-map features={len(features)}")
          print(f"live-map vector points={len(points)}")

          if not isinstance(features, list) or len(features) < 1:
              raise SystemExit("map-points.geojson contains zero features")

          if not isinstance(points, list) or len(points) < 1:
              raise SystemExit("map-vectors.json contains zero points")
          PY

      - name: Prune private runtime, legacy fanout, and oversized artifacts
        shell: bash
        run: |
          set -euo pipefail

          rm -f "${BITNODES_GEOIP}"/*.mmdb "${BITNODES_GEOIP}"/*.mmdb.gz || true
          rm -rf "${BITNODES_ROOT}/src" || true
          rm -rf "${BITNODES_DATA}/runtime" || true
          rm -rf "${BITNODES_ARCHIVE}/runtime" || true

          rm -f "${BITNODES_API}/original-latest.json" || true
          rm -f "${BITNODES_API}/enriched/zzxbitnodes/latest.ipdb-enriched.json" || true

          for SOURCE in zzxbitnodes originalbitnodes; do
            find "${BITNODES_API}/${SOURCE}" -mindepth 1 -maxdepth 1 -type f -name '*.json' ! -name 'latest.json' -delete || true

            for DIR in \
              agents apt-attribution asns cities cjdns continents counties countries \
              datacenter geohashes government i2p ipv4 ipv6 known-malactor military \
              maps organizations providers regions sanctioned tag-attribution territories \
              timezones tor versions w3w zip
            do
              rm -rf "${BITNODES_API}/${SOURCE}/${DIR}" || true
            done
          done

          find "${BITNODES_ROOT}" -type d -name '__pycache__' -prune -exec rm -rf {} + || true
          find tools/bitnodes -type d -name '__pycache__' -prune -exec rm -rf {} + || true
          find . -type f -name '*.pyc' -delete || true

      - name: Build public API index
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          import time
          from pathlib import Path

          api = Path(os.environ["BITNODES_API"])

          index = {
              "schema": "zzx-bitnodes-public-api-index-v1",
              "generated_at": int(time.time()),
              "sources": {
                  "zzxbitnodes_latest": "zzxbitnodes/latest.json",
                  "originalbitnodes_latest": "originalbitnodes/latest.json",
                  "zzxbitnodes_enriched": "enriched/zzxbitnodes/latest.json",
                  "originalbitnodes_enriched": "enriched/originalbitnodes/latest.json",
                  "zzxbitnodes_aggregate": "aggregate/zzxbitnodes/latest.json",
                  "originalbitnodes_aggregate": "aggregate/originalbitnodes/latest.json",
                  "database_latest": "data/latest.json",
                  "database_index": "data/index.json",
                  "database_manifest": "data/mariadb_manifest.json",
                  "ipdb_latest": "../data/geoip/current/ip_db.latest.json",
                  "ipdb_index": "../data/geoip/current/ip_db.index.json",
                  "ipdb_stats": "../data/geoip/current/ip_db.stats.json",
                  "ipdb_push_report": "../data/geoip/ip_db.push-report.json",
                  "maps": "../maps/data/",
                  "live_map": "../live-map/data/"
              },
              "policy": {
                  "json": "rolling latest files only",
                  "database": "24MB-safe gzipped MariaDB SQL shards",
                  "ipdb": "current index/latest/stats only; segmented archive remains generated but not staged publicly unless explicitly added",
                  "no_credentials": True
              }
          }

          api.mkdir(parents=True, exist_ok=True)
          (api / "index.json").write_text(
              json.dumps(index, ensure_ascii=False, separators=(",", ":")) + "\n",
              encoding="utf-8"
          )

          manifest = {
              "schema": "zzx-bitnodes-public-file-manifest-v1",
              "generated_at": int(time.time()),
              "files": []
          }

          for path in sorted(api.rglob("*")):
              if path.is_file():
                  manifest["files"].append({
                      "path": str(path.relative_to(api)),
                      "size_bytes": path.stat().st_size
                  })

          (api / "manifest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, separators=(",", ":")) + "\n",
              encoding="utf-8"
          )
          PY

      - name: Validate public artifact policy
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          from pathlib import Path

          max_bytes = int(os.environ["MAX_PUBLIC_JSON_BYTES"])
          roots = [
              Path(os.environ["BITNODES_API"]),
              Path(os.environ["BITNODES_MAPS"]) / "data",
              Path(os.environ["BITNODES_LIVE_MAP"]) / "data",
              Path(os.environ["BITNODES_GEOIP"]) / "current",
          ]

          bad = []

          allow_names = {
              "latest.json",
              "index.json",
              "manifest.json",
              "mariadb_manifest.json",
              "sqlite_manifest.json",
              "enrichment-report.json",
              "map-settings.json",
              "map-theme.json",
              "map-themes.json",
              "map-tile-providers.json",
              "map-fonts.json",
              "map-layers.json",
              "map-overlays.json",
              "map-vectors.json",
              "map-points.geojson",
              "map-polygons.geojson",
              "map-build-report.json",
              "vector-types.json",
              "ip_db.latest.json",
              "ip_db.index.json",
              "ip_db.stats.json",
              "ip_db.push-report.json",
              "ip_db.run-report.json",
          }

          for root in roots:
              if not root.exists():
                  bad.append((0, root, "missing artifact root"))
                  continue

              for path in root.rglob("*"):
                  if not path.is_file():
                      continue

                  rel = str(path)

                  if path.suffix == ".gz":
                      if path.stat().st_size > max_bytes:
                          bad.append((path.stat().st_size, path, "gz too large"))
                      continue

                  if path.suffix in {".json", ".geojson"}:
                      if path.name not in allow_names:
                          if "/data/" not in rel and "/maps/data/" not in rel and "/live-map/data/" not in rel:
                              bad.append((path.stat().st_size, path, "unexpected json"))

                      if path.stat().st_size > max_bytes:
                          bad.append((path.stat().st_size, path, "json too large"))

          if bad:
              for size, path, reason in bad:
                  print(f"{reason}: {size} {path}")
              raise SystemExit(1)

          print("public artifact policy passed")
          PY

      - name: Stage safe public Bitnodes outputs
        shell: bash
        run: |
          set -euo pipefail

          git reset

          git add -A \
            "${BITNODES_API}/index.json" \
            "${BITNODES_API}/manifest.json" \
            "${BITNODES_API}/zzxbitnodes/latest.json" \
            "${BITNODES_API}/originalbitnodes/latest.json" \
            "${BITNODES_API}/enriched/zzxbitnodes/latest.json" \
            "${BITNODES_API}/enriched/zzxbitnodes/enrichment-report.json" \
            "${BITNODES_API}/enriched/originalbitnodes/latest.json" \
            "${BITNODES_API}/enriched/originalbitnodes/enrichment-report.json" \
            "${BITNODES_API}/aggregate/zzxbitnodes/latest.json" \
            "${BITNODES_API}/aggregate/originalbitnodes/latest.json" \
            "${BITNODES_API}/data" \
            "${BITNODES_DATA}/geo/manifests" \
            "${BITNODES_GEOIP}/current/ip_db.latest.json" \
            "${BITNODES_GEOIP}/current/ip_db.index.json" \
            "${BITNODES_GEOIP}/current/ip_db.stats.json" \
            "${BITNODES_GEOIP}/ip_db.run-report.json" \
            "${BITNODES_GEOIP}/ip_db.push-report.json" \
            "${BITNODES_MAPS}/data" \
            "${BITNODES_LIVE_MAP}/data"

      - name: Guard against destructive or bloated commit
        shell: bash
        run: |
          set -euo pipefail

          CHANGED="$(git diff --cached --name-only | wc -l | tr -d ' ')"
          DELETIONS="$(git diff --cached --numstat | awk '{d += $2} END {print d + 0}')"

          printf '%s\n' "Staged files: ${CHANGED}"
          printf '%s\n' "Staged deletions: ${DELETIONS}"

          if [ "${CHANGED}" -gt "${MAX_COMMIT_FILES}" ]; then
            git diff --cached --name-only | sed -n '1,200p'
            exit 1
          fi

          if [ "${DELETIONS}" -gt "${MAX_DELETIONS}" ]; then
            git diff --cached --stat
            exit 1
          fi

          if git diff --cached --name-only | grep -E '/(cities|asns|countries|agents|geohashes|providers|organizations|versions)/.+\.json$'; then
            printf '%s\n' "Refusing exploded JSON fanout."
            exit 1
          fi

          if git diff --cached --name-only | grep -E '^bitcoin/bitnodes/data/geoip/archive/ip_db\.[0-9]+\.json$'; then
            printf '%s\n' "Refusing to publish segmented IPDB archive into public website repo."
            exit 1
          fi

      - name: Commit and push Bitnodes public artifacts
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "zzx-labs-bitnodes-bot"
          git config user.email "actions@github.com"

          if git diff --cached --quiet; then
            printf '%s\n' "No Bitnodes public artifact changes."
            exit 0
          fi

          git commit -m "Update Bitnodes public artifacts"

          for attempt in 1 2 3 4 5; do
            git fetch origin main

            if git rebase --autostash origin/main && git push origin HEAD:main; then
              printf '%s\n' "Bitnodes public artifacts pushed."
              exit 0
            fi

            git rebase --abort || true
            printf '%s\n' "Push attempt ${attempt} failed."
            sleep 10
          done

          exit 1
