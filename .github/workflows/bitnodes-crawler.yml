name: ZZX-Labs Bitnodes Global Node Crawler

on:
  workflow_dispatch:
    inputs:
      crawl_profile:
        description: "Crawl profile"
        required: false
        default: "hourly"
        type: choice
        options:
          - hourly
          - deep
  schedule:
    - cron: "7 * * * *"
    - cron: "23 3 * * *"

permissions:
  contents: write

concurrency:
  group: zzx-bitnodes-global-crawler
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_STEP_DEBUG: "false"

  BITNODES_ROOT: bitcoin/bitnodes
  BITNODES_API: bitcoin/bitnodes/api
  BITNODES_DATA: bitcoin/bitnodes/data
  BITNODES_ARCHIVE: bitcoin/bitnodes/archive
  BITNODES_GEO: bitcoin/bitnodes/data/geo
  BITNODES_GEOIP: bitcoin/bitnodes/data/geoip
  BITNODES_MAPS: bitcoin/bitnodes/maps
  BITNODES_LIVE_MAP: bitcoin/bitnodes/live-map

  MAX_PUBLIC_JSON_BYTES: "24000000"
  MAX_COMMIT_FILES: "600"
  MAX_DELETIONS: "2500000"
  MIN_MAP_FEATURES: "1"

  PYTHONUNBUFFERED: "1"
  BITNODES_REQUIRE_GEO_COORDINATES: "true"

jobs:
  crawl-bitnodes:
    runs-on: ubuntu-24.04
    timeout-minutes: 58

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Sync repo before generation
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          git clean -fdx

      - name: Set crawl profile
        id: profile
        shell: bash
        run: |
          set -euo pipefail

          PROFILE="${{ inputs.crawl_profile || '' }}"

          if [ -z "${PROFILE}" ]; then
            HOUR="$(date -u +%H)"
            if [ "${HOUR}" = "03" ]; then
              PROFILE="deep"
            else
              PROFILE="hourly"
            fi
          fi

          if [ "${PROFILE}" = "deep" ]; then
            printf '%s\n' "run_seconds=3000" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "workers=768" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "batch_size=8192" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "getaddr_rounds=64" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "dns_seed_limit=12000" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "archive_replay_files=1500" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "original_workers=192" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "original_batch_size=4096" >> "${GITHUB_OUTPUT}"
          else
            printf '%s\n' "run_seconds=1500" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "workers=384" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "batch_size=4096" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "getaddr_rounds=24" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "dns_seed_limit=8192" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "archive_replay_files=500" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "original_workers=96" >> "${GITHUB_OUTPUT}"
            printf '%s\n' "original_batch_size=2048" >> "${GITHUB_OUTPUT}"
          fi

          printf '%s\n' "Using crawl profile: ${PROFILE}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/bitnodes/requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r tools/bitnodes/requirements.txt
          python - <<'PY'
          import geoip2.database
          import maxminddb
          print("geoip2/maxminddb imports OK")
          PY

      - name: Validate Bitnodes tools
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED=(
            tools/bitnodes/crawl.py
            tools/bitnodes/enrich.py
            tools/bitnodes/geoloc/geoloc.py
            tools/bitnodes/geoloc/geoip.py
            tools/bitnodes/aggregate.py
            tools/bitnodes/ip_db.py
            tools/bitnodes/push_ipdb.py
            tools/bitnodes/export_db.py
            tools/bitnodes/build_geo_indexes.py
            tools/bitnodes/map/map.py
            tools/bitnodes/map/maps.py
            tools/bitnodes/map/live-map.py
            tools/bitnodes/map/mapplotter.py
            tools/bitnodes/map/mapvectors.py
            tools/bitnodes/map/mapnodes.py
          )

          MOVED_MODULES=(
            tools/bitnodes/network/ipv4.py
            tools/bitnodes/network/ipv6.py
            tools/bitnodes/network/tor.py
            tools/bitnodes/network/i2p.py
            tools/bitnodes/network/proxy.py
            tools/bitnodes/network/vpn.py
            tools/bitnodes/geoclass/isp.py
            tools/bitnodes/geoclass/organization.py
            tools/bitnodes/geoclass/provider.py
            tools/bitnodes/geoclass/datacenter.py
            tools/bitnodes/geoclass/government.py
            tools/bitnodes/geoclass/military.py
            tools/bitnodes/geoclass/sanctioned_nodes.py
            tools/bitnodes/threat-detection/knownmalactor.py
            tools/bitnodes/threat-detection/tagattribution.py
          )

          OPTIONAL_NEW_MODULES=(
            tools/bitnodes/geoclass/boundary_zone.py
            tools/bitnodes/geoclass/land_parcel.py
            tools/bitnodes/geoclass/building_perimeter.py
            tools/bitnodes/geoclass/asn_footprint.py
          )

          for FILE in "${REQUIRED[@]}" "${MOVED_MODULES[@]}"; do
            if [ ! -f "${FILE}" ]; then
              echo "MISSING REQUIRED FILE: ${FILE}"
              find tools/bitnodes -maxdepth 4 -type f | sort
              exit 1
            fi
            python -m py_compile "${FILE}"
          done

          for FILE in "${OPTIONAL_NEW_MODULES[@]}"; do
            if [ -f "${FILE}" ]; then
              python -m py_compile "${FILE}"
            else
              echo "optional missing: ${FILE}"
            fi
          done

          python tools/bitnodes/crawl.py --help
          python tools/bitnodes/enrich.py --help
          python tools/bitnodes/geoloc/geoip.py --help
          python tools/bitnodes/aggregate.py --help
          python tools/bitnodes/ip_db.py --help
          python tools/bitnodes/push_ipdb.py --help
          python tools/bitnodes/export_db.py --help
          python tools/bitnodes/build_geo_indexes.py --help
          python tools/bitnodes/map/map.py --help
          python tools/bitnodes/map/mapplotter.py --help
          python tools/bitnodes/map/mapvectors.py --help

      - name: Prepare Bitnodes directories
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p \
            "${BITNODES_API}/zzxbitnodes" \
            "${BITNODES_API}/originalbitnodes" \
            "${BITNODES_API}/enriched/zzxbitnodes" \
            "${BITNODES_API}/enriched/originalbitnodes" \
            "${BITNODES_API}/aggregate/zzxbitnodes" \
            "${BITNODES_API}/aggregate/originalbitnodes" \
            "${BITNODES_API}/data" \
            "${BITNODES_DATA}/runtime/state/zzxbitnodes" \
            "${BITNODES_DATA}/runtime/state/originalbitnodes" \
            "${BITNODES_DATA}/runtime/seeders/zzxbitnodes" \
            "${BITNODES_DATA}/runtime/snapshots/24h/zzxbitnodes" \
            "${BITNODES_DATA}/geo/manifests" \
            "${BITNODES_GEOIP}/current" \
            "${BITNODES_GEOIP}/archive" \
            "${BITNODES_GEOIP}/published" \
            "${BITNODES_ARCHIVE}/runtime/zzxbitnodes" \
            "${BITNODES_ARCHIVE}/runtime/originalbitnodes" \
            "${BITNODES_MAPS}/data" \
            "${BITNODES_LIVE_MAP}/data"

      - name: Download DB-IP GeoIP databases
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${BITNODES_GEOIP}"

          MONTHS="$(
            python - <<'PY'
          from datetime import datetime, timezone
          now = datetime.now(timezone.utc)
          year = now.year
          month = now.month
          for _ in range(6):
              print(f"{year:04d}-{month:02d}")
              month -= 1
              if month == 0:
                  month = 12
                  year -= 1
          PY
          )"

          for DB in city asn country; do
            OK="0"

            for DBIP_MONTH in ${MONTHS}; do
              URL="https://download.db-ip.com/free/dbip-${DB}-lite-${DBIP_MONTH}.mmdb.gz"
              OUT="${BITNODES_GEOIP}/dbip-${DB}-lite.mmdb.gz"

              if curl -fL --retry 3 --retry-delay 5 -o "${OUT}" "${URL}"; then
                OK="1"
                break
              fi

              rm -f "${OUT}"
            done

            if [ "${OK}" != "1" ]; then
              printf '%s\n' "Failed to download DB-IP ${DB} Lite database."
              exit 1
            fi
          done

          gunzip -f "${BITNODES_GEOIP}"/*.gz

          for DB in \
            "${BITNODES_GEOIP}/dbip-city-lite.mmdb" \
            "${BITNODES_GEOIP}/dbip-asn-lite.mmdb" \
            "${BITNODES_GEOIP}/dbip-country-lite.mmdb"
          do
            test -s "${DB}"
            ls -lh "${DB}"
          done

      - name: Verify DB-IP GeoIP databases
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import geoip2.database
          from pathlib import Path

          paths = [
              Path("bitcoin/bitnodes/data/geoip/dbip-city-lite.mmdb"),
              Path("bitcoin/bitnodes/data/geoip/dbip-asn-lite.mmdb"),
              Path("bitcoin/bitnodes/data/geoip/dbip-country-lite.mmdb"),
          ]

          for path in paths:
              if not path.exists() or path.stat().st_size <= 0:
                  raise SystemExit(f"missing or empty MMDB: {path}")
              print(f"MMDB OK: {path} {path.stat().st_size} bytes")

          with geoip2.database.Reader(str(paths[0])) as reader:
              result = reader.city("8.8.8.8")
              print("city smoke:", result.country.iso_code, result.location.latitude, result.location.longitude)

          with geoip2.database.Reader(str(paths[1])) as reader:
              result = reader.asn("8.8.8.8")
              print("asn smoke:", result.autonomous_system_number, result.autonomous_system_organization)

          with geoip2.database.Reader(str(paths[2])) as reader:
              result = reader.country("8.8.8.8")
              print("country smoke:", result.country.iso_code)
          PY

      - name: Build local GeoNames indexes
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail

          timeout 540 python tools/bitnodes/build_geo_indexes.py \
            --geo-root "${BITNODES_GEO}" \
            --download \
            --download-timeout 60 \
            --download-retries 3 \
            --copy-source-manifest

      - name: Run ZZX Bitnodes crawler window
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/crawl.py \
            --crawler zzxbitnodes \
            --daemon \
            --run-seconds "${{ steps.profile.outputs.run_seconds }}" \
            --interval 20 \
            --output "${BITNODES_API}/zzxbitnodes" \
            --archive-dir "${BITNODES_ARCHIVE}/runtime/zzxbitnodes" \
            --state-dir "${BITNODES_DATA}/runtime/state/zzxbitnodes" \
            --snapshot-24h-dir "${BITNODES_DATA}/runtime/snapshots/24h/zzxbitnodes" \
            --seeder-dir "${BITNODES_DATA}/runtime/seeders/zzxbitnodes" \
            --geoip-dir "${BITNODES_GEOIP}" \
            --geo-root "${BITNODES_GEO}" \
            --timeout 5 \
            --limit 750000 \
            --batch-size "${{ steps.profile.outputs.batch_size }}" \
            --workers "${{ steps.profile.outputs.workers }}" \
            --getaddr-rounds "${{ steps.profile.outputs.getaddr_rounds }}" \
            --dns-seed-limit "${{ steps.profile.outputs.dns_seed_limit }}" \
            --archive-replay-files "${{ steps.profile.outputs.archive_replay_files }}" \
            --export-mode reachable_24h \
            --mirror-legacy-api \
            --no-enrich-after \
            --no-aggregate-after \
            --no-export-all-after \
            --compact

      - name: Validate ZZX crawler output
        shell: bash
        run: |
          set -euo pipefail
          test -f "${BITNODES_API}/zzxbitnodes/latest.json"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["BITNODES_API"]) / "zzxbitnodes" / "latest.json"
          payload = json.loads(path.read_text(encoding="utf-8"))
          nodes = payload.get("nodes") if isinstance(payload, dict) else None
          count = len(nodes) if isinstance(nodes, (dict, list)) else 0

          print(f"ZZX latest node count: {count}")

          if count <= 0:
              raise SystemExit("ZZX crawler produced zero nodes")
          PY

      - name: Run Original Bitnodes-compatible crawler
        shell: bash
        run: |
          set -euo pipefail

          set +e
          python tools/bitnodes/crawl.py \
            --crawler originalbitnodes \
            --original-mode hybrid \
            --run-seconds 0 \
            --output "${BITNODES_API}/originalbitnodes" \
            --state-dir "${BITNODES_DATA}/runtime/state/originalbitnodes" \
            --geoip-dir "${BITNODES_GEOIP}" \
            --timeout 5 \
            --limit 250000 \
            --batch-size "${{ steps.profile.outputs.original_batch_size }}" \
            --workers "${{ steps.profile.outputs.original_workers }}" \
            --getaddr-rounds 16 \
            --dns-seed-limit 4096 \
            --archive-replay-files 0 \
            --disable-archive-replay \
            --export-mode reachable \
            --no-enrich-after \
            --no-aggregate-after \
            --no-export-all-after \
            --compact
          RC="$?"
          set -e

          if [ "${RC}" -ne 0 ]; then
            printf '%s\n' "Original-compatible crawler exited ${RC}; checking whether latest.json was still produced."
          fi

          if [ ! -s "${BITNODES_API}/originalbitnodes/latest.json" ]; then
            printf '%s\n' "Original-compatible crawler failed and produced no latest.json."
            exit "${RC}"
          fi

          printf '%s\n' "Original-compatible latest.json exists; continuing."

      - name: Validate Original crawler output
        shell: bash
        run: |
          set -euo pipefail
          test -f "${BITNODES_API}/originalbitnodes/latest.json"

      - name: Enrich node datasets with GeoIP and GeoLoc classification
        shell: bash
        run: |
          set -euo pipefail

          MODULES="geoip,geoloc,boundary_zone,continent,region,country,territory,county,city,zip,timezone,land_parcel,building_perimeter,asn_footprint,isp,organization,provider,datacenter,government,military,sanctioned_nodes,knownmalactor,tagattribution,w3w_lookup,geohashid_lookup,peers,peer_index,peer_health,dns_seeder_health"

          for SOURCE in zzxbitnodes originalbitnodes; do
            python tools/bitnodes/enrich.py \
              --input "${BITNODES_API}/${SOURCE}/latest.json" \
              --output "${BITNODES_API}/enriched/${SOURCE}/latest.json" \
              --report "${BITNODES_API}/enriched/${SOURCE}/enrichment-report.json" \
              --source "${SOURCE}" \
              --api-dir "${BITNODES_API}" \
              --state-dir "${BITNODES_DATA}/runtime/state/${SOURCE}" \
              --geoip-dir "${BITNODES_GEOIP}" \
              --city-db "${BITNODES_GEOIP}/dbip-city-lite.mmdb" \
              --asn-db "${BITNODES_GEOIP}/dbip-asn-lite.mmdb" \
              --country-db "${BITNODES_GEOIP}/dbip-country-lite.mmdb" \
              --geo-root "${BITNODES_GEO}" \
              --modules "${MODULES}" \
              --compact

            python - <<PY
          import json
          from pathlib import Path

          report_path = Path("${BITNODES_API}/enriched/${SOURCE}/enrichment-report.json")
          report = json.loads(report_path.read_text(encoding="utf-8"))

          print("${SOURCE} enrichment coordinate report:")
          for module in report.get("modules", []):
              print(
                  f"  {module.get('name')}: "
                  f"{module.get('coordinate_count_before')} -> "
                  f"{module.get('coordinate_count_after')} "
                  f"{module.get('status')} "
                  f"{module.get('message', '')}"
              )

          if int(report.get("final_coordinate_count") or 0) == 0:
              raise SystemExit("${SOURCE} enrichment produced zero coordinates")
          PY
          done

      - name: Validate enriched datasets
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def deep_get(obj, path):
              cur = obj
              for part in path.split("."):
                  if not isinstance(cur, dict):
                      return None
                  cur = cur.get(part)
              return cur

          def first(obj, keys):
              for key in keys:
                  value = deep_get(obj, key) if "." in key else obj.get(key)
                  if value not in ("", None):
                      return value
              return None

          def node_items(payload):
              nodes = payload.get("nodes") if isinstance(payload, dict) else None
              if isinstance(nodes, dict):
                  return list(nodes.values())
              if isinstance(nodes, list):
                  return nodes
              return []

          def coord_pair(item):
              if isinstance(item, dict):
                  return (
                      first(item, ("latitude", "lat", "geo.latitude", "geoip.latitude", "geoip_data.latitude", "geoloc.latitude", "location.latitude", "metadata.latitude")),
                      first(item, ("longitude", "lon", "lng", "geo.longitude", "geoip.longitude", "geoip_data.longitude", "geoloc.longitude", "location.longitude", "metadata.longitude")),
                  )

              if isinstance(item, list):
                  return (
                      item[8] if len(item) > 8 else None,
                      item[9] if len(item) > 9 else None,
                  )

              return None, None

          total_coordinate_count = 0

          for rel in (
              "enriched/zzxbitnodes/latest.json",
              "enriched/originalbitnodes/latest.json",
          ):
              path = Path(os.environ["BITNODES_API"]) / rel

              if not path.exists():
                  raise SystemExit(f"{rel} is missing")

              payload = json.loads(path.read_text(encoding="utf-8"))
              nodes = node_items(payload)

              if not nodes:
                  raise SystemExit(f"{rel} contains zero nodes")

              coords = 0

              for item in nodes:
                  lat, lon = coord_pair(item)

                  try:
                      lat = float(lat)
                      lon = float(lon)
                  except Exception:
                      continue

                  if -90 <= lat <= 90 and -180 <= lon <= 180:
                      coords += 1

              print(f"{rel}: nodes={len(nodes)} coordinates={coords}")

              if coords == 0:
                  print(json.dumps(nodes[0], ensure_ascii=False, indent=2)[:5000])
                  raise SystemExit(f"{rel} has zero coordinate-bearing nodes")

              total_coordinate_count += coords

          print(f"total coordinate-bearing nodes={total_coordinate_count}")
          PY

      - name: Aggregate public summaries
        shell: bash
        run: |
          set -euo pipefail

          for SOURCE in zzxbitnodes originalbitnodes; do
            python tools/bitnodes/aggregate.py \
              --input "${BITNODES_API}/enriched/${SOURCE}/latest.json" \
              --output "${BITNODES_API}/aggregate/${SOURCE}/latest.json" \
              --api-dir "${BITNODES_API}" \
              --state-dir "${BITNODES_DATA}/runtime/state/${SOURCE}" \
              --source "${SOURCE}"
          done

      - name: Update IPDB artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${BITNODES_GEOIP}/current" "${BITNODES_GEOIP}/archive" "${BITNODES_GEOIP}/published"

          python tools/bitnodes/ip_db.py \
            --input "${BITNODES_API}/enriched/zzxbitnodes/latest.json" \
            --output "${BITNODES_API}/enriched/zzxbitnodes/latest.ipdb-enriched.json" \
            --ipdb-dir "${BITNODES_GEOIP}" \
            --latest "${BITNODES_GEOIP}/current/ip_db.latest.json" \
            --index "${BITNODES_GEOIP}/current/ip_db.index.json" \
            --stats "${BITNODES_GEOIP}/current/ip_db.stats.json" \
            --archive-dir "${BITNODES_GEOIP}/archive" \
            --max-segment-bytes "${MAX_PUBLIC_JSON_BYTES}" \
            --source zzxbitnodes \
            --update-db \
            --compact \
            --report "${BITNODES_GEOIP}/ip_db.run-report.json"

          test -f "${BITNODES_GEOIP}/current/ip_db.latest.json"
          test -f "${BITNODES_GEOIP}/current/ip_db.index.json"
          test -f "${BITNODES_GEOIP}/current/ip_db.stats.json"

          python tools/bitnodes/push_ipdb.py \
            --ipdb-dir "${BITNODES_GEOIP}" \
            --latest "${BITNODES_GEOIP}/current/ip_db.latest.json" \
            --index "${BITNODES_GEOIP}/current/ip_db.index.json" \
            --stats "${BITNODES_GEOIP}/current/ip_db.stats.json" \
            --archive-dir "${BITNODES_GEOIP}/archive" \
            --output-dir "${BITNODES_GEOIP}/published" \
            --report "${BITNODES_GEOIP}/ip_db.push-report.json" \
            --include-latest \
            --copy-only \
            --compact

      - name: Export MariaDB gzip shards
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/export_db.py \
            --input "${BITNODES_API}/enriched/zzxbitnodes/latest.json" \
            --input "${BITNODES_API}/enriched/originalbitnodes/latest.json" \
            --output-dir "${BITNODES_API}/data" \
            --database zzx_bitnodes \
            --max-bytes "${MAX_PUBLIC_JSON_BYTES}" \
            --compact \
            --strict \
            --no-sqlite

      - name: Detect private MariaDB backup credentials
        id: backup_gate
        shell: bash
        env:
          BITNODES_BACKUP_REPO: ${{ secrets.BITNODES_BACKUP_REPO }}
          BITNODES_BACKUP_TOKEN: ${{ secrets.BITNODES_BACKUP_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${BITNODES_BACKUP_REPO:-}" ] && [ -n "${BITNODES_BACKUP_TOKEN:-}" ]; then
            printf '%s\n' "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            printf '%s\n' "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Backup MariaDB shards to private repo
        if: ${{ steps.backup_gate.outputs.enabled == 'true' }}
        shell: bash
        env:
          BITNODES_BACKUP_REPO: ${{ secrets.BITNODES_BACKUP_REPO }}
          BITNODES_BACKUP_TOKEN: ${{ secrets.BITNODES_BACKUP_TOKEN }}
        run: |
          set -euo pipefail

          TODAY="$(date -u +%Y-%m-%d)"
          RUN_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          BACKUP_ROOT="$(mktemp -d)"

          git clone \
            "https://x-access-token:${BITNODES_BACKUP_TOKEN}@github.com/${BITNODES_BACKUP_REPO}.git" \
            "${BACKUP_ROOT}"

          mkdir -p \
            "${BACKUP_ROOT}/bitnodes/mariadb/${TODAY}/${RUN_ID}" \
            "${BACKUP_ROOT}/bitnodes/latest" \
            "${BACKUP_ROOT}/bitnodes/manifests"

          cp -av "${BITNODES_API}/data/"*.sql.gz "${BACKUP_ROOT}/bitnodes/mariadb/${TODAY}/${RUN_ID}/" || true
          cp -av "${BITNODES_API}/data/"*.json "${BACKUP_ROOT}/bitnodes/latest/" || true

          python - <<PY
          import json
          import time
          from pathlib import Path

          root = Path("${BACKUP_ROOT}")
          run_dir = root / "bitnodes" / "mariadb" / "${TODAY}" / "${RUN_ID}"
          manifest_dir = root / "bitnodes" / "manifests"
          manifest_dir.mkdir(parents=True, exist_ok=True)

          manifest = {
              "schema": "zzx-bitnodes-private-mariadb-backup-v1",
              "generated_at": int(time.time()),
              "date": "${TODAY}",
              "run_id": "${RUN_ID}",
              "source_repo": "${GITHUB_REPOSITORY}",
              "source_sha": "${GITHUB_SHA}",
              "files": []
          }

          for path in sorted(run_dir.glob("*.sql.gz")):
              manifest["files"].append({
                  "path": str(path.relative_to(root)),
                  "size_bytes": path.stat().st_size
              })

          (manifest_dir / f"${TODAY}-${RUN_ID}.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8"
          )

          (root / "bitnodes" / "latest" / "private-backup-latest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8"
          )
          PY

          cd "${BACKUP_ROOT}"

          git config user.name "zzx-labs-bitnodes-bot"
          git config user.email "actions@github.com"

          git add bitnodes

          if git diff --cached --quiet; then
            echo "No private MariaDB backup changes."
            exit 0
          fi

          git commit -m "Backup Bitnodes MariaDB shards ${TODAY} ${RUN_ID}"
          git push origin HEAD:main

      - name: Build maps and live-map from real coordinate data
        shell: bash
        run: |
          set -euo pipefail

          python tools/bitnodes/map/map.py both \
            --input "${BITNODES_API}/enriched/zzxbitnodes/latest.json" \
            --api-dir "${BITNODES_API}" \
            --state-dir "${BITNODES_DATA}/runtime/state/zzxbitnodes" \
            --map-dir "${BITNODES_MAPS}" \
            --live-map-dir "${BITNODES_LIVE_MAP}" \
            --source zzxbitnodes \
            --theme zzx_dark_olive \
            --settings live \
            --tile-provider cartodb_dark \
            --compact \
            --fail-empty

      - name: Validate generated maps
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          min_features = int(os.environ.get("MIN_MAP_FEATURES", "1"))

          required = [
              Path("bitcoin/bitnodes/live-map/data/map-points.geojson"),
              Path("bitcoin/bitnodes/live-map/data/map-vectors.json"),
              Path("bitcoin/bitnodes/live-map/data/map-settings.json"),
              Path("bitcoin/bitnodes/live-map/data/map-theme.json"),
              Path("bitcoin/bitnodes/live-map/data/vector-types.json"),
              Path("bitcoin/bitnodes/maps/data/map-points.geojson"),
              Path("bitcoin/bitnodes/maps/data/map-vectors.json"),
          ]

          for path in required:
              if not path.exists():
                  raise SystemExit(f"missing generated map artifact: {path}")

          geojson = json.loads(required[0].read_text(encoding="utf-8"))
          vectors = json.loads(required[1].read_text(encoding="utf-8"))

          features = geojson.get("features", [])
          points = vectors.get("points", [])

          print(f"live-map features={len(features)}")
          print(f"live-map vector points={len(points)}")

          if not isinstance(features, list) or len(features) < min_features:
              raise SystemExit(f"map-points.geojson contains too few features: {len(features)} < {min_features}")

          if not isinstance(points, list) or len(points) < min_features:
              raise SystemExit(f"map-vectors.json contains too few points: {len(points)} < {min_features}")
          PY

      - name: Prune private runtime, raw archives, MMDBs, and legacy fanout
        shell: bash
        run: |
          set -euo pipefail

          rm -f "${BITNODES_GEOIP}"/*.mmdb "${BITNODES_GEOIP}"/*.mmdb.gz || true
          rm -rf "${BITNODES_ROOT}/src" || true
          rm -rf "${BITNODES_DATA}/runtime" || true
          rm -rf "${BITNODES_ARCHIVE}/runtime" || true

          rm -f "${BITNODES_API}/original-latest.json" || true
          rm -f "${BITNODES_API}/enriched/zzxbitnodes/latest.ipdb-enriched.json" || true
          rm -f "${BITNODES_API}/enriched/zzxbitnodes/latest.map-ready.json" || true
          rm -f "${BITNODES_API}/enriched/originalbitnodes/latest.map-ready.json" || true

          for SOURCE in zzxbitnodes originalbitnodes; do
            find "${BITNODES_API}/${SOURCE}" -mindepth 1 -maxdepth 1 -type f -name '*.json' ! -name 'latest.json' -delete || true

            for DIR in \
              agents apt-attribution asns cities cjdns continents counties countries \
              datacenter geohashes government i2p ipv4 ipv6 known-malactor military \
              maps organizations providers regions sanctioned tag-attribution territories \
              timezones tor versions w3w zip
            do
              rm -rf "${BITNODES_API}/${SOURCE}/${DIR}" || true
            done
          done

          find "${BITNODES_ROOT}" -type d -name '__pycache__' -prune -exec rm -rf {} + || true
          find tools/bitnodes -type d -name '__pycache__' -prune -exec rm -rf {} + || true
          find . -type f -name '*.pyc' -delete || true

      - name: Build public API index
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          import time
          from pathlib import Path

          api = Path(os.environ["BITNODES_API"])

          index = {
              "schema": "zzx-bitnodes-public-api-index-v1",
              "generated_at": int(time.time()),
              "sources": {
                  "zzxbitnodes_latest": "zzxbitnodes/latest.json",
                  "originalbitnodes_latest": "originalbitnodes/latest.json",
                  "zzxbitnodes_enriched": "enriched/zzxbitnodes/latest.json",
                  "originalbitnodes_enriched": "enriched/originalbitnodes/latest.json",
                  "zzxbitnodes_aggregate": "aggregate/zzxbitnodes/latest.json",
                  "originalbitnodes_aggregate": "aggregate/originalbitnodes/latest.json",
                  "database_latest": "data/latest.json",
                  "database_index": "data/index.json",
                  "database_manifest": "data/mariadb_manifest.json",
                  "ipdb_latest": "../data/geoip/current/ip_db.latest.json",
                  "ipdb_index": "../data/geoip/current/ip_db.index.json",
                  "ipdb_stats": "../data/geoip/current/ip_db.stats.json",
                  "ipdb_push_report": "../data/geoip/ip_db.push-report.json",
                  "maps": "../maps/data/",
                  "live_map": "../live-map/data/"
              },
              "policy": {
                  "json": "rolling latest only; no historical JSON fanout",
                  "database": "24MB-safe gzipped MariaDB SQL shards",
                  "private_backup": "MariaDB shards are optionally mirrored to private backup repo",
                  "ipdb": "current index/latest/stats only",
                  "no_credentials": True,
                  "map_coordinates": "real GeoIP/enriched coordinates required"
              }
          }

          api.mkdir(parents=True, exist_ok=True)
          (api / "index.json").write_text(
              json.dumps(index, ensure_ascii=False, separators=(",", ":")) + "\n",
              encoding="utf-8"
          )

          manifest = {
              "schema": "zzx-bitnodes-public-file-manifest-v1",
              "generated_at": int(time.time()),
              "files": []
          }

          for path in sorted(api.rglob("*")):
              if path.is_file():
                  manifest["files"].append({
                      "path": str(path.relative_to(api)),
                      "size_bytes": path.stat().st_size
                  })

          (api / "manifest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, separators=(",", ":")) + "\n",
              encoding="utf-8"
          )
          PY

      - name: Validate public artifact policy
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          from pathlib import Path

          max_bytes = int(os.environ["MAX_PUBLIC_JSON_BYTES"])
          roots = [
              Path(os.environ["BITNODES_API"]),
              Path(os.environ["BITNODES_MAPS"]) / "data",
              Path(os.environ["BITNODES_LIVE_MAP"]) / "data",
              Path(os.environ["BITNODES_GEOIP"]) / "current",
          ]

          bad = []

          for root in roots:
              if not root.exists():
                  bad.append((0, root, "missing artifact root"))
                  continue

              for path in root.rglob("*"):
                  if not path.is_file():
                      continue

                  if path.suffix == ".gz":
                      if path.stat().st_size > max_bytes:
                          bad.append((path.stat().st_size, path, "gz too large"))
                      continue

                  if path.suffix in {".json", ".geojson"}:
                      if path.name.endswith(".map-ready.json"):
                          bad.append((path.stat().st_size, path, "transient map-ready json was not pruned"))
                          continue

                      if path.stat().st_size > max_bytes:
                          bad.append((path.stat().st_size, path, "json too large"))

          if bad:
              for size, path, reason in bad:
                  print(f"{reason}: {size} {path}")
              raise SystemExit(1)

          print("public artifact policy passed")
          PY

      - name: Stage safe public Bitnodes outputs
        shell: bash
        run: |
          set -euo pipefail

          git reset

          git add -A \
            "${BITNODES_API}/index.json" \
            "${BITNODES_API}/manifest.json" \
            "${BITNODES_API}/zzxbitnodes/latest.json" \
            "${BITNODES_API}/originalbitnodes/latest.json" \
            "${BITNODES_API}/enriched/zzxbitnodes/latest.json" \
            "${BITNODES_API}/enriched/zzxbitnodes/enrichment-report.json" \
            "${BITNODES_API}/enriched/originalbitnodes/latest.json" \
            "${BITNODES_API}/enriched/originalbitnodes/enrichment-report.json" \
            "${BITNODES_API}/aggregate/zzxbitnodes/latest.json" \
            "${BITNODES_API}/aggregate/originalbitnodes/latest.json" \
            "${BITNODES_API}/data" \
            "${BITNODES_DATA}/geo/manifests" \
            "${BITNODES_GEOIP}/current/ip_db.latest.json" \
            "${BITNODES_GEOIP}/current/ip_db.index.json" \
            "${BITNODES_GEOIP}/current/ip_db.stats.json" \
            "${BITNODES_GEOIP}/ip_db.run-report.json" \
            "${BITNODES_GEOIP}/ip_db.push-report.json" \
            "${BITNODES_MAPS}/data" \
            "${BITNODES_LIVE_MAP}/data"

      - name: Guard against destructive or bloated commit
        shell: bash
        run: |
          set -euo pipefail

          CHANGED="$(git diff --cached --name-only | wc -l | tr -d ' ')"
          DELETIONS="$(git diff --cached --numstat | awk '{d += $2} END {print d + 0}')"

          printf '%s\n' "Staged files: ${CHANGED}"
          printf '%s\n' "Staged deletions: ${DELETIONS}"

          if [ "${CHANGED}" -gt "${MAX_COMMIT_FILES}" ]; then
            git diff --cached --name-only | sed -n '1,240p'
            exit 1
          fi

          if [ "${DELETIONS}" -gt "${MAX_DELETIONS}" ]; then
            git diff --cached --stat
            exit 1
          fi

          if git diff --cached --name-only | grep -E '/(cities|asns|countries|agents|geohashes|providers|organizations|versions)/.+\.json$'; then
            printf '%s\n' "Refusing exploded JSON fanout."
            exit 1
          fi

          if git diff --cached --name-only | grep -E '^bitcoin/bitnodes/data/geoip/archive/ip_db\.[0-9]+\.json$'; then
            printf '%s\n' "Refusing public segmented IPDB archive."
            exit 1
          fi

      - name: Commit and push generated Bitnodes artifacts
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "zzx-labs-bitnodes-bot"
          git config user.email "actions@github.com"

          if git diff --cached --quiet; then
            printf '%s\n' "No Bitnodes public artifact changes."
            exit 0
          fi

          git commit -m "Update Bitnodes public artifacts"

          for attempt in 1 2 3 4 5; do
            if git push --force-with-lease origin HEAD:main; then
              printf '%s\n' "Bitnodes public artifacts pushed."
              exit 0
            fi

            printf '%s\n' "Push attempt ${attempt} failed. Another run or human commit advanced main; rerun from fresh origin/main."
            sleep 10
          done

          exit 1
