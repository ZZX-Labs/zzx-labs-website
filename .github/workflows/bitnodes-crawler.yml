name: Bitnodes Static API Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  crawl-bitnodes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/bitnodes/requirements.txt

      - name: Run Bitnodes crawler export
        run: |
          python tools/bitnodes/crawl.py \
            --output bitcoin/bitnodes/api \
            --timeout 3 \
            --limit 500

      - name: Commit JSON snapshots
        run: |
          git config user.name "zzx-labs-bitnodes-bot"
          git config user.email "actions@github.com"
          git add bitcoin/bitnodes/api
          git diff --cached --quiet || git commit -m "Update Bitnodes static API snapshots"
          git push
