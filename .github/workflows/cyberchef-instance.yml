name: ZZX CyberChef Instance

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: zzx-labs-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build ZZX-Labs Pages with CyberChef
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ZZX-Labs website
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Create temporary Pages site
        run: |
          mkdir -p _site
          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "_site" \
            --exclude "tools" \
            ./ _site/

      - name: Download CyberChef v11.0.0
        run: |
          mkdir -p _cyberchef-download
          curl -L \
            --fail \
            --retry 3 \
            --retry-delay 5 \
            -o _cyberchef-download/CyberChef_v11.0.0.zip \
            https://github.com/gchq/CyberChef/releases/download/v11.0.0/CyberChef_v11.0.0.zip

      - name: Install CyberChef into Pages artifact
        run: |
          mkdir -p _cyberchef-extract
          mkdir -p _site/cyberchef

          unzip -o _cyberchef-download/CyberChef_v11.0.0.zip -d _cyberchef-extract

          cp -a _cyberchef-extract/. _site/cyberchef/

          if [ -f "_site/cyberchef/CyberChef_v11.0.0.html" ]; then
            cp "_site/cyberchef/CyberChef_v11.0.0.html" "_site/cyberchef/index.html"
          elif [ -f "_site/cyberchef/index.html" ]; then
            printf '%s\n' 'CyberChef index.html already exists.'
          else
            printf '%s\n' 'ERROR: No CyberChef HTML entrypoint found.'
            find _site/cyberchef -maxdepth 4 -type f
            exit 1
          fi

          if [ ! -f "_site/cyberchef/assets/main.css" ]; then
            printf '%s\n' 'ERROR: Missing CyberChef stylesheet: assets/main.css'
            find _site/cyberchef -maxdepth 4 -type f
            exit 1
          fi

          if [ ! -f "_site/cyberchef/assets/main.js" ]; then
            printf '%s\n' 'ERROR: Missing CyberChef script: assets/main.js'
            find _site/cyberchef -maxdepth 4 -type f
            exit 1
          fi

          grep -q 'assets/main.css' _site/cyberchef/index.html || \
            sed -i '/<\/head>/i\    <link rel="stylesheet" href="assets/main.css">' _site/cyberchef/index.html

          grep -q 'assets/main.js' _site/cyberchef/index.html || \
            sed -i '/<\/body>/i\    <script src="assets/main.js"></script>' _site/cyberchef/index.html

      - name: Add CyberChef attribution and license notices
        run: |
          cat > _site/cyberchef/ATTRIBUTION.md << 'EOF'
          # ZZX CyberChef Instance Attribution

          This CyberChef instance is generated during the ZZX-Labs GitHub Pages workflow.

          Public deployment target:

          https://zzx-labs.io/cyberchef/

          Upstream CyberChef project:

          https://github.com/gchq/CyberChef

          Official hosted CyberChef instance:

          https://gchq.github.io/CyberChef/

          Release used:

          https://github.com/gchq/CyberChef/releases/download/v11.0.0/CyberChef_v11.0.0.zip

          Version:

          v11.0.0
          EOF

          cat > _site/cyberchef/LICENSE-NOTICE.md << 'EOF'
          # License Notice

          CyberChef is distributed under the Apache License 2.0.

          https://www.apache.org/licenses/LICENSE-2.0

          CyberChef repository:

          https://github.com/gchq/CyberChef

          Crown Copyright reference:

          https://www.nationalarchives.gov.uk/information-management/re-using-public-sector-information/uk-government-licensing-framework/crown-copyright/

          Contributor License Agreement reference:

          https://cla-assistant.io/gchq/CyberChef
          EOF

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy ZZX-Labs Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4