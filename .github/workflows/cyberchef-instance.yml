name: ZZX CyberChef Instance

on:
  workflow_dispatch:

  schedule:
    - cron: '17 */12 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: zzx-labs-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build ZZX-Labs Pages with CyberChef
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ZZX-Labs website
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Create temporary Pages site
        run: |
          rm -rf _site _cyberchef-download _cyberchef-extract
          mkdir -p _site

          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "_site" \
            --exclude "_cyberchef-download" \
            --exclude "_cyberchef-extract" \
            ./ _site/

      - name: Download CyberChef v11.0.0
        run: |
          mkdir -p _cyberchef-download

          curl -L \
            --fail \
            --retry 3 \
            --retry-delay 5 \
            -o _cyberchef-download/CyberChef_v11.0.0.zip \
            https://github.com/gchq/CyberChef/releases/download/v11.0.0/CyberChef_v11.0.0.zip

      - name: Install native CyberChef under cyberchef/app
        run: |
          mkdir -p _cyberchef-extract
          rm -rf _site/cyberchef/app
          mkdir -p _site/cyberchef/app

          unzip -o _cyberchef-download/CyberChef_v11.0.0.zip -d _cyberchef-extract

          cp -a _cyberchef-extract/. _site/cyberchef/app/

          if [ -f "_site/cyberchef/app/CyberChef_v11.0.0.html" ]; then
            cp "_site/cyberchef/app/CyberChef_v11.0.0.html" "_site/cyberchef/app/index.html"
          else
            CYBERCHEF_HTML="$(find _site/cyberchef/app -maxdepth 2 -type f -name 'CyberChef*.html' | head -n 1)"

            if [ -n "$CYBERCHEF_HTML" ]; then
              cp "$CYBERCHEF_HTML" "_site/cyberchef/app/index.html"
            else
              printf '%s\n' 'ERROR: No CyberChef HTML entrypoint found.'
              find _site/cyberchef/app -maxdepth 5 -type f
              exit 1
            fi
          fi

          test -f _site/cyberchef/app/index.html
          test -f _site/cyberchef/app/assets/main.css
          test -f _site/cyberchef/app/assets/main.js

      - name: Normalize native CyberChef asset paths
        run: |
          python3 - << 'PY'
          from pathlib import Path

          index = Path("_site/cyberchef/app/index.html")
          html = index.read_text(encoding="utf-8", errors="ignore")

          replacements = {
              'href="/assets/': 'href="assets/',
              "href='/assets/": "href='assets/",
              'src="/assets/': 'src="assets/',
              "src='/assets/": "src='assets/",
              'url("/assets/': 'url("assets/',
              "url('/assets/": "url('assets/",
              'url(/assets/': 'url(assets/',
          }

          for old, new in replacements.items():
              html = html.replace(old, new)

          index.write_text(html, encoding="utf-8")
          PY

      - name: Verify ZZX CyberChef wrapper files
        run: |
          test -f _site/cyberchef/index.html
          test -f _site/cyberchef/style.css
          test -f _site/cyberchef/script.js
          test -f _site/cyberchef/hook.js

          test -f _site/cyberchef/app/index.html
          test -f _site/cyberchef/app/assets/main.css
          test -f _site/cyberchef/app/assets/main.js

          printf '%s\n' 'ZZX CyberChef wrapper and native CyberChef app verified.'

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: zzx-cyberchef-pages
          path: _site

  deploy:
    name: Deploy ZZX-Labs Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: zzx-cyberchef-pages