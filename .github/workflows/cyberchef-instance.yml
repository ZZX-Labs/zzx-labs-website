name: ZZX CyberChef Instance

on:
  workflow_dispatch:

  schedule:
    - cron: '17 */12 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: zzx-labs-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build ZZX-Labs Pages with CyberChef
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ZZX-Labs website
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Create temporary Pages site
        run: |
          rm -rf _site _cyberchef-download _cyberchef-extract
          mkdir -p _site

          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "_site" \
            --exclude "_cyberchef-download" \
            --exclude "_cyberchef-extract" \
            --exclude "cyberchef/app" \
            ./ _site/

      - name: Download CyberChef v11.0.0
        run: |
          mkdir -p _cyberchef-download

          curl -L \
            --fail \
            --retry 3 \
            --retry-delay 5 \
            -o _cyberchef-download/CyberChef_v11.0.0.zip \
            https://github.com/gchq/CyberChef/releases/download/v11.0.0/CyberChef_v11.0.0.zip

      - name: Install native CyberChef under cyberchef/app
        run: |
          mkdir -p _cyberchef-extract
          rm -rf _site/cyberchef/app
          mkdir -p _site/cyberchef/app

          unzip -o _cyberchef-download/CyberChef_v11.0.0.zip -d _cyberchef-extract

          if [ -d "_cyberchef-extract/CyberChef" ]; then
            cp -a _cyberchef-extract/CyberChef/. _site/cyberchef/app/
          else
            cp -a _cyberchef-extract/. _site/cyberchef/app/
          fi

          CYBERCHEF_HTML="$(find _site/cyberchef/app -maxdepth 5 -type f \( -name 'CyberChef*.html' -o -name 'Cyberchef*.html' \) | head -n 1)"

          if [ -z "$CYBERCHEF_HTML" ]; then
            printf '%s\n' 'ERROR: No CyberChef HTML entrypoint found.'
            find _site/cyberchef/app -maxdepth 6 -type f | sort
            exit 1
          fi

          cp "$CYBERCHEF_HTML" "_site/cyberchef/app/index.html"
          cp "$CYBERCHEF_HTML" "_site/cyberchef/app/native.html"

      - name: Generate CyberChef app bridge files
        run: |
          cat > _site/cyberchef/app/styles.css << 'EOF'
          @import url("assets/main.css");

          :root {
            --zzx-accent: #c0d674;
            --zzx-gold: #c79c6e;
            --zzx-bg: #282828;
            --zzx-panel: #333333;
            --zzx-border: #444444;
            --zzx-text: #d1d1d1;
          }

          body,
          body.classic,
          html.classic body {
            background: var(--zzx-bg);
          }

          #banner {
            border-bottom: 1px solid var(--zzx-border);
          }
          EOF

          cat > _site/cyberchef/app/script.js << 'EOF'
          (function () {
            window.ZZX = window.ZZX || {};
            window.ZZX.CYBERCHEF_APP = {
              version: "v11.0.0",
              bridge: true,
              nativeAssets: "assets/"
            };
          })();
          EOF

      - name: Patch native CyberChef HTML safely
        run: |
          python3 - << 'PY'
          from pathlib import Path
          import re

          index = Path("_site/cyberchef/app/index.html")
          html = index.read_text(encoding="utf-8", errors="ignore")

          shim = r'''<script>
          (function () {
            function memoryStorage() {
              var mem = {};
              return {
                getItem: function (k) {
                  return Object.prototype.hasOwnProperty.call(mem, k) ? mem[k] : null;
                },
                setItem: function (k, v) {
                  mem[k] = String(v);
                },
                removeItem: function (k) {
                  delete mem[k];
                },
                clear: function () {
                  mem = {};
                },
                key: function (i) {
                  return Object.keys(mem)[i] || null;
                },
                get length() {
                  return Object.keys(mem).length;
                }
              };
            }

            function storageWorks(name) {
              try {
                var s = window[name];
                var k = "__zzx_storage_test__";
                s.setItem(k, "1");
                s.removeItem(k);
                return true;
              } catch (e) {
                return false;
              }
            }

            try {
              if (!storageWorks("localStorage")) {
                Object.defineProperty(window, "localStorage", {
                  configurable: true,
                  value: memoryStorage()
                });
              }
            } catch (e) {}

            try {
              if (!storageWorks("sessionStorage")) {
                Object.defineProperty(window, "sessionStorage", {
                  configurable: true,
                  value: memoryStorage()
                });
              }
            } catch (e) {}

            try {
              var originalSetItem = Storage.prototype.setItem;
              Storage.prototype.setItem = function (key, value) {
                try {
                  return originalSetItem.call(this, key, value);
                } catch (e) {
                  if (
                    e &&
                    (
                      e.name === "QuotaExceededError" ||
                      e.name === "NS_ERROR_DOM_QUOTA_REACHED"
                    )
                  ) {
                    return null;
                  }
                  throw e;
                }
              };
            } catch (e) {}
          })();
          </script>'''

          replacements = {
              'href="/assets/': 'href="assets/',
              "href='/assets/": "href='assets/",
              'src="/assets/': 'src="assets/',
              "src='/assets/": "src='assets/",
              'url("/assets/': 'url("assets/',
              "url('/assets/": "url('assets/",
              'url(/assets/': 'url(assets/',
          }

          for old, new in replacements.items():
              html = html.replace(old, new)

          if "__zzx_storage_test__" not in html:
              html = re.sub(r"<head>", "<head>\n" + shim + "\n", html, count=1, flags=re.I)

          html = re.sub(
              r'<link\s+href=["\']assets/main\.css["\']\s+rel=["\']stylesheet["\']\s*/?>',
              '<link rel="stylesheet" href="styles.css">',
              html,
              flags=re.I
          )

          html = re.sub(
              r'<link\s+rel=["\']stylesheet["\']\s+href=["\']assets/main\.css["\']\s*/?>',
              '<link rel="stylesheet" href="styles.css">',
              html,
              flags=re.I
          )

          if 'href="styles.css"' not in html and "href='styles.css'" not in html:
              html = html.replace("</head>", '<link rel="stylesheet" href="styles.css">\n</head>')

          if 'src="script.js"' not in html and "src='script.js'" not in html:
              html = re.sub(
                  r'(<script[^>]+src=["\']assets/main\.js["\'][^>]*></script>)',
                  '<script src="script.js"></script>\n\\1',
                  html,
                  count=1,
                  flags=re.I
              )

          index.write_text(html, encoding="utf-8")
          PY

      - name: Generate ZZX CyberChef wrapper
        run: |
          cat > _site/cyberchef/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <meta name="robots" content="noindex, nofollow">

              <title>CyberChefZZX | ZZX-Labs R&D</title>

              <link rel="icon" href="../static/icons/favicon.ico" type="image/x-icon">
              <link rel="icon" href="../static/icons/favicon-32.png" sizes="32x32" type="image/png">
              <link rel="icon" href="../static/icons/favicon-16.png" sizes="16x16" type="image/png">
              <link rel="apple-touch-icon" href="../static/icons/apple-touch-icon.png">

              <link rel="stylesheet" href="../static/styles.css">
              <link rel="stylesheet" href="./style.css">

              <script src="../static/script.js" defer></script>
              <script src="./hook.js" defer></script>
              <script src="./script.js" defer></script>
          </head>

          <body data-cz-depth=".">

          <header>
              <div id="zzx-header"></div>

              <br>

              <div id="ticker-container"></div>

              <br>

              <div id="cz-header"></div>
          </header>

          <main class="cz-shell" data-cyberchef-view="home">

              <section class="cz-hero container">
                  <p class="cz-kicker">ZZX-Labs / Browser-Side Cyber Toolkit</p>

                  <h2>CyberChefZZX</h2>

                  <p>
                      A ZZX-Labs R&D container for CyberChef v11.0.0, providing
                      local browser-side encoding, decoding, cryptography,
                      compression, decompression, hashing, parsing, and data
                      transformation workflows. The native CyberChef instance is
                      preserved at <a href="./app/">/cyberchef/app/</a>.
                  </p>

                  <div class="cz-sourcebar">
                      <label for="cz-source">CyberChef Engine</label>

                      <select id="cz-source">
                          <option value="local" selected>ZZX-Labs Local CyberChef</option>
                          <option value="upstream">GCHQ GitHub Pages CyberChef</option>
                      </select>

                      <button id="cz-load" type="button">Load</button>
                      <button id="cz-refresh" type="button">Refresh</button>

                      <a class="cz-link-button" href="./app/" target="_blank" rel="noopener">
                          Open Native Local App
                      </a>
                  </div>
              </section>

              <br>

              <section id="cz-status" class="cz-status container">
                  Loading local CyberChef instance…
              </section>

              <br>

              <section class="cz-grid container">
                  <article class="cz-card">
                      <span>Version</span>
                      <strong>v11.0.0</strong>
                  </article>

                  <article class="cz-card">
                      <span>Runtime</span>
                      <strong>Browser Local</strong>
                  </article>

                  <article class="cz-card">
                      <span>Native Path</span>
                      <strong>/cyberchef/app/</strong>
                  </article>

                  <article class="cz-card">
                      <span>Attribution</span>
                      <strong>GCHQ / CyberChef</strong>
                  </article>
              </section>

              <br>

              <section class="cz-panel container">
                  <header class="cz-panel-head">
                      <span class="cz-kicker">Tool Engine</span>
                      <h2>CyberChef Workspace</h2>
                      <p>
                          The embedded workspace below can use the local ZZX-hosted
                          CyberChef build or the upstream GCHQ-hosted instance.
                      </p>
                  </header>

                  <div class="cz-frame-wrap">
                      <iframe
                          id="cz-frame"
                          title="CyberChef"
                          src="./app/"
                          loading="eager"
                          referrerpolicy="no-referrer"
                      ></iframe>
                  </div>
              </section>

              <br>

              <section class="cz-panel container">
                  <header class="cz-panel-head">
                      <span class="cz-kicker">Credits / License</span>
                      <h2>Attribution</h2>
                  </header>

                  <div class="cz-credit-grid">
                      <span>CyberChef v11.0.0</span>
                      <span>GCHQ</span>
                      <span>Apache License 2.0</span>
                      <span>ZZX-Labs R&D</span>
                      <span>0xdeadbeef</span>
                      <span>0xdeadbeef Consulting</span>
                  </div>
              </section>

              <br><br>
          </main>

          <footer>
              <div id="cz-footer"></div>
              <div id="zzx-footer"></div>
          </footer>

          </body>
          </html>
          EOF

          cat > _site/cyberchef/style.css << 'EOF'
          .cz-shell {
              color: #d1d1d1;
          }

          .cz-hero,
          .cz-panel,
          .cz-status {
              border: 1px solid #444;
              background: linear-gradient(180deg, #333, #242424);
              padding: 1rem;
          }

          .cz-kicker {
              color: #c79c6e;
              text-transform: uppercase;
              letter-spacing: 0.12em;
              font-size: 0.78rem;
              margin: 0 0 0.5rem;
          }

          .cz-hero h2,
          .cz-panel h2 {
              color: #c0d674;
              margin-top: 0;
          }

          .cz-hero p,
          .cz-panel p,
          .cz-status {
              color: #d1d1d1;
              line-height: 1.55;
          }

          .cz-sourcebar {
              display: flex;
              flex-wrap: wrap;
              align-items: center;
              gap: 0.65rem;
              margin-top: 1rem;
          }

          .cz-sourcebar label {
              color: #c79c6e;
          }

          .cz-sourcebar select,
          .cz-sourcebar button,
          .cz-link-button {
              border: 1px solid #444;
              background: #202020;
              color: #d1d1d1;
              padding: 0.55rem 0.75rem;
              font: inherit;
          }

          .cz-sourcebar button:hover,
          .cz-link-button:hover {
              background: #c0d674;
              color: #111;
              border-color: #c0d674;
          }

          .cz-grid {
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
              gap: 1rem;
          }

          .cz-card {
              border: 1px solid #444;
              background: #202020;
              padding: 1rem;
          }

          .cz-card span {
              display: block;
              color: #9a9a9a;
              font-size: 0.78rem;
              text-transform: uppercase;
              letter-spacing: 0.08em;
          }

          .cz-card strong {
              display: block;
              color: #c0d674;
              margin-top: 0.45rem;
          }

          .cz-panel-head {
              margin-bottom: 1rem;
          }

          .cz-frame-wrap {
              height: calc(100vh - 230px);
              min-height: 720px;
              border: 1px solid #444;
              background: #111;
          }

          #cz-frame {
              display: block;
              width: 100%;
              height: 100%;
              border: 0;
              background: #111;
          }

          .cz-credit-grid {
              display: flex;
              flex-wrap: wrap;
              gap: 0.5rem;
          }

          .cz-credit-grid span {
              border: 1px solid #444;
              background: #202020;
              color: #d1d1d1;
              padding: 0.45rem 0.65rem;
              font-size: 0.85rem;
          }

          @media (max-width: 760px) {
              .cz-frame-wrap {
                  height: 75vh;
                  min-height: 620px;
              }

              .cz-sourcebar {
                  align-items: stretch;
                  flex-direction: column;
              }

              .cz-sourcebar select,
              .cz-sourcebar button,
              .cz-link-button {
                  width: 100%;
              }
          }
          EOF

          cat > _site/cyberchef/hook.js << 'EOF'
          (() => {
              "use strict";

              window.ZZX = window.ZZX || {};

              window.ZZX.CYBERCHEF = {
                  version: "v11.0.0",
                  localUrl: "./app/",
                  upstreamUrl: "https://gchq.github.io/CyberChef/",
                  defaultSource: "local"
              };
          })();
          EOF

          cat > _site/cyberchef/script.js << 'EOF'
          (() => {
              "use strict";

              function ready(fn) {
                  if (document.readyState === "loading") {
                      document.addEventListener("DOMContentLoaded", fn);
                  } else {
                      fn();
                  }
              }

              ready(() => {
                  const frame = document.getElementById("cz-frame");
                  const source = document.getElementById("cz-source");
                  const load = document.getElementById("cz-load");
                  const refresh = document.getElementById("cz-refresh");
                  const status = document.getElementById("cz-status");

                  const cfg = window.ZZX?.CYBERCHEF || {
                      localUrl: "./app/",
                      upstreamUrl: "https://gchq.github.io/CyberChef/",
                      defaultSource: "local"
                  };

                  function urlFor(value) {
                      return value === "upstream"
                          ? cfg.upstreamUrl
                          : cfg.localUrl;
                  }

                  function setStatus(value) {
                      if (!status) return;

                      status.textContent = value === "upstream"
                          ? "Using upstream GCHQ CyberChef instance."
                          : "Using local ZZX-Labs CyberChef v11.0.0 instance.";
                  }

                  function loadSource() {
                      const value = source?.value || cfg.defaultSource;
                      if (frame) frame.src = urlFor(value);
                      setStatus(value);

                      try {
                          localStorage.setItem("zzxCyberChefSource", value);
                      } catch (err) {}
                  }

                  try {
                      const saved = localStorage.getItem("zzxCyberChefSource");
                      if (saved && source) source.value = saved;
                  } catch (err) {}

                  load?.addEventListener("click", loadSource);

                  refresh?.addEventListener("click", () => {
                      if (frame) frame.src = frame.src;
                  });

                  loadSource();

                  console.info("[CyberChefZZX] Wrapper initialized.");
              });
          })();
          EOF

      - name: Add attribution and license notices
        run: |
          cat > _site/cyberchef/ATTRIBUTION.md << 'EOF'
          # ZZX CyberChef Instance Attribution

          CyberChefZZX is a ZZX-Labs R&D wrapper page around CyberChef v11.0.0.

          Local CyberChef application path:

          https://zzx-labs.io/cyberchef/app/

          ZZX wrapper path:

          https://zzx-labs.io/cyberchef/

          Upstream CyberChef project:

          https://github.com/gchq/CyberChef

          Official CyberChef hosted instance:

          https://gchq.github.io/CyberChef/

          CyberChef is developed by GCHQ and contributors.

          ZZX-Labs R&D wrapper, presentation layer, deployment workflow, and integration credits:

          ZZX-Labs R&D
          0xdeadbeef
          0xdeadbeef Consulting
          EOF

          cat > _site/cyberchef/LICENSE-NOTICE.md << 'EOF'
          # License Notice

          CyberChef is distributed under the Apache License 2.0.

          https://www.apache.org/licenses/LICENSE-2.0

          CyberChef repository:

          https://github.com/gchq/CyberChef

          Crown Copyright reference:

          https://www.nationalarchives.gov.uk/information-management/re-using-public-sector-information/uk-government-licensing-framework/crown-copyright/

          Contributor License Agreement reference:

          https://cla-assistant.io/gchq/CyberChef
          EOF

      - name: Verify CyberChef deployment artifact
        run: |
          test -f _site/cyberchef/index.html
          test -f _site/cyberchef/style.css
          test -f _site/cyberchef/script.js
          test -f _site/cyberchef/hook.js

          test -f _site/cyberchef/app/index.html
          test -f _site/cyberchef/app/native.html
          test -f _site/cyberchef/app/styles.css
          test -f _site/cyberchef/app/script.js
          test -f _site/cyberchef/app/assets/main.css
          test -f _site/cyberchef/app/assets/main.js

          grep -q '__zzx_storage_test__' _site/cyberchef/app/index.html
          grep -q 'href="styles.css"' _site/cyberchef/app/index.html
          grep -q 'src="script.js"' _site/cyberchef/app/index.html
          grep -q 'src="assets/main.js"' _site/cyberchef/app/index.html

          printf '%s\n' 'CyberChef wrapper, bridge, and native app generated successfully.'

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: zzx-cyberchef-pages
          path: _site

  deploy:
    name: Deploy ZZX-Labs Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: zzx-cyberchef-pages