name: ZZX CyberChef Instance

on:
  workflow_dispatch:

  schedule:
    - cron: '17 */12 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: zzx-labs-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build ZZX-Labs Pages with CyberChef
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ZZX-Labs website
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Create temporary Pages site
        run: |
          rm -rf _site _cyberchef-download _cyberchef-extract
          mkdir -p _site

          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "_site" \
            --exclude "_cyberchef-download" \
            --exclude "_cyberchef-extract" \
            --exclude "cyberchef/app" \
            ./ _site/

      - name: Verify ZZX CyberChef wrapper files
        run: |
          test -f _site/cyberchef/index.html
          test -f _site/cyberchef/styles.css
          test -f _site/cyberchef/script.js
          test -f _site/cyberchef/hook.js
          test -f _site/cyberchef/container.js
          test -f _site/cyberchef/upgrades.css
          test -f _site/cyberchef/upgrades.js
          test -f _site/cyberchef/modifications.css
          test -f _site/cyberchef/modifications.js
          grep -q 'id="cz-runtime"' _site/cyberchef/index.html
          grep -q 'CyberChefZZX' _site/cyberchef/index.html

      - name: Download CyberChef v11.0.0
        run: |
          mkdir -p _cyberchef-download

          curl -L \
            --fail \
            --retry 3 \
            --retry-delay 5 \
            -o _cyberchef-download/CyberChef_v11.0.0.zip \
            https://github.com/gchq/CyberChef/releases/download/v11.0.0/CyberChef_v11.0.0.zip

      - name: Extract CyberChef
        run: |
          mkdir -p _cyberchef-extract
          rm -rf _site/cyberchef/app
          mkdir -p _site/cyberchef/app

          unzip -o _cyberchef-download/CyberChef_v11.0.0.zip -d _cyberchef-extract

          if [ -d "_cyberchef-extract/CyberChef" ]; then
            cp -a _cyberchef-extract/CyberChef/. _site/cyberchef/app/
          else
            cp -a _cyberchef-extract/. _site/cyberchef/app/
          fi

          CYBERCHEF_HTML="$(find _site/cyberchef/app -maxdepth 5 -type f \( -name 'CyberChef*.html' -o -name 'Cyberchef*.html' \) | head -n 1)"

          if [ -z "$CYBERCHEF_HTML" ]; then
            printf '%s\n' 'ERROR: No CyberChef HTML entrypoint found.'
            find _site/cyberchef/app -maxdepth 6 -type f | sort
            exit 1
          fi

          cp "$CYBERCHEF_HTML" _site/cyberchef/app/index.html
          cp "$CYBERCHEF_HTML" _site/cyberchef/app/native.html
          cp "$CYBERCHEF_HTML" _site/cyberchef/cyberchef.html

      - name: Patch app and runtime CyberChef HTML paths
        run: |
          python3 - << 'PY'
          from pathlib import Path
          import re

          STORAGE_SHIM = r'''<script>
          (function () {
              "use strict";

              function memoryStorage() {
                  var mem = {};
                  return {
                      getItem: function (k) {
                          return Object.prototype.hasOwnProperty.call(mem, k) ? mem[k] : null;
                      },
                      setItem: function (k, v) {
                          mem[k] = String(v);
                      },
                      removeItem: function (k) {
                          delete mem[k];
                      },
                      clear: function () {
                          mem = {};
                      },
                      key: function (i) {
                          return Object.keys(mem)[i] || null;
                      },
                      get length() {
                          return Object.keys(mem).length;
                      }
                  };
              }

              function forceSafeStorage(name) {
                  try {
                      var real = window[name];
                      var key = "__zzx_storage_test__";
                      real.setItem(key, "1");
                      real.removeItem(key);
                  } catch (e) {
                      try {
                          Object.defineProperty(window, name, {
                              configurable: true,
                              value: memoryStorage()
                          });
                      } catch (ignored) {}
                  }
              }

              forceSafeStorage("localStorage");
              forceSafeStorage("sessionStorage");

              try {
                  localStorage.setItem(
                      "options",
                      JSON.stringify({
                          theme: "dark",
                          wordWrap: true,
                          showErrors: true,
                          updateUrl: true
                      })
                  );

                  document.documentElement.classList.remove(
                      "classic",
                      "geocities",
                      "solarizedDark",
                      "solarizedLight"
                  );

                  document.documentElement.classList.add("dark");
              } catch (e) {}
          })();
          </script>'''

          def insert_shim_before_main(html, main_src):
              if "__zzx_storage_test__" in html:
                  return html

              pattern = rf'(<script[^>]+src=["\']{re.escape(main_src)}["\'][^>]*></script>)'

              patched = re.sub(
                  pattern,
                  STORAGE_SHIM + "\n\\1",
                  html,
                  count=1,
                  flags=re.I
              )

              if patched == html:
                  patched = html.replace("</head>", STORAGE_SHIM + "\n</head>")

              return patched

          def patch_app(path):
              html = path.read_text(encoding="utf-8", errors="ignore")

              replacements = {
                  'href="/assets/': 'href="assets/',
                  "href='/assets/": "href='assets/",
                  'src="/assets/': 'src="assets/',
                  "src='/assets/": "src='assets/",
                  'url("/assets/': 'url("assets/',
                  "url('/assets/": "url('assets/",
                  'url(/assets/': 'url(assets/',
              }

              for old, new in replacements.items():
                  html = html.replace(old, new)

              html = re.sub(
                  r'<html([^>]*)class=["\']classic["\']',
                  r'<html\1class="dark"',
                  html,
                  count=1,
                  flags=re.I
              )

              html = insert_shim_before_main(html, "assets/main.js")
              path.write_text(html, encoding="utf-8")

          def patch_runtime(path):
              html = path.read_text(encoding="utf-8", errors="ignore")

              replacements = {
                  'href="/assets/': 'href="app/assets/',
                  "href='/assets/": "href='app/assets/",
                  'src="/assets/': 'src="app/assets/',
                  "src='/assets/": "src='app/assets/",
                  'url("/assets/': 'url("app/assets/',
                  "url('/assets/": "url('app/assets/",
                  'url(/assets/': 'url(app/assets/',
                  'href="assets/': 'href="app/assets/',
                  "href='assets/": "href='app/assets/",
                  'src="assets/': 'src="app/assets/',
                  "src='assets/": "src='app/assets/",
                  'url("assets/': 'url("app/assets/',
                  "url('assets/": "url('app/assets/",
                  'url(assets/': 'url(app/assets/',
              }

              for old, new in replacements.items():
                  html = html.replace(old, new)

              html = re.sub(
                  r'<html([^>]*)class=["\']classic["\']',
                  r'<html\1class="dark"',
                  html,
                  count=1,
                  flags=re.I
              )

              html = re.sub(
                  r'<title>.*?</title>',
                  '<title>CyberChefZZX Runtime</title>',
                  html,
                  count=1,
                  flags=re.I | re.S
              )

              html = insert_shim_before_main(html, "app/assets/main.js")
              path.write_text(html, encoding="utf-8")

          patch_app(Path("_site/cyberchef/app/index.html"))
          patch_app(Path("_site/cyberchef/app/native.html"))
          patch_runtime(Path("_site/cyberchef/cyberchef.html"))
          PY

      - name: Add attribution and license notices
        run: |
          cat > _site/cyberchef/ATTRIBUTION.md << 'EOF'
          # ZZX CyberChef Instance Attribution

          CyberChefZZX is a ZZX-Labs R&D subpage and modified presentation layer for CyberChef v11.0.0.

          Modified ZZX page:

          https://zzx-labs.io/cyberchef/

          Root runtime bridge:

          https://zzx-labs.io/cyberchef/cyberchef.html

          Native local CyberChef path:

          https://zzx-labs.io/cyberchef/app/

          Upstream CyberChef project:

          https://github.com/gchq/CyberChef

          Official CyberChef hosted instance:

          https://gchq.github.io/CyberChef/

          CyberChef is developed by GCHQ and contributors.

          ZZX-Labs R&D integration credits:

          ZZX-Labs R&D
          0xdeadbeef
          0xdeadbeef Consulting
          EOF

          cat > _site/cyberchef/LICENSE-NOTICE.md << 'EOF'
          # License Notice

          CyberChef is distributed under the Apache License 2.0.

          https://www.apache.org/licenses/LICENSE-2.0

          CyberChef repository:

          https://github.com/gchq/CyberChef

          Crown Copyright reference:

          https://www.nationalarchives.gov.uk/information-management/re-using-public-sector-information/uk-government-licensing-framework/crown-copyright/
          EOF

      - name: Verify CyberChef deployment artifact
        run: |
          set -e

          test -f _site/cyberchef/index.html
          test -f _site/cyberchef/cyberchef.html
          test -f _site/cyberchef/styles.css
          test -f _site/cyberchef/script.js
          test -f _site/cyberchef/hook.js
          test -f _site/cyberchef/container.js
          test -f _site/cyberchef/upgrades.css
          test -f _site/cyberchef/upgrades.js
          test -f _site/cyberchef/modifications.css
          test -f _site/cyberchef/modifications.js

          test -f _site/cyberchef/app/index.html
          test -f _site/cyberchef/app/native.html
          test -f _site/cyberchef/app/assets/main.css
          test -f _site/cyberchef/app/assets/main.js

          grep -q 'assets/main.css' _site/cyberchef/app/index.html
          grep -q 'assets/main.js' _site/cyberchef/app/index.html
          grep -q '__zzx_storage_test__' _site/cyberchef/app/index.html

          grep -q 'app/assets/main.css' _site/cyberchef/cyberchef.html
          grep -q 'app/assets/main.js' _site/cyberchef/cyberchef.html
          grep -q '__zzx_storage_test__' _site/cyberchef/cyberchef.html

          grep -q 'CyberChefZZX' _site/cyberchef/index.html
          grep -q 'id="cz-runtime"' _site/cyberchef/index.html

          printf '%s\n' 'CyberChefZZX wrapper, runtime bridge, and native CyberChef app verified.'

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: zzx-cyberchef-pages
          path: _site

  deploy:
    name: Deploy ZZX-Labs Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: zzx-cyberchef-pages