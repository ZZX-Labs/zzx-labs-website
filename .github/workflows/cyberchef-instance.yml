name: Feature - ZZX CyberChef Instance

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "tools/cyberchef/cyberchef.py"
      - ".github/workflows/features/cyberchef-instance.yml"

permissions:
  contents: write

jobs:
  build-cyberchef:
    name: Build CyberChef v11.0.0
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ZZX-Labs website
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build CyberChef subpage
        run: |
          python tools/cyberchef/cyberchef.py

      - name: Commit generated CyberChef page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add cyberchef/

          if git diff --cached --quiet; then
            printf '%s\n' 'No CyberChef changes detected.'
          else
            git commit -m "Build CyberChef v11.0.0 subpage"
            git push
          fi
