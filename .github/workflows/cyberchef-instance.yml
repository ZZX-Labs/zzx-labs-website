name: ZZX CyberChef Instance

on:
  workflow_dispatch:

  schedule:
    - cron: '17 */12 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: zzx-labs-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build ZZX-Labs Pages with CyberChef
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ZZX-Labs website
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Create temporary Pages site
        run: |
          rm -rf _site _cyberchef-download _cyberchef-extract
          mkdir -p _site

          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "_site" \
            --exclude "_cyberchef-download" \
            --exclude "_cyberchef-extract" \
            --exclude "cyberchef/app" \
            ./ _site/

      - name: Verify ZZX CyberChef files
        run: |
          test -f _site/cyberchef/styles.css
          test -f _site/cyberchef/script.js
          test -f _site/cyberchef/hook.js
          test -f _site/cyberchef/container.js
          test -f _site/cyberchef/upgrades.css
          test -f _site/cyberchef/upgrades.js
          test -f _site/cyberchef/modifications.css
          test -f _site/cyberchef/modifications.js

      - name: Download CyberChef v11.0.0
        run: |
          mkdir -p _cyberchef-download

          curl -L \
            --fail \
            --retry 3 \
            --retry-delay 5 \
            -o _cyberchef-download/CyberChef_v11.0.0.zip \
            https://github.com/gchq/CyberChef/releases/download/v11.0.0/CyberChef_v11.0.0.zip

      - name: Extract CyberChef
        run: |
          mkdir -p _cyberchef-extract
          rm -rf _site/cyberchef/app
          mkdir -p _site/cyberchef/app

          unzip -o _cyberchef-download/CyberChef_v11.0.0.zip -d _cyberchef-extract

          if [ -d "_cyberchef-extract/CyberChef" ]; then
            cp -a _cyberchef-extract/CyberChef/. _site/cyberchef/app/
          else
            cp -a _cyberchef-extract/. _site/cyberchef/app/
          fi

          CYBERCHEF_HTML="$(find _site/cyberchef/app -maxdepth 5 -type f \( -name 'CyberChef*.html' -o -name 'Cyberchef*.html' \) | head -n 1)"

          if [ -z "$CYBERCHEF_HTML" ]; then
            printf '%s\n' 'ERROR: No CyberChef HTML entrypoint found.'
            find _site/cyberchef/app -maxdepth 6 -type f | sort
            exit 1
          fi

          cp "$CYBERCHEF_HTML" _site/cyberchef/app/native.html
          cp "$CYBERCHEF_HTML" _site/cyberchef/app/index.html
          cp "$CYBERCHEF_HTML" _site/cyberchef/index.html

      - name: Generate app shim files
        run: |
          cat > _site/cyberchef/app/styles.css << 'EOF'
          @import url("assets/main.css");
          EOF

          cat > _site/cyberchef/app/script.js << 'EOF'
          (function () {
              "use strict";

              function installStorageShim() {
                  function memoryStorage() {
                      var mem = {};

                      return {
                          getItem: function (k) {
                              return Object.prototype.hasOwnProperty.call(mem, k) ? mem[k] : null;
                          },
                          setItem: function (k, v) {
                              mem[k] = String(v);
                          },
                          removeItem: function (k) {
                              delete mem[k];
                          },
                          clear: function () {
                              mem = {};
                          },
                          key: function (i) {
                              return Object.keys(mem)[i] || null;
                          },
                          get length() {
                              return Object.keys(mem).length;
                          }
                      };
                  }

                  function storageWorks(name) {
                      try {
                          var s = window[name];
                          var k = "__zzx_storage_test__";
                          s.setItem(k, "1");
                          s.removeItem(k);
                          return true;
                      } catch (e) {
                          return false;
                      }
                  }

                  try {
                      if (!storageWorks("localStorage")) {
                          Object.defineProperty(window, "localStorage", {
                              configurable: true,
                              value: memoryStorage()
                          });
                      }
                  } catch (e) {}

                  try {
                      if (!storageWorks("sessionStorage")) {
                          Object.defineProperty(window, "sessionStorage", {
                              configurable: true,
                              value: memoryStorage()
                          });
                      }
                  } catch (e) {}

                  try {
                      var originalSetItem = Storage.prototype.setItem;

                      Storage.prototype.setItem = function (key, value) {
                          try {
                              return originalSetItem.call(this, key, value);
                          } catch (e) {
                              if (
                                  e &&
                                  (
                                      e.name === "QuotaExceededError" ||
                                      e.name === "NS_ERROR_DOM_QUOTA_REACHED"
                                  )
                              ) {
                                  return null;
                              }

                              throw e;
                          }
                      };
                  } catch (e) {}
              }

              function setDefaultCyberChefOptions() {
                  try {
                      var existing = localStorage.getItem("options");
                      var options = existing ? JSON.parse(existing) : {};

                      options.theme = options.theme || "dark";
                      options.wordWrap = true;
                      options.showErrors = true;
                      options.updateUrl = true;

                      localStorage.setItem("options", JSON.stringify(options));
                  } catch (e) {}
              }

              function loadCyberChefMain() {
                  if (document.querySelector("script[data-cyberchef-main='true']")) {
                      return;
                  }

                  var script = document.createElement("script");

                  script.src = "assets/main.js";
                  script.defer = true;
                  script.dataset.cyberchefMain = "true";

                  document.head.appendChild(script);
              }

              installStorageShim();
              setDefaultCyberChefOptions();

              if (document.readyState === "loading") {
                  document.addEventListener("DOMContentLoaded", loadCyberChefMain);
              } else {
                  loadCyberChefMain();
              }
          })();
          EOF

      - name: Patch app native HTML to use shim files
        run: |
          python3 - << 'PY'
          from pathlib import Path
          import re

          path = Path("_site/cyberchef/app/index.html")
          html = path.read_text(encoding="utf-8", errors="ignore")

          html = html.replace('href="/assets/', 'href="assets/')
          html = html.replace("href='/assets/", "href='assets/")
          html = html.replace('src="/assets/', 'src="assets/')
          html = html.replace("src='/assets/", "src='assets/")

          html = re.sub(
              r'<link\s+href=["\']assets/main\.css["\']\s+rel=["\']stylesheet["\']\s*/?>',
              '<link rel="stylesheet" href="styles.css">',
              html,
              flags=re.I
          )

          html = re.sub(
              r'<link\s+rel=["\']stylesheet["\']\s+href=["\']assets/main\.css["\']\s*/?>',
              '<link rel="stylesheet" href="styles.css">',
              html,
              flags=re.I
          )

          html = re.sub(
              r'<script[^>]+src=["\']assets/main\.js["\'][^>]*></script>',
              '<script src="script.js"></script>',
              html,
              count=1,
              flags=re.I
          )

          path.write_text(html, encoding="utf-8")
          PY

      - name: Patch root CyberChefZZX HTML
        run: |
          python3 - << 'PY'
          from pathlib import Path
          import re

          path = Path("_site/cyberchef/index.html")
          html = path.read_text(encoding="utf-8", errors="ignore")

          html = html.replace('href="/assets/', 'href="app/assets/')
          html = html.replace("href='/assets/", "href='app/assets/")
          html = html.replace('src="/assets/', 'src="app/assets/')
          html = html.replace("src='/assets/", "src='app/assets/")
          html = html.replace('href="assets/', 'href="app/assets/')
          html = html.replace("href='assets/", "href='app/assets/")
          html = html.replace('src="assets/', 'src="app/assets/')
          html = html.replace("src='assets/", "src='app/assets/")

          html = re.sub(
              r'<title>.*?</title>',
              '<title>CyberChefZZX | ZZX-Labs R&D</title>',
              html,
              count=1,
              flags=re.I | re.S
          )

          html = re.sub(
              r'<link\s+href=["\']app/assets/main\.css["\']\s+rel=["\']stylesheet["\']\s*/?>',
              '<link rel="stylesheet" href="styles.css">',
              html,
              flags=re.I
          )

          html = re.sub(
              r'<link\s+rel=["\']stylesheet["\']\s+href=["\']app/assets/main\.css["\']\s*/?>',
              '<link rel="stylesheet" href="styles.css">',
              html,
              flags=re.I
          )

          html = re.sub(
              r'<script[^>]+src=["\']app/assets/main\.js["\'][^>]*></script>',
              '<script src="hook.js"></script>\n<script src="container.js"></script>\n<script src="script.js"></script>\n<script src="upgrades.js"></script>\n<script src="modifications.js"></script>',
              html,
              count=1,
              flags=re.I
          )

          insert = '''
          <section class="cz-hero container">
              <p class="cz-kicker">ZZX-Labs / Browser-Side Cyber Toolkit</p>
              <h2>CyberChefZZX</h2>
              <p>
                  A ZZX-Labs R&D enhanced CyberChef v11.0.0 instance for browser-side encoding,
                  decoding, cryptography, compression, decompression, hashing, parsing, Bitcoin
                  utilities, OSINT workflows, malware triage, DFIR workflows, and data transformation research.
              </p>
              <p>
                  Native CyberChef remains available at <a href="./app/">/cyberchef/app/</a>.
              </p>
              <div class="cz-sourcebar">
                  <label for="cz-source">CyberChef Mode</label>
                  <select id="cz-source">
                      <option value="modified" selected>CyberChefZZX Modified Instance</option>
                      <option value="native">Native Local CyberChef</option>
                      <option value="upstream">GCHQ GitHub Pages CyberChef</option>
                  </select>
                  <button id="cz-load" type="button">Load</button>
                  <button id="cz-refresh" type="button">Refresh</button>
                  <a class="cz-link-button" href="./app/" target="_blank" rel="noopener">Open Native Local App</a>
                  <a class="cz-link-button" href="https://gchq.github.io/CyberChef/" target="_blank" rel="noopener">Open GCHQ CyberChef</a>
              </div>
          </section>

          <section id="cz-status" class="cz-status container">
              Loading CyberChefZZX modified instance…
          </section>

          <section class="cz-grid container">
              <article class="cz-card"><span>Version</span><strong>v11.0.0</strong></article>
              <article class="cz-card"><span>Mode</span><strong>ZZX Modified</strong></article>
              <article class="cz-card"><span>Native Path</span><strong>/cyberchef/app/</strong></article>
              <article class="cz-card"><span>Attribution</span><strong>GCHQ / CyberChef</strong></article>
          </section>

          <section class="cz-panel container">
              <header class="cz-panel-head">
                  <span class="cz-kicker">Enhanced Tool Engine</span>
                  <h2>CyberChefZZX Workspace</h2>
                  <p>
                      This workspace runs CyberChef directly, with ZZX-Labs presentation,
                      visual, workflow, recipe, and analyst augmentations layered around it.
                  </p>
              </header>
              <div id="cz-container" class="cz-container" data-cz-container>
                  <div class="cz-frame-toolbar">
                      <span id="cz-active-source">CyberChefZZX Modified Instance</span>
                      <span id="cz-frame-state">Initializing</span>
                  </div>
                  <div id="cz-runtime" class="cz-runtime" data-cz-runtime>
          '''

          html = re.sub(
              r'<body([^>]*)>',
              '<body\\1 data-cz-depth="." data-cyberchef-view="home">' + insert,
              html,
              count=1,
              flags=re.I
          )

          close = '''
                  </div>
              </div>
          </section>

          <section class="cz-panel container">
              <header class="cz-panel-head">
                  <span class="cz-kicker">ZZX Additions</span>
                  <h2>Recipes, Tooling, Themes, and Analyst Workflows</h2>
              </header>
              <div id="cz-modifications" class="cz-modifications" data-cz-modifications>
                  <div class="cz-widget-loading">Loading ZZX CyberChef modifications…</div>
              </div>
          </section>

          <section class="cz-panel container">
              <header class="cz-panel-head">
                  <span class="cz-kicker">Credits / License</span>
                  <h2>Attribution</h2>
              </header>
              <div class="cz-credit-grid">
                  <span>CyberChef v11.0.0</span>
                  <span>GCHQ</span>
                  <span>Crown Copyright 2016-2026</span>
                  <span>Apache-2.0</span>
                  <span>ZZX-Labs R&D</span>
                  <span>0xdeadbeef</span>
                  <span>0xdeadbeef Consulting</span>
              </div>
          </section>
          '''

          html = re.sub(
              r'</body>',
              close + '</body>',
              html,
              count=1,
              flags=re.I
          )

          path.write_text(html, encoding="utf-8")
          PY

      - name: Add attribution and license notices
        run: |
          cat > _site/cyberchef/ATTRIBUTION.md << 'EOF'
          # ZZX CyberChef Instance Attribution

          CyberChefZZX is a ZZX-Labs R&D wrapper page around CyberChef v11.0.0.

          Local CyberChef application path:

          https://zzx-labs.io/cyberchef/app/

          ZZX wrapper path:

          https://zzx-labs.io/cyberchef/

          Upstream CyberChef project:

          https://github.com/gchq/CyberChef

          Official CyberChef hosted instance:

          https://gchq.github.io/CyberChef/

          CyberChef is developed by GCHQ and contributors.

          ZZX-Labs R&D wrapper, presentation layer, deployment workflow, and integration credits:

          ZZX-Labs R&D
          0xdeadbeef
          0xdeadbeef Consulting
          EOF

          cat > _site/cyberchef/LICENSE-NOTICE.md << 'EOF'
          # License Notice

          CyberChef is distributed under the Apache License 2.0.

          https://www.apache.org/licenses/LICENSE-2.0

          CyberChef repository:

          https://github.com/gchq/CyberChef
          EOF

      - name: Verify CyberChef deployment artifact
        run: |
          test -f _site/cyberchef/index.html
          test -f _site/cyberchef/styles.css
          test -f _site/cyberchef/script.js
          test -f _site/cyberchef/hook.js
          test -f _site/cyberchef/container.js
          test -f _site/cyberchef/upgrades.css
          test -f _site/cyberchef/upgrades.js
          test -f _site/cyberchef/modifications.css
          test -f _site/cyberchef/modifications.js

          test -f _site/cyberchef/app/index.html
          test -f _site/cyberchef/app/native.html
          test -f _site/cyberchef/app/styles.css
          test -f _site/cyberchef/app/script.js
          test -f _site/cyberchef/app/assets/main.css
          test -f _site/cyberchef/app/assets/main.js

          grep -q 'assets/main.js' _site/cyberchef/app/script.js
          grep -q 'app/assets/main.js' _site/cyberchef/script.js
          grep -q '<script src="script.js"></script>' _site/cyberchef/app/index.html
          grep -q '<script src="script.js"></script>' _site/cyberchef/index.html
          grep -q 'cz-runtime' _site/cyberchef/index.html
          grep -q 'CyberChefZZX' _site/cyberchef/index.html

          printf '%s\n' 'CyberChefZZX and native CyberChef app verified.'

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: zzx-cyberchef-pages
          path: _site

  deploy:
    name: Deploy ZZX-Labs Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: zzx-cyberchef-pages