user nginx;
worker_processes auto;

events {
    worker_connections 4096;
}

http {

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;

    server_tokens off;

    client_max_body_size 512M;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;

    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    upstream flask_backend {
        server flask:5000;
    }

    server {

        listen 80;
        server_name _;

        root /srv/zzx-labs;
        index index.html;

        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        ####################################################
        # Main Site
        ####################################################

        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }

        ####################################################
        # Flask API
        ####################################################

        location /api/ {

            proxy_pass http://flask_backend/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60;
            proxy_send_timeout 60;
            proxy_read_timeout 60;
        }

        ####################################################
        # Bitnodes API
        ####################################################

        location /bitcoin/bitnodes/api/ {

            add_header Access-Control-Allow-Origin *;

            try_files $uri =404;
        }

        ####################################################
        # BPI API
        ####################################################

        location /bitcoin/bpi/api/ {

            add_header Access-Control-Allow-Origin *;

            try_files $uri =404;
        }

        ####################################################
        # MempoolspaceZZX
        ####################################################

        location /bitcoin/mempoolspace/ {

            try_files $uri $uri/ /bitcoin/mempoolspace/index.html;
        }

        ####################################################
        # CyberChef
        ####################################################

        location /cyberchef/ {

            try_files $uri $uri/ /cyberchef/index.html;
        }

        ####################################################
        # Downloads
        ####################################################

        location /downloads/ {

            autoindex off;

            try_files $uri $uri/ =404;
        }

        ####################################################
        # Research
        ####################################################

        location /research/ {

            try_files $uri $uri/ /research/index.html;
        }

        ####################################################
        # Documentation
        ####################################################

        location /documentation/ {

            try_files $uri $uri/ /documentation/index.html;
        }

        ####################################################
        # Static Assets
        ####################################################

        location /static/ {

            expires 30d;

            add_header Cache-Control "public";

            try_files $uri =404;
        }

        location /assets/ {

            expires 30d;

            add_header Cache-Control "public";

            try_files $uri =404;
        }

        ####################################################
        # Robots
        ####################################################

        location = /robots.txt {
            try_files $uri =404;
        }

        ####################################################
        # Sitemap
        ####################################################

        location = /sitemap.xml {
            try_files $uri =404;
        }

        ####################################################
        # Security
        ####################################################

        location ~ /\.(git|env|svn|htaccess) {
            deny all;
            return 404;
        }

        location ~* \.(db|sqlite|sql)$ {
            deny all;
            return 404;
        }

        location ~* \.(bak|old|orig)$ {
            deny all;
            return 404;
        }

        ####################################################
        # Error Pages
        ####################################################

        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /404.html {
            internal;
        }

        location = /50x.html {
            internal;
        }
    }
}
