services:
  nginx:
    image: nginx:stable-alpine
    container_name: zzx-labs-nginx
    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - ../:/srv/zzx-labs:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - flask

    networks:
      - zzx_labs_net

  flask:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: zzx-labs-flask
    restart: unless-stopped

    expose:
      - "5000"

    ports:
      - "5000:5000"

    volumes:
      - ../:/srv/zzx-labs
      - ./flask:/srv/zzx-labs/__server/flask

    environment:
      PYTHONUNBUFFERED: "1"
      FLASK_ENV: "development"
      FLASK_APP: "zzx-labs-server.py"
      ZZX_LABS_ROOT: "/srv/zzx-labs"
      ZZX_LABS_API_DIR: "/srv/zzx-labs/bitcoin/bitnodes/api"
      ZZX_LABS_STATE_DIR: "/srv/zzx-labs/bitcoin/bitnodes/data/state"

    command:
      - python
      - /srv/zzx-labs/__server/zzx-labs-server.py

    networks:
      - zzx_labs_net

  bitnodesd:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: zzx-labs-bitnodesd
    restart: unless-stopped

    volumes:
      - ../:/srv/zzx-labs

    working_dir: /srv/zzx-labs

    environment:
      PYTHONUNBUFFERED: "1"
      ZZX_LABS_ROOT: "/srv/zzx-labs"

    command:
      - python
      - /srv/zzx-labs/tools/bitnodes/bitnodesd.py
      - run

    networks:
      - zzx_labs_net

  # Optional database for future authenticated/private dashboards.
  # Keep disabled until needed.
  #
  # database:
  #   image: postgres:16-alpine
  #   container_name: zzx-labs-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: zzx
  #     POSTGRES_PASSWORD: change_me_in_env_file
  #     POSTGRES_DB: zzx_labs
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - zzx_labs_net

networks:
  zzx_labs_net:
    driver: bridge

volumes:
  postgres_data:
